name: Duck.ai New Image

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt image
        required: true
        default: A cute duck astronaut in space

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm init -y
          npm i -D playwright
          npx playwright install --with-deps chromium

      - name: Write script
        run: |
          cat > duckai.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const prompt = process.env.PROMPT;
            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage']
            });

            const page = await browser.newPage({
              viewport: { width: 390, height: 844 },
              isMobile: true,
              hasTouch: true,
              deviceScaleFactor: 2
            });

            fs.mkdirSync('screenshots', { recursive: true });
            const shots = [];
            const shot = async (name) => {
              const file = `screenshots/${name}.png`;
              await page.screenshot({ path: file, fullPage: true });
              shots.push(file);
            };

            await page.goto('https://duck.ai', { waitUntil: 'networkidle' });
            await shot('01-home');

            const menu = page.locator('button').first();
            await menu.click();
            await page.waitForTimeout(1500);
            await shot('02-sidebar-open');

            const newImage = page.getByText(/new image|gambar baru/i).first();
            await newImage.click();
            await page.waitForTimeout(1500);
            await shot('03-new-image-open');

            const input = page.locator('textarea, input[type="text"], [contenteditable="true"]').first();
            await input.click();
            await input.fill(prompt);
            await shot('04-prompt-filled');

            const submit = page.locator('button[type="submit"], button:has-text("Submit"), button:has-text("Kirim"), button:has-text("Buat")').first();
            if (await submit.count()) await submit.click();
            else await page.keyboard.press('Enter');

            await page.waitForTimeout(10000);
            await shot('05-after-submit');

            await page.waitForTimeout(60000);
            await shot('06-after-60s');

            fs.writeFileSync('screenshots/index.json', JSON.stringify(shots, null, 2));
            await browser.close();
          })().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Run
        env:
          PROMPT: ${{ inputs.prompt }}
        run: node duckai.js

      - name: Build report
        run: |
          cat > report.md <<'EOF'
          # Duck.ai run report

          ## Screenshots
          - 01-home.png
          - 02-sidebar-open.png
          - 03-new-image-open.png
          - 04-prompt-filled.png
          - 05-after-submit.png
          - 06-after-60s.png
          EOF
          zip -r duckai-screenshots.zip screenshots report.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: duckai-${{ github.run_number }}
          name: Duck.ai run ${{ github.run_number }}
          files: duckai-screenshots.zip
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
