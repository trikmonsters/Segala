name: Duck.ai New Image

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt image
        required: true
        default: A cute duck astronaut in space

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm init -y
          npm i -D playwright
          npx playwright install --with-deps chromium

      - name: Write script
        run: |
          cat > duckai.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const prompt = process.env.PROMPT;
            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage']
            });

            const page = await browser.newPage({
              viewport: { width: 390, height: 844 },
              isMobile: true,
              hasTouch: true,
              deviceScaleFactor: 2
            });

            fs.mkdirSync('screenshots', { recursive: true });
            const shot = async (name) => {
              await page.screenshot({ path: `screenshots/${name}.png`, fullPage: true });
            };

            await page.goto('https://duck.ai', { waitUntil: 'networkidle' });

            const menu = page.locator('button').first();
            await menu.click();
            await page.waitForTimeout(1500);

            const newImage = page.getByText(/new image|gambar baru/i).first();
            await newImage.click();
            await page.waitForTimeout(1500);

            // 1. Solusi agar JS mendeteksi teks: Klik, Focus, lalu Type (Ketik lambat)
            const input = page.locator('textarea, input[type="text"], [contenteditable="true"]').first();
            await input.click();
            await input.focus();
            await page.keyboard.type(prompt, { delay: 100 }); // Simulasi mengetik dengan jeda 100ms per karakter
            
            // Trigger event input tambahan agar state JS benar-benar berubah
            await input.evaluate(el => el.dispatchEvent(new Event('input', { bubbles: true })));
            
            await page.waitForTimeout(1000);
            await shot('01-prompt-filled'); // Screenshot pertama setelah di-fill

            // 2. Klik tombol submit
            const submit = page.locator('button[type="submit"], button:has-text("Submit"), button:has-text("Kirim"), button:has-text("Buat")').first();
            if (await submit.count() && await submit.isEnabled()) {
              await submit.click();
            } else {
              await page.keyboard.press('Enter');
            }

            // Tunggu proses generate (bisa disesuaikan total waktunya)
            await page.waitForTimeout(30000); 
            await shot('02-after-submit'); // Screenshot kedua setelah submit

            await browser.close();
          })().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Run
        env:
          PROMPT: ${{ inputs.prompt }}
        run: node duckai.js

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: duckai-${{ github.run_number }}
          name: Duck.ai run ${{ github.run_number }}
          # Mengunggah semua file .png langsung dari folder screenshots tanpa di-zip
          files: |
            screenshots/01-prompt-filled.png
            screenshots/02-after-submit.png
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
