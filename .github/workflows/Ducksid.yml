name: Duck.ai New Image

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt image
        required: true
        default: A cute duck astronaut in space

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm init -y
          npm i -D playwright
          npx playwright install --with-deps chromium

      - name: Write script
        run: |
          cat > duckai.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const prompt = process.env.PROMPT;
            
            // 1. Naikkan level kamuflase browser
            const browser = await chromium.launch({
              headless: true,
              args: [
                '--no-sandbox', 
                '--disable-dev-shm-usage',
                '--disable-blink-features=AutomationControlled' // Sembunyikan status "navigator.webdriver"
              ]
            });

            const context = await browser.newContext({
              viewport: { width: 390, height: 844 },
              isMobile: true,
              hasTouch: true,
              deviceScaleFactor: 2,
              locale: 'en-US',
              timezoneId: 'America/New_York',
              userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.5 Mobile/15E148 Safari/604.1'
            });

            // Jalankan script inject untuk menghapus jejak otomatisasi di window object
            await context.addInitScript(() => {
              Object.defineProperty(navigator, 'webdriver', { get: () => undefined });
            });

            const page = await context.newPage();
            fs.mkdirSync('screenshots', { recursive: true });
            
            const shot = async (name) => {
              await page.screenshot({ path: `screenshots/${name}.png`, fullPage: true });
            };

            // Buka halaman utama
            await page.goto('https://duck.ai', { waitUntil: 'networkidle' });
            await page.waitForTimeout(2000);

            const menu = page.locator('button').first();
            await menu.click();
            await page.waitForTimeout(1500);

            // Pilih "New Image"
            const newImage = page.getByText(/new image|gambar baru/i).first();
            await newImage.click();
            await page.waitForTimeout(3000); // Beri waktu loading halaman barunya agak lama

            // Target area input chat
            const input = page.locator('textarea, input[type="text"], [contenteditable="true"]').first();
            await input.click();
            await page.waitForTimeout(500);
            await input.focus();
            
            // Ketik lambat dengan delay bervariasi agar lolos deteksi bot AI
            for (const char of prompt) {
              await page.keyboard.type(char);
              await page.waitForTimeout(Math.floor(Math.random() * 50) + 50); // Jeda acak 50-100ms per huruf
            }
            
            // Trigger state javascript
            await input.evaluate(el => el.dispatchEvent(new Event('input', { bubbles: true })));
            await page.waitForTimeout(1500);
            await shot('01-prompt-filled'); 

            // Cari tombol submit
            const submit = page.locator('button[type="submit"], button:has-text("Submit"), button:has-text("Kirim"), button:has-text("Buat")').first();
            if (await submit.count() && await submit.isEnabled()) {
              await submit.click();
            } else {
              await page.keyboard.press('Enter');
            }

            // Tunggu proses generate gambar
            await page.waitForTimeout(45000); 
            await shot('02-after-submit'); 

            await browser.close();
          })().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Run
        env:
          PROMPT: ${{ inputs.prompt }}
        run: node duckai.js

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: duckai-${{ github.run_number }}
          name: Duck.ai run ${{ github.run_number }}
          files: |
            screenshots/01-prompt-filled.png
            screenshots/02-after-submit.png
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
