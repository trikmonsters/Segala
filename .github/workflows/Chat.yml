name: ChatGPT Audio Analysis Automation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        npm init -y
        npm install playwright playwright-extra puppeteer-extra-plugin-stealth

    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps

    - name: Download Audio File
      run: |
        curl -L -o audio.wav https://github.com/trikmonsters/Auto-Vids/releases/download/run-1/audio.wav

    - name: Generate Playwright Script
      run: |
        cat << 'EOF' > script.js
        const { chromium } = require('playwright-extra');
        const stealth = require('puppeteer-extra-plugin-stealth')();
        const path = require('path');

        chromium.use(stealth);

        (async () => {
          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
            viewport: { width: 1280, height: 720 }
          });
          const page = await context.newPage();

          try {
            await page.goto('https://chatgpt.com/', { waitUntil: 'networkidle' });

            // Menggunakan selector ID spesifik milik ChatGPT dan mengizinkan elemen tersembunyi (hidden)
            const fileInputSelector = 'input#upload-files';
            await page.waitForSelector(fileInputSelector, { state: 'attached', timeout: 30000 });
            
            const filePath = path.resolve('audio.wav');
            await page.setInputFiles(fileInputSelector, filePath);
            
            await page.waitForTimeout(5000);

            const inputSelector = 'div#prompt-textarea, textarea[placeholder*="Message ChatGPT"]';
            await page.waitForSelector(inputSelector, { timeout: 30000 });
            
            await page.fill(inputSelector, 'Tolong analisis isi dari audio yang saya unggah ini');
            await page.press(inputSelector, 'Enter');
            
            await page.waitForTimeout(5000);

            const responseSelector = 'main div.markdown, div[data-message-author-role="assistant"]';
            await page.waitForSelector(responseSelector, { timeout: 30000 });
            
            const responses = await page.locator(responseSelector).all();
            if (responses.length > 0) {
              const lastResponseText = await responses[responses.length - 1].innerText();
              console.log('\n=== HASIL ANALISIS AUDIO CHATGPT ===\n');
              console.log(lastResponseText);
              console.log('\n====================================\n');
            } else {
              console.log('Gagal mendeteksi element respons.');
            }

          } catch (error) {
            console.error('Error:', error);
          } finally {
            await browser.close();
          }
        })();
        EOF

    - name: Jalankan Skrip Otomatisasi
      run: node script.js
