name: Generate Putter Image

on:
  workflow_dispatch:

jobs:
  generate-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Install Puter CLI
        run: |
          curl -LO https://puter.com/cli/linux/puter
          chmod +x puter
          sudo mv puter /usr/local/bin/

      - name: Authenticate Puter
        run: |
          # Menggunakan token yang disimpan di secret
          puter auth login --token ${{ secrets.PUTER_TOKEN }}

      - name: Generate Image
        run: |
          # Menjalankan perintah generate image via CLI
          puter ai txt2img "2D anime style, a teacher explaining at a blackboard in a classroom, students writing and listening, vibrant colors, high quality" --output classroom.png

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_id }}
          name: Generated Image - Run ${{ github.run_id }}
          body: "Image generated automatically using Puter CLI."
          files: classroom.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
