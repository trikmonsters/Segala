name: Auto Generate Subtitle from URL

on:
  workflow_dispatch: # Mengaktifkan tombol "Run workflow" manual di tab Actions

jobs:
  transcribe_url:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Update System & Install FFmpeg
      run: |
        sudo apt update
        sudo apt install -y ffmpeg

    - name: Install Subtitle Generator Package
      run: pip install auto-subtitle

    - name: Download Video and Process Subtitle
      run: |
        mkdir -p input_video
        mkdir -p output_subtitles
        
        # Mengunduh video langsung dari link Pinterest menggunakan curl
        curl -L "https://v1.pinimg.com/videos/mc/720p/2f/42/16/2f42160e604fb128db5712d46e2a7a21.mp4" -o input_video/pinterest_video.mp4
        
        # Eksekusi langsung melalui modul python terinstal untuk hasil yang stabil
        python -m auto_subtitle.main input_video/pinterest_video.mp4 --model small --output_dir output_subtitles/

    - name: Upload SRT Subtitles Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pinterest-srt-subtitle
        path: output_subtitles/
