name: Auto Generate Subtitle from URL

on:
  workflow_dispatch: # Mengaktifkan tombol "Run workflow" manual di tab Actions

jobs:
  transcribe_url:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Update System & Install FFmpeg
      run: sudo apt update && sudo apt install -y ffmpeg

    - name: Install Subtitle Generator AI
      run: pip install git+https://github.com

    - name: Download Video and Process Subtitle
      run: |
        mkdir -p input_video
        mkdir -p output_subtitles
        
        # Mengunduh video langsung dari link Pinterest menggunakan curl
        curl -L "https://pinimg.com" -o input_video/pinterest_video.mp4
        
        # Memanggil perintah menggunakan modul python secara langsung untuk menghindari eror PATH
        python -m auto_subtitle.main input_video/pinterest_video.mp4 --model small --output_dir output_subtitles/

    - name: Upload SRT Subtitles Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pinterest-srt-subtitle
        path: output_subtitles/
