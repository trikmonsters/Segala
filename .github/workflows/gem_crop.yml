name: Auto IG & Buffer Post

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Masukkan URL Video Media / Instagram'
        required: true
        default: ''
      caption:
        description: 'Caption opsional (jika kosong, pakai hasil Gemma)'
        required: false
        default: ''
      post_to_buffer:
        description: 'Langsung upload ke Buffer?'
        required: true
        default: 'true'

permissions:
  contents: write

jobs:
  process-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install opencv-python-headless requests --quiet

      - name: Install Playwright Dependencies
        run: |
          npm init -y
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps

      - name: Download Video via Playwright (SSSInstagram)
        run: |
          cat << 'EOF' > download_ig.js
          const { chromium } = require('playwright-extra');
          const stealth = require('puppeteer-extra-plugin-stealth')();
          const fs = require('fs');

          chromium.use(stealth);

          (async () => {
            const igUrl = process.argv[2] || "https://www.instagram.com/reel/DTJ6u-JE-Ta/";
            console.log(`🚀 Memulai proses unduh untuk URL: ${igUrl}`);

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 720 }
            });
            const page = await context.newPage();

            try {
              console.log('🌐 Membuka sssinstagram.com...');
              await page.goto('https://sssinstagram.com/reels-downloader', { waitUntil: 'domcontentloaded', timeout: 30000 });

              const inputSelector = '#input, input.form__input';
              await page.waitForSelector(inputSelector, { timeout: 15000 });
              await page.fill(inputSelector, igUrl);

              console.log('⚡ Mengirim URL...');
              await page.press(inputSelector, 'Enter');

              const downloadBtnSelector = 'a.button__download, a[download="true"]';
              await page.waitForSelector(downloadBtnSelector, { timeout: 45000 });

              const downloadUrl = await page.getAttribute(downloadBtnSelector, 'href');
              console.log('🔗 Link video didapatkan! Mengunduh...');

              const response = await context.request.get(downloadUrl);
              const videoBuffer = await response.body();

              fs.writeFileSync('video.mp4', videoBuffer);
              console.log('✅ Video disimpan sebagai video.mp4');

            } catch (error) {
              console.error('❌ Gagal mengunduh video:', error.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF
          node download_ig.js "${{ github.event.inputs.video_url }}"

      - name: Detect Video Bounds & Generate Caption with Gemma
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INPUT_CAPTION: ${{ github.event.inputs.caption }}
        run: |
          cat << 'EOF' > detect_and_caption.py
          import cv2
          import base64
          import json
          import re
          import os
          import sys
          import requests

          # ── 1. Validasi API Key ────────────────────────────────────
          api_key = os.environ.get("GEMINI_API_KEY", "")
          if not api_key:
              print("❌ GEMINI_API_KEY kosong! Cek secret di repo settings.")
              sys.exit(1)
          print(f"🔑 API key loaded: {api_key[:8]}...")

          input_caption = os.environ.get("INPUT_CAPTION", "").strip()
          model_id = "gemma-4-31b-it"
          url = f"https://generativelanguage.googleapis.com/v1beta/models/{model_id}:generateContent?key={api_key}"

          def call_gemma(parts, max_tokens=1024):
              payload = {
                  "contents": [{"role": "user", "parts": parts}],
                  "generationConfig": {
                      "thinkingConfig": {"thinkingLevel": "HIGH"},
                      "temperature": 0,
                      "maxOutputTokens": max_tokens
                  }
              }
              resp = requests.post(
                  url,
                  headers={"Content-Type": "application/json"},
                  json=payload,
                  timeout=60
              )
              resp.raise_for_status()
              data = resp.json()
              all_text = ""
              for part in data["candidates"][0]["content"]["parts"]:
                  if part.get("thought"):
                      continue
                  all_text += part.get("text", "") + "\n"
              return all_text.strip()

          # ── 2. Ambil frame di detik ke-2 ──────────────────────────
          video_path = "video.mp4"
          cap = cv2.VideoCapture(video_path)
          fps = cap.get(cv2.CAP_PROP_FPS) or 30
          cap.set(cv2.CAP_PROP_POS_FRAMES, int(fps * 2))
          ret, frame = cap.read()
          cap.release()

          if not ret:
              print("❌ Gagal membaca frame video")
              sys.exit(1)

          full_h, full_w = frame.shape[:2]
          print(f"📐 Resolusi frame asli: {full_w}x{full_h}")

          cv2.imwrite("frame.jpg", frame)

          with open("frame.jpg", "rb") as f:
              frame_b64 = base64.b64encode(f.read()).decode("utf-8")

          image_part = {
              "inline_data": {
                  "mime_type": "image/jpeg",
                  "data": frame_b64
              }
          }

          # ── 3. Deteksi batas video (crop) ─────────────────────────
          print("🤖 [1/2] Mendeteksi batas video content...")
          crop_prompt = """Analyze this video frame carefully.

          The frame may contain:
          - A black background/letterbox area (top and/or bottom)
          - A text overlay printed on the black background (above or below the actual video)
          - The actual video content (the real scene/clip, usually a rectangle in the center)

          Your task: identify the bounding box of the ACTUAL VIDEO CONTENT only.
          Exclude the black padding AND any text overlays on the black area.

          Return ONLY a raw JSON object, no markdown, no explanation:
          {"x": <left pixel>, "y": <top pixel>, "w": <width in pixels>, "h": <height in pixels>}"""

          try:
              crop_response = call_gemma([image_part, {"text": crop_prompt}])
              print(f"✅ Raw crop response: {crop_response[:300]}")

              match = re.search(r'\{[^{}]*"x"[^{}]*"y"[^{}]*"w"[^{}]*"h"[^{}]*\}', crop_response, re.DOTALL)
              if not match:
                  raise ValueError(f"JSON crop tidak ditemukan: {crop_response[:300]}")

              bounds = json.loads(match.group(0))
              crop_x = max(0, min(int(bounds["x"]), full_w - 1))
              crop_y = max(0, min(int(bounds["y"]), full_h - 1))
              crop_w = min(int(bounds["w"]), full_w - crop_x)
              crop_h = min(int(bounds["h"]), full_h - crop_y)
              print(f"✅ Crop final: x={crop_x}, y={crop_y}, w={crop_w}, h={crop_h}")

          except Exception as e:
              print(f"⚠️ Deteksi crop gagal: {e} → fallback full frame")
              crop_x, crop_y, crop_w, crop_h = 0, 0, full_w, full_h

          with open("crop_params.txt", "w") as f:
              f.write(f"CROP_W={crop_w}\n")
              f.write(f"CROP_H={crop_h}\n")
              f.write(f"CROP_X={crop_x}\n")
              f.write(f"CROP_Y={crop_y}\n")

          # ── 4. Generate text overlay & caption ────────────────────
          print("🤖 [2/2] Generating text overlay & caption...")

          if input_caption:
              source_text = input_caption
              print(f"ℹ️ Menggunakan input caption manual: '{source_text}'")
              caption_prompt = f"""Convert the following text into 2 engaging versions for social media.
              First: a short, punchy, controversial or funny video hook (max 8 words, suitable as text overlay on a video).
              Second: an engaging Instagram/TikTok caption with relevant hashtags.
              Source text: "{source_text}"
              Respond ONLY with a raw JSON array of exactly 2 strings: ["Short Hook", "Post Caption #hashtag"]
              No markdown, no explanation, just the raw array."""

              try:
                  gen_response = call_gemma([{"text": caption_prompt}], max_tokens=512)
                  print(f"✅ Raw caption response: {gen_response[:300]}")
                  match = re.search(r'\[.*?\]', gen_response, re.DOTALL)
                  if not match:
                      raise ValueError("JSON array tidak ditemukan")
                  result = json.loads(match.group(0))
                  text_overlay = result[0] if result else source_text
                  buffer_caption = result[1] if len(result) > 1 else source_text
              except Exception as e:
                  print(f"⚠️ Generate caption gagal: {e} → pakai source text")
                  text_overlay = source_text
                  buffer_caption = source_text

          else:
              print("ℹ️ Tidak ada caption manual, generate dari visual frame...")
              visual_prompt = """Look at this video frame and:
              1. Understand what this video is about from the visual content and any visible text.
              2. Generate a short punchy video hook (max 8 words) suitable as text overlay.
              3. Generate an engaging Instagram/TikTok caption with relevant hashtags.

              Respond ONLY with a raw JSON array of exactly 2 strings: ["Short Hook", "Post Caption #hashtag"]
              No markdown, no explanation, just the raw array."""

              try:
                  gen_response = call_gemma([image_part, {"text": visual_prompt}], max_tokens=512)
                  print(f"✅ Raw visual caption response: {gen_response[:300]}")
                  match = re.search(r'\[.*?\]', gen_response, re.DOTALL)
                  if not match:
                      raise ValueError("JSON array tidak ditemukan")
                  result = json.loads(match.group(0))
                  text_overlay = result[0] if result else ""
                  buffer_caption = result[1] if len(result) > 1 else ""
              except Exception as e:
                  print(f"⚠️ Generate visual caption gagal: {e} → kosong")
                  text_overlay = ""
                  buffer_caption = "#reels #viral #fyp"

          # Wrap text overlay agar tidak terlalu panjang per baris
          def wrap_text(text, max_chars=35):
              if not text:
                  return ""
              words = text.split()
              lines, current = [], ""
              for word in words:
                  if len(current) + len(word) > max_chars:
                      if current:
                          lines.append(current.strip())
                      current = word + " "
                  else:
                      current += word + " "
              if current.strip():
                  lines.append(current.strip())
              return "\n".join(lines)

          text_overlay_wrapped = wrap_text(text_overlay)

          with open("text_overlay.txt", "w", encoding="utf-8") as f:
              f.write(text_overlay_wrapped)

          with open("buffer_caption.txt", "w", encoding="utf-8") as f:
              f.write(buffer_caption)

          print(f"📝 Text overlay: '{text_overlay_wrapped}'")
          print(f"📝 Buffer caption: '{buffer_caption}'")

          EOF
          python detect_and_caption.py
          cat crop_params.txt >> $GITHUB_ENV

      - name: Process Video with FFmpeg
        run: |
          curl -L -o Arial.ttf "https://github.com/matthieua/WOW-Fonts/raw/master/Arial.ttf"

          if [ ! -s text_overlay.txt ]; then
            echo "ℹ️ Teks overlay kosong, memotong video tanpa teks..."
            ffmpeg -i "video.mp4" \
              -filter_complex "[0:v]crop=${{ env.CROP_W }}:${{ env.CROP_H }}:${{ env.CROP_X }}:${{ env.CROP_Y }},\
                               scale=1080:1920:force_original_aspect_ratio=decrease,\
                               pad=1080:1920:(ow-iw)/2:(oh-ih)/2:white[v]" \
              -map "[v]" -map 0:a -c:a copy output.mp4
          else
            SCALED_H=$(( ${{ env.CROP_H }} * 1080 / ${{ env.CROP_W }} ))
            TOP_PAD=$(( (1920 - SCALED_H) / 2 ))
            if [ $TOP_PAD -lt 0 ]; then TOP_PAD=0; fi
            TOP_CENTER=$(( TOP_PAD / 2 ))
            if [ $TOP_CENTER -lt 80 ]; then TOP_CENTER=80; fi

            echo "📐 Scaled H=$SCALED_H | Top Pad=$TOP_PAD | Text Y=$TOP_CENTER"

            ffmpeg -i "video.mp4" \
              -filter_complex "[0:v]crop=${{ env.CROP_W }}:${{ env.CROP_H }}:${{ env.CROP_X }}:${{ env.CROP_Y }},\
                               scale=1080:1920:force_original_aspect_ratio=decrease,\
                               unsharp=5:5:1.0:5:5:0.0,\
                               pad=1080:1920:(ow-iw)/2:(oh-ih)/2:white,\
                               drawtext=fontfile=Arial.ttf:textfile=text_overlay.txt:x=(w-text_w)/2:y=${TOP_CENTER}-(text_h/2):fontsize=45:fontcolor=black[v]" \
              -map "[v]" -map 0:a -c:a copy output.mp4
          fi

          mv output.mp4 video.mp4

      - name: Delete old release
        if: ${{ github.event.inputs.post_to_buffer == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🗑️ Checking for old releases..."
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            --jq '.[] | select(.tag_name == "buffer_video") | .id' 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting release ID: $RELEASE_ID"
            gh api -X DELETE repos/${{ github.repository }}/releases/$RELEASE_ID || true
            sleep 3
            gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/buffer_video || true
            sleep 3
            echo "✅ Old release deleted"
          else
            echo "ℹ️ No old release found"
          fi

      - name: Upload video to GitHub Release
        if: ${{ github.event.inputs.post_to_buffer == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📦 Creating GitHub release..."
          # Retry loop: kadang tag belum terhapus sempurna
          for i in 1 2 3; do
            gh release create buffer_video \
              --repo "${{ github.repository }}" \
              --title "Buffer Video (Temporary Hosting)" \
              --notes "Temporary hosting for Buffer API. Automatically replaced on next run." \
              video.mp4 && break
            echo "⚠️ Attempt $i gagal, retry dalam 5 detik..."
            sleep 5
          done
          echo "✅ Release created"

      - name: Get video URL from release
        if: ${{ github.event.inputs.post_to_buffer == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 5
          VIDEO_URL=$(gh api repos/${{ github.repository }}/releases/tags/buffer_video \
            --jq '.assets[0].browser_download_url')
          if [ -z "$VIDEO_URL" ] || [ "$VIDEO_URL" = "null" ]; then
            echo "❌ Failed to get video URL from release"
            exit 1
          fi
          echo "VIDEO_URL=${VIDEO_URL}" >> $GITHUB_ENV
          echo "✅ Video URL: ${VIDEO_URL}"

      - name: Upload via Buffer API
        if: ${{ github.event.inputs.post_to_buffer == 'true' }}
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_V2 }}
          VIDEO_URL: ${{ env.VIDEO_URL }}
        run: |
          python3 - <<'PYEOF'
          import os
          import json
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone, timedelta

          api_key = os.environ["BUFFER_API_KEY"]
          video_url = os.environ["VIDEO_URL"]

          channels = [
              {"id": "6a471f4e5ab6d2f1069b6f5e", "platform": "instagram"},
              {"id": "6a48fcaf5ab6d2f106a37232", "platform": "tiktok"}
          ]

          caption = ""
          if os.path.exists("buffer_caption.txt"):
              with open("buffer_caption.txt", "r", encoding="utf-8") as f:
                  caption = f.read().strip()

          due_at = (
              datetime.now(timezone.utc) + timedelta(minutes=2)
          ).strftime("%Y-%m-%dT%H:%M:%S.000Z")

          print(f"📅 Scheduled time : {due_at}")
          print(f"🎬 Video URL      : {video_url}")
          print(f"📝 Caption        : {caption}")

          for ch in channels:
              channel_id = ch["id"]
              platform = ch["platform"]
              print(f"🚀 Processing: {channel_id} ({platform})")

              if platform == "instagram":
                  metadata_str = ", metadata: { instagram: { type: reel, shouldShareToFeed: true } }"
              else:
                  metadata_str = ""

              mutation = (
                  "mutation { createPost(input: {"
                  "  text: " + json.dumps(caption) + ","
                  "  channelId: " + json.dumps(channel_id) + ","
                  "  schedulingType: automatic,"
                  "  mode: customScheduled,"
                  "  dueAt: " + json.dumps(due_at) + ","
                  "  assets: [{ video: { url: " + json.dumps(video_url) + " } }]"
                  + metadata_str +
                  "}) {"
                  "  ... on PostActionSuccess { post { id dueAt } }"
                  "  ... on MutationError { message }"
                  "} }"
              )

              payload = json.dumps({"query": mutation}).encode("utf-8")
              req = urllib.request.Request(
                  "https://api.buffer.com/graphql",
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "Authorization": "Bearer " + api_key,
                  }
              )

              try:
                  with urllib.request.urlopen(req) as res:
                      body = json.loads(res.read().decode("utf-8"))
                  print(f"✅ Buffer response ({channel_id}):")
                  print(json.dumps(body, indent=2))
              except urllib.error.HTTPError as e:
                  print(f"❌ HTTP Error {e.code} for {channel_id}: {e.read().decode()}")
          PYEOF
