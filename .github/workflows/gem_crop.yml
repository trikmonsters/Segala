name: Auto IG & Buffer Post

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Masukkan URL Video Media / Instagram'
        required: true
        default: ''
      caption:
        description: 'Caption opsional (jika kosong, pakai hasil OCR)'
        required: false
        default: ''
      post_to_buffer:
        description: 'Langsung upload ke Buffer?'
        required: true
        default: 'true'

permissions:
  contents: write

jobs:
  process-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgomp1
          pip install opencv-python-headless numpy requests

      - name: Install Playwright Dependencies
        run: |
          npm init -y
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps

      - name: Download Video via Playwright (SSSInstagram)
        run: |
          cat << 'EOF' > download_ig.js
          const { chromium } = require('playwright-extra');
          const stealth = require('puppeteer-extra-plugin-stealth')();
          const fs = require('fs');

          chromium.use(stealth);

          (async () => {
            const igUrl = process.argv[2] || "https://www.instagram.com/reel/DTJ6u-JE-Ta/";
            console.log(`🚀 Memulai proses unduh untuk URL: ${igUrl}`);

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 720 }
            });
            const page = await context.newPage();

            try {
              console.log('🌐 Membuka sssinstagram.com...');
              await page.goto('https://sssinstagram.com/reels-downloader', { waitUntil: 'domcontentloaded', timeout: 30000 });

              const inputSelector = '#input, input.form__input';
              await page.waitForSelector(inputSelector, { timeout: 15000 });
              await page.fill(inputSelector, igUrl);

              console.log('⚡ Mengirim URL dan menunggu proses pemrosesan server...');
              await page.press(inputSelector, 'Enter');

              const downloadBtnSelector = 'a.button__download, a[download="true"]';
              await page.waitForSelector(downloadBtnSelector, { timeout: 45000 });

              const downloadUrl = await page.getAttribute(downloadBtnSelector, 'href');
              console.log('🔗 Link video berhasil didapatkan! Mengunduh file MP4...');

              const response = await context.request.get(downloadUrl);
              const videoBuffer = await response.body();

              fs.writeFileSync('video.mp4', videoBuffer);
              console.log('✅ Video berhasil disimpan sebagai video.mp4');

            } catch (error) {
              console.error('❌ Gagal mengunduh video via SSSInstagram:', error.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF
          node download_ig.js "${{ github.event.inputs.video_url }}"

      # ============================================================
      # STEP BARU: Gemma 4 Vision menggantikan OpenCV Detection
      # ============================================================
      - name: Extract Frame & Detect Video Bounds with Gemma 4
        env:
          GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}
        run: |
          cat << 'EOF' > detect_with_gemma.py
          import cv2
          import base64
          import json
          import os
          import sys
          import requests
          import easyocr

          # ── 1. Ambil frame di detik ke-2 ──────────────────────────
          video_path = "video.mp4"
          cap = cv2.VideoCapture(video_path)
          fps = cap.get(cv2.CAP_PROP_FPS) or 30
          cap.set(cv2.CAP_PROP_POS_FRAMES, int(fps * 2))
          ret, frame = cap.read()
          cap.release()

          if not ret:
              print("❌ Gagal membaca frame video")
              sys.exit(1)

          full_h, full_w = frame.shape[:2]
          print(f"📐 Resolusi frame asli: {full_w}x{full_h}")

          # Simpan frame sebagai JPEG untuk dikirim ke Gemma
          cv2.imwrite("frame.jpg", frame)

          # ── 2. Encode frame ke base64 ──────────────────────────────
          with open("frame.jpg", "rb") as f:
              frame_b64 = base64.b64encode(f.read()).decode("utf-8")

          # ── 3. Kirim ke Gemma 4 Vision via OpenAI-compatible API ──
          api_key = os.environ["GEMMA_API_KEY"]

          prompt = """Analyze this video frame carefully.

The frame may contain:
- A black background/letterbox area (top and/or bottom)
- A text overlay on the black background (above or below the actual video content)
- The actual video content (the real scene/clip)

Your task: identify the bounding box of the ACTUAL VIDEO CONTENT only.
Exclude any black padding/letterbox areas AND any text overlays that appear on the black background.

Return ONLY a raw JSON object, no markdown, no explanation:
{"x": <left pixel>, "y": <top pixel>, "w": <width in pixels>, "h": <height in pixels>}

Where x,y,w,h are integer pixel coordinates of the actual video content area."""

          payload = {
              "model": "gemma-4-31b-it",
              "max_tokens": 256,
              "messages": [
                  {
                      "role": "user",
                      "content": [
                          {
                              "type": "image_url",
                              "image_url": {
                                  "url": f"data:image/jpeg;base64,{frame_b64}"
                              }
                          },
                          {
                              "type": "text",
                              "text": prompt
                          }
                      ]
                  }
              ]
          }

          headers = {
              "Content-Type": "application/json",
              "Authorization": f"Bearer {api_key}"
          }

          # Ganti base_url sesuai provider Gemma kamu (Google AI Studio / Vertex / self-hosted)
          # Contoh Google AI Studio (openai-compatible endpoint):
          GEMMA_BASE_URL = os.environ.get(
              "GEMMA_BASE_URL",
              "https://generativelanguage.googleapis.com/v1beta/openai"
          )

          print(f"🤖 Mengirim frame ke Gemma 4 ({GEMMA_BASE_URL})...")

          try:
              resp = requests.post(
                  f"{GEMMA_BASE_URL}/chat/completions",
                  headers=headers,
                  json=payload,
                  timeout=60
              )
              resp.raise_for_status()
              data = resp.json()
              raw_text = data["choices"][0]["message"]["content"].strip()
              print(f"✅ Respons Gemma: {raw_text}")

              # Bersihkan markdown jika ada
              raw_text = raw_text.replace("```json", "").replace("```", "").strip()
              bounds = json.loads(raw_text)

              crop_x = int(bounds["x"])
              crop_y = int(bounds["y"])
              crop_w = int(bounds["w"])
              crop_h = int(bounds["h"])

              # Validasi: pastikan crop dalam batas frame
              crop_x = max(0, min(crop_x, full_w - 1))
              crop_y = max(0, min(crop_y, full_h - 1))
              crop_w = min(crop_w, full_w - crop_x)
              crop_h = min(crop_h, full_h - crop_y)

              print(f"✅ Crop terdeteksi: x={crop_x}, y={crop_y}, w={crop_w}, h={crop_h}")

          except Exception as e:
              print(f"⚠️ Gemma gagal mendeteksi bounds: {e}")
              print("🔄 Fallback: gunakan seluruh frame")
              crop_x, crop_y, crop_w, crop_h = 0, 0, full_w, full_h

          # ── 4. Simpan crop params ke env ───────────────────────────
          with open("crop_params.txt", "w") as f:
              f.write(f"CROP_W={crop_w}\n")
              f.write(f"CROP_H={crop_h}\n")
              f.write(f"CROP_X={crop_x}\n")
              f.write(f"CROP_Y={crop_y}\n")

          # ── 5. OCR pada area teks (area hitam di atas video) ───────
          # Area teks = dari atas frame sampai batas atas video content
          detected_text = ""
          if crop_y > 20:
              text_area = frame[0:crop_y, 0:full_w]
              try:
                  import easyocr
                  reader = easyocr.Reader(['en'], gpu=False)
                  ocr_results = reader.readtext(text_area, detail=0)
                  detected_text = " ".join(ocr_results).replace("\n", " ").strip()
                  print(f"📝 OCR teks overlay: {detected_text}")
              except Exception as ex:
                  print(f"⚠️ OCR gagal: {ex}")
          else:
              print("ℹ️ Tidak ada area teks di atas video (crop_y <= 20)")

          with open("detected_text.txt", "w", encoding="utf-8") as f:
              f.write(detected_text)

          EOF
          pip install easyocr requests --quiet
          python detect_with_gemma.py
          cat crop_params.txt >> $GITHUB_ENV

      - name: Run Playwright ChatGPT Script
        env:
          INPUT_CAPTION: ${{ github.event.inputs.caption }}
        run: |
          cat << 'EOF' > script.js
          const { chromium } = require('playwright-extra');
          const stealth = require('puppeteer-extra-plugin-stealth')();
          const fs = require('fs');

          chromium.use(stealth);

          function wrapText(text, maxChars = 40) {
            if (!text) return "";
            const words = text.split(' ');
            let lines = [];
            let currentLine = '';

            for (let word of words) {
              if ((currentLine + word).length > maxChars) {
                lines.push(currentLine.trim());
                currentLine = word + ' ';
              } else {
                currentLine += word + ' ';
              }
            }
            if (currentLine.trim()) {
              lines.push(currentLine.trim());
            }
            return lines.join('\n');
          }

          (async () => {
            const inputCaption = process.env.INPUT_CAPTION ? process.env.INPUT_CAPTION.trim() : "";
            let ocrText = "";
            if (fs.existsSync('detected_text.txt')) {
              ocrText = fs.readFileSync('detected_text.txt', 'utf8').trim();
            }

            let sourceText = "";
            if (inputCaption.length > 0) {
              sourceText = inputCaption;
              console.log("ℹ️ Menggunakan input caption sebagai sumber AI.");
            } else if (ocrText.length >= 3) {
              sourceText = ocrText;
              console.log("ℹ️ Menggunakan hasil OCR sebagai sumber AI.");
            } else {
              console.log("⚠️ Input caption kosong & OCR gagal/kosong. Menggunakan fallback hashtag.");
              fs.writeFileSync('text_overlay.txt', '', 'utf8');
              fs.writeFileSync('buffer_caption.txt', '#songs #countrymusic #music', 'utf8');
              return;
            }

            const prompt = `Convert the following text into 2 engaging versions. 
            First version: a short controversial or funny video hook overlay. 
            Second version: an engaging social media post caption based on the text.
            Text source: "${sourceText}"
            Respond ONLY with a raw JSON array containing exactly 2 strings, example: ["Short Hook", "Post Caption"]. Do not include markdown blocks, do not include "json" formatting text, just the raw array.`;

            const browser = await chromium.launch({ 
              headless: true,
              args: ['--disable-blink-features=AutomationControlled', '--no-sandbox', '--disable-setuid-sandbox']
            });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 720 },
              locale: 'en-US'
            });
            const page = await context.newPage();

            try {
              console.log("🌐 Membuka ChatGPT...");
              await page.goto('https://chatgpt.com/', { waitUntil: 'domcontentloaded', timeout: 60000 });

              const inputSelector = 'div#prompt-textarea, textarea[placeholder*="Message ChatGPT"], [contenteditable="true"]';
              await page.waitForSelector(inputSelector, { timeout: 30000 });
              
              console.log("⌨️ Memasukkan prompt ke ChatGPT...");
              await page.fill(inputSelector, prompt);
              await page.waitForTimeout(1000);
              
              const sendButtonSelector = 'button[data-testid="send-button"], button[aria-label="Send message"]';
              if (await page.locator(sendButtonSelector).count() > 0) {
                await page.click(sendButtonSelector);
              } else {
                await page.press(inputSelector, 'Enter');
              }
              
              console.log("⏳ Menunggu AI memproses jawaban secara natural...");
              const stopStreamingSelector = 'button[aria-label="Stop generating"], button[data-testid="stop-button"]';
              
              try { await page.waitForSelector(stopStreamingSelector, { timeout: 5000 }); } catch(e) {}
              await page.waitForSelector(stopStreamingSelector, { state: 'detached', timeout: 60000 });
              
              const responseSelector = 'article [data-message-author-role="assistant"], div.markdown, .agent-turn';
              await page.waitForSelector(responseSelector, { timeout: 15000 });
              
              const responses = await page.locator(responseSelector).all();
              if (responses.length > 0) {
                let lastResponseText = await responses[responses.length - 1].innerText();
                console.log("✅ Respons didapatkan!");
                
                if (lastResponseText.includes('```')) {
                    const parts = lastResponseText.split('```');
                    lastResponseText = parts[1];
                    if (lastResponseText.startsWith('json')) {
                        lastResponseText = lastResponseText.substring(4);
                    }
                }
                lastResponseText = lastResponseText.trim();

                try {
                    const parsedJson = JSON.parse(lastResponseText);
                    const videoHook = parsedJson[0] || sourceText;
                    const bufferCap = parsedJson[1] || sourceText;

                    fs.writeFileSync('text_overlay.txt', wrapText(videoHook), 'utf8');
                    fs.writeFileSync('buffer_caption.txt', bufferCap, 'utf8');
                } catch (e) {
                    const cleanText = lastResponseText.replace(/[\[\]"]/g, '').split('\n')[0] || sourceText;
                    fs.writeFileSync('text_overlay.txt', wrapText(cleanText), 'utf8');
                    fs.writeFileSync('buffer_caption.txt', cleanText, 'utf8');
                }
              } else {
                throw new Error("Response element not found");
              }
            } catch (error) {
              console.error("❌ Terjadi kesalahan pada Skrip Playwright:", error.message);
              fs.writeFileSync('text_overlay.txt', wrapText(sourceText), 'utf8');
              fs.writeFileSync('buffer_caption.txt', sourceText, 'utf8');
            } finally {
              await browser.close();
            }
          })();
          EOF
          node script.js

      - name: Process Video with FFmpeg
        run: |
          curl -L -o Arial.ttf "https://github.com/matthieua/WOW-Fonts/raw/master/Arial.ttf"
          
          if [ ! -s text_overlay.txt ]; then
            echo "ℹ️ Teks overlay kosong, memotong video tanpa menambahkan teks..."
            ffmpeg -i "video.mp4" \
              -filter_complex "[0:v]crop=${{ env.CROP_W }}:${{ env.CROP_H }}:${{ env.CROP_X }}:${{ env.CROP_Y }}, \
                               scale=1080:-1, \
                               pad=1080:1920:(ow-iw)/2:(oh-ih)/2:white" \
              -c:a copy output.mp4
          else
            SCALED_H=$(( ${{ env.CROP_H }} * 1080 / ${{ env.CROP_W }} ))
            
            TOP_PAD=$(( (1920 - SCALED_H) / 2 ))
            if [ $TOP_PAD -lt 0 ]; then TOP_PAD=0; fi
            
            TOP_CENTER=$(( TOP_PAD / 2 ))
            
            if [ $TOP_CENTER -lt 80 ]; then TOP_CENTER=80; fi
            
            echo "📐 Analisis Frame: Tinggi Scaled=$SCALED_H px | Putih Atas=$TOP_PAD px | Target Pusat Y=$TOP_CENTER px"
            
            ffmpeg -i "video.mp4" \
              -filter_complex "[0:v]crop=${{ env.CROP_W }}:${{ env.CROP_H }}:${{ env.CROP_X }}:${{ env.CROP_Y }}, \
                               scale=1080:-1, \
                               unsharp=5:5:1.0:5:5:0.0, \
                               pad=1080:1920:(ow-iw)/2:(oh-ih)/2:white, \
                               drawtext=fontfile=Arial.ttf:textfile=text_overlay.txt:x=(w-text_w)/2:y=${TOP_CENTER}-(text_h/2):fontsize=45:fontcolor=black" \
              -c:a copy output.mp4
          fi

          mv output.mp4 video.mp4
          
      - name: Delete old release
        if: ${{ github.event.inputs.post_to_buffer == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "🗑️ Checking for old releases..."
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            --jq '.[] | select(.tag_name == "buffer_video") | .id' 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting release ID: $RELEASE_ID"
            gh api -X DELETE repos/${{ github.repository }}/releases/$RELEASE_ID
            sleep 2
            gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/buffer_video || true
            sleep 2
            echo "✅ Old release deleted"
          else
            echo "ℹ️ No old release found"
          fi

      - name: Upload video to GitHub Release
        if: ${{ github.event.inputs.post_to_buffer == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "📦 Creating GitHub release..."
          gh release create buffer_video \
            --repo "${{ github.repository }}" \
            --title "Buffer Video (Temporary Hosting)" \
            --notes "Temporary hosting for Buffer API. Automatically replaced on next run." \
            video.mp4
          echo "✅ Release created successfully"

      - name: Get video URL from release
        if: ${{ github.event.inputs.post_to_buffer == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          sleep 5
          VIDEO_URL=$(gh api repos/${{ github.repository }}/releases/tags/buffer_video \
            --jq '.assets[0].browser_download_url')
          if [ -z "$VIDEO_URL" ] || [ "$VIDEO_URL" = "null" ]; then
            echo "❌ Failed to get video URL from release"
            exit 1
          fi
          echo "VIDEO_URL=${VIDEO_URL}" >> $GITHUB_ENV
          echo "✅ Video URL: ${VIDEO_URL}"

      - name: Upload via Buffer API
        if: ${{ github.event.inputs.post_to_buffer == 'true' }}
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_V2 }}
          VIDEO_URL: ${{ env.VIDEO_URL }}
        run: |
          set -e
          echo "📤 Sending to Buffer API..."
          python3 - <<'PYEOF'
          import os
          import json
          import sys
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone, timedelta

          api_key = os.environ["BUFFER_API_KEY"]
          video_url = os.environ["VIDEO_URL"]

          channels = [
              {"id": "6a471f4e5ab6d2f1069b6f5e", "platform": "instagram"},
              {"id": "6a48fcaf5ab6d2f106a37232", "platform": "tiktok"}
          ]

          caption = ""
          if os.path.exists("buffer_caption.txt"):
              with open("buffer_caption.txt", "r", encoding="utf-8") as f:
                  caption = f.read().strip()

          due_at = (
              datetime.now(timezone.utc) + timedelta(minutes=2)
          ).strftime("%Y-%m-%dT%H:%M:%S.000Z")

          print(f"📅 Scheduled time : {due_at}")
          print(f"🎬 Video URL      : {video_url}")
          print(f"📝 Caption        : {caption}")

          for ch in channels:
              channel_id = ch["id"]
              platform = ch["platform"]
              print(f"🚀 Processing channel: {channel_id} ({platform})")
              
              if platform == "instagram":
                  metadata_str = ", metadata: { instagram: { type: reel, shouldShareToFeed: true } }"
              else:
                  metadata_str = ""

              mutation = (
                  "mutation { createPost(input: {"
                  "  text: " + json.dumps(caption) + ","
                  "  channelId: " + json.dumps(channel_id) + ","
                  "  schedulingType: automatic,"
                  "  mode: customScheduled,"
                  "  dueAt: " + json.dumps(due_at) + ","
                  "  assets: [{ video: { url: " + json.dumps(video_url) + " } }]"
                  + metadata_str +
                  "}) {"
                  "  ... on PostActionSuccess { post { id dueAt } }"
                  "  ... on MutationError { message }"
                  "} }"
              )

              payload = json.dumps({"query": mutation}).encode("utf-8")

              req = urllib.request.Request(
                  "https://api.buffer.com/graphql",
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "Authorization": "Bearer " + api_key,
                  }
              )

              try:
                  with urllib.request.urlopen(req) as res:
                      body = json.loads(res.read().decode("utf-8"))
                  print(f"✅ Buffer API Response for {channel_id}:")
                  print(json.dumps(body, indent=2))
              except urllib.error.HTTPError as e:
                  print(f"❌ HTTP Error {e.code} for channel {channel_id}: {e.read().decode()}")
                  continue
          PYEOF
