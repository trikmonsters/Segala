- name: Extract Frame & Detect Video Bounds with Gemma 4
        env:
          GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}
        run: |
          pip install opencv-python-headless requests easyocr --quiet
          
          cat << 'EOF' > detect_with_gemma.py
          import cv2
          import base64
          import json
          import os
          import sys
          import requests

          # ── 1. Ambil frame di detik ke-2 ──────────────────────────
          video_path = "video.mp4"
          cap = cv2.VideoCapture(video_path)
          fps = cap.get(cv2.CAP_PROP_FPS) or 30
          cap.set(cv2.CAP_PROP_POS_FRAMES, int(fps * 2))
          ret, frame = cap.read()
          cap.release()

          if not ret:
              print("❌ Gagal membaca frame video")
              sys.exit(1)

          full_h, full_w = frame.shape[:2]
          print(f"📐 Resolusi frame asli: {full_w}x{full_h}")

          cv2.imwrite("frame.jpg", frame)

          # ── 2. Encode frame ke base64 ──────────────────────────────
          with open("frame.jpg", "rb") as f:
              frame_b64 = base64.b64encode(f.read()).decode("utf-8")

          # ── 3. Kirim ke Gemma 4 via native Gemini API ─────────────
          api_key = os.environ["GEMMA_API_KEY"]
          model_id = "gemma-4-31b-it"

          prompt = """Analyze this video frame carefully.

          The frame may contain:
          - A black background/letterbox area (top and/or bottom)
          - A text overlay printed on the black background (above or below the actual video)
          - The actual video content (the real scene/clip, usually a rectangle in the center)

          Your task: identify the bounding box of the ACTUAL VIDEO CONTENT only.
          Exclude the black padding AND any text overlays on the black area.

          Return ONLY a raw JSON object, no markdown, no explanation:
          {"x": <left pixel>, "y": <top pixel>, "w": <width in pixels>, "h": <height in pixels>}"""

          payload = {
              "contents": [
                  {
                      "role": "user",
                      "parts": [
                          {
                              "inline_data": {
                                  "mime_type": "image/jpeg",
                                  "data": frame_b64
                              }
                          },
                          {
                              "text": prompt
                          }
                      ]
                  }
              ],
              "generationConfig": {
                  "thinkingConfig": {
                      "thinkingLevel": "HIGH"
                  },
                  "temperature": 0,
                  "maxOutputTokens": 256
              }
          }

          url = f"https://generativelanguage.googleapis.com/v1beta/models/{model_id}:generateContent?key={api_key}"

          print(f"🤖 Mengirim frame ke {model_id} (native Gemini API)...")

          try:
              resp = requests.post(
                  url,
                  headers={"Content-Type": "application/json"},
                  json=payload,
                  timeout=60
              )
              resp.raise_for_status()
              data = resp.json()

              # Ambil text, skip thinking block
              raw_text = ""
              for part in data["candidates"][0]["content"]["parts"]:
                  if part.get("thought"):
                      continue
                  raw_text = part.get("text", "").strip()
                  break

              print(f"✅ Respons Gemma: {raw_text}")

              raw_text = raw_text.replace("```json", "").replace("```", "").strip()
              bounds = json.loads(raw_text)

              crop_x = int(bounds["x"])
              crop_y = int(bounds["y"])
              crop_w = int(bounds["w"])
              crop_h = int(bounds["h"])

              # Validasi dalam batas frame
              crop_x = max(0, min(crop_x, full_w - 1))
              crop_y = max(0, min(crop_y, full_h - 1))
              crop_w = min(crop_w, full_w - crop_x)
              crop_h = min(crop_h, full_h - crop_y)

              print(f"✅ Crop terdeteksi: x={crop_x}, y={crop_y}, w={crop_w}, h={crop_h}")

          except Exception as e:
              print(f"⚠️ Gemma gagal: {e}")
              if 'resp' in locals() and hasattr(resp, 'text'):
                  print(f"🔍 Detail error: {resp.text[:500]}")
              print("🔄 Fallback: gunakan seluruh frame")
              crop_x, crop_y, crop_w, crop_h = 0, 0, full_w, full_h

          # ── 4. Simpan crop params ──────────────────────────────────
          with open("crop_params.txt", "w") as f:
              f.write(f"CROP_W={crop_w}\n")
              f.write(f"CROP_H={crop_h}\n")
              f.write(f"CROP_X={crop_x}\n")
              f.write(f"CROP_Y={crop_y}\n")

          # ── 5. OCR hanya pada area teks di atas video ─────────────
          detected_text = ""
          if crop_y > 20:
              text_area = frame[0:crop_y, 0:full_w]
              try:
                  import easyocr
                  reader = easyocr.Reader(['en'], gpu=False)
                  ocr_results = reader.readtext(text_area, detail=0)
                  detected_text = " ".join(ocr_results).replace("\n", " ").strip()
                  print(f"📝 OCR teks overlay: {detected_text}")
              except Exception as ex:
                  print(f"⚠️ OCR gagal: {ex}")
          else:
              print("ℹ️ Tidak ada area teks di atas video (crop_y <= 20)")

          with open("detected_text.txt", "w", encoding="utf-8") as f:
              f.write(detected_text)
          EOF
          
          python detect_with_gemma.py
          cat crop_params.txt >> $GITHUB_ENV
