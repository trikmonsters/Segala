name: Generate Gemini Narrative

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Target Language (e.g., English, Indonesian, Spanish)'
        required: true
        default: 'Indonesian'
      topic:
        description: 'The raw topic data for the narrative'
        required: true
        default: 'Dark Psychology of Social Validation'

jobs:
  send-request:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create JSON request payload
      run: |
        # Menggunakan env untuk menghindari isu escaping character pada bash
        cat << 'EOF' > request.json
        {
            "model": "models/gemini-3.5-flash",
            "input": "You are a combination of an elite YouTube Growth Strategist, a rigorous\nbehavioral scientist, and a master of psychological narrative design. Write a\nhighly immersive, continuous psychological narrative in fluent, native-level\n${{ github.event.inputs.language }} based on this raw topic data: \"${{ github.event.inputs.topic }}\"\n\nSTRICT FACTUAL & SEO GUARDRAILS (ALGORITHM AUTHORITY LOCK):\n\n1.  ANCHOR ON FACTS: The narrative must be strictly rooted in real, proven\n    psychological phenomena, cognitive biases, or evolutionary biology data. Do\n    not invent fake science or wild fictions.\n2.  SEO KEYWORD RETENTION: Intelligently weave core semantic keywords related to\n    \"${{ github.event.inputs.topic }}\" naturally throughout the text. This ensures search engines index\n    the video correctly.\n3.  ANTI-TOPIC CHAOS: Maintain strict thematic consistency. Every paragraph must\n    tightly serve the core premise of \"${{ github.event.inputs.topic }}\" without drifting into unrelated\n    psychological sub-topics, ensuring the YouTube algorithm establishes clear\n    niche authority for this channel.\n\nSTRICT NARRATIVE & RETENTION RULES:\n\n1.  HOOK TECHNIQUE (START IN THE MIDDLE): Do not start with a greeting,\n    preamble, or introduction. Start immediately in the middle of an intense,\n    ongoing psychological simulation or crisis to hook the viewer from second\n    one.\n2.  VALUE RETENTION: To maximize audience retention, the narrative must open by\n    delivering the second-best insight/point of the topic right in the first\n    paragraph.\n3.  Every subsequent paragraph must begin with a cold, piercing psychological\n    insight — NOT a generic question.\n4.  Treat human emotions as physical phenomena. Use architectural, biological,\n    and quantum metaphors. Avoid cliché filler phrases.\n\nSTRICT TTS-PIPELINE FORMAT RULES (MICRO-CHUNKING & ANTI-SPEED BUG):\n\n1.  Every single paragraph MUST begin with an aggressive insight AND be preceded\n    by a specific TTS audio directive bracket.\n2.  CRITICAL VISUAL & SPEED CONTROL: Each paragraph MUST be ultra-short,\n    consisting of ONLY 2 to 3 sentences maximum. Never let sentences pile up\n    into many lines. Immediately hit Enter to start a new paragraph with a new\n    tag.\n3.  Every single tag MUST explicitly include the instruction \"STRICTLY SLOW\n    pace\" to lock the AI engine's reading speed and prevent it from speeding up\n    over time.\n4.  Output ONLY the narrative text. Target length: 2000+ words.\n\nCYCLE THROUGH THESE EXACT TAGS FOR THE SCRIPTS:\n\n  - Paragraph 1 (The Hook): [hook tone, commanding volume, STRICTLY SLOW pace,\n    start in the middle delivery]\n  - Next body paragraphs (alternate dynamically between these short 2-3 sentence\n    blocks):\n      - [cold analytical tone, piercing delivery, STRICTLY SLOW pace, deliberate\n        pauses]\n      - [assertive tone, exposing the truth, STRICTLY SLOW pace, heavy cadence]\n      - [chilling tone, psychological exposure, cynical edge, STRICTLY SLOW\n        calculated delivery]\n      - [rhetorical tone, STRICTLY SLOW pace, long philosophical pause]\n  - Final Paragraph: [final authoritative tone, heavy cadence, EXTREMELY SLOW\n    powerful conclusion]\n\nCRITICAL SAFETY VALVE (CONVERSATIONAL KILL-SWITCH):\n\n  - Do not, under any circumstances, act like a helpful chat assistant at the\n    end.\n  - PROHIBITED: Do not include any out-of-character text, follow-up questions,\n    closing offers, conversational pleasantries, menus, or invitations for\n    discussion.\n  - The final word of the actual story under the [final authoritative tone] tag\n    MUST be the absolute final character of your entire output. Stop generating\n    immediately after that word. 2000+ words.\n",
            "tools": [
                {
                    "type": "google_search"
                }
            ],
            "generation_config": {
                "max_output_tokens": 65536,
                "thinking_level": "high"
            }
        }
        EOF

    - name: Execute cURL Request to Gemini API
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        curl -X POST \
        -H "Content-Type: application/json" \
        "https://generativelanguage.googleapis.com/v1beta/interactions?key=${GEMINI_API_KEY}" \
        -d @request.json
