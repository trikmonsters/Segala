name: YouTube Shorts Downloader & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Create Automation Script
        run: |
          cat << 'EOF' > automation.js
          const { chromium } = require('playwright');
          const path = require('path');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            console.log('Membuka target URL...');
            await page.goto('https://media.ytmp3.gg/tools/youtube-shorts-downloader/cvswxo', { waitUntil: 'networkidle' });

            // 1. Ubah Toggle ke MP4 berdasarkan elemen bocoran baru
            console.log('Menunggu elemen format toggle...');
            const mp4BtnSelector = '.format-toggle button[data-format="mp4"]';
            await page.waitForSelector(mp4BtnSelector, { state: 'visible', timeout: 10000 });
            
            console.log('Mengklik tombol format MP4...');
            await page.click(mp4BtnSelector);

            // 2. Centang Checkbox Copyright
            console.log('Menunggu dan mencentang checkbox copyright...');
            const checkboxSelector = '#copyright-consent-checkbox';
            await page.waitForSelector(checkboxSelector, { state: 'attached', timeout: 5000 });
            
            const isChecked = await page.isChecked(checkboxSelector);
            if (!isChecked) {
              await page.click(checkboxSelector);
              console.log('Checkbox copyright berhasil dicentang.');
            } else {
              console.log('Checkbox copyright sudah aktif.');
            }

            // 3. Isi Input URL YouTube Shorts
            console.log('Mengisi URL YouTube Shorts...');
            await page.fill('#videoUrl', 'https://youtube.com/shorts/SKM6R96p0tM');

            // 4. Tekan Enter untuk Submit Form
            console.log('Menekan Enter untuk memproses...');
            await page.press('#videoUrl', 'Enter');

            // 5. Menunggu dinamis hingga tombol download muncul (maksimal 2 menit)
            console.log('Menunggu tombol download muncul (maksimal 2 menit)...');
            await page.waitForSelector('#download-btn', { state: 'visible', timeout: 120000 });
            console.log('Tombol download ditemukan!');

            // 6. Proses Download File Video
            console.log('Memulai proses pengunduhan berkas...');
            const downloadPromise = page.waitForEvent('download');
            await page.click('#download-btn');
            const download = await downloadPromise;

            // Simpan video ke direktori kerja
            const downloadPath = path.join(__dirname, 'video_shorts.mp4');
            await download.saveAs(downloadPath);
            console.log(`Video berhasil diunduh dan disimpan di: ${downloadPath}`);

            // Ambil screenshot sebagai bukti akhir proses sukses
            await page.screenshot({ path: 'hasil_sukses.png', fullPage: true });

            await browser.close();
          })();
          EOF

      - name: Run Automation Script
        run: node automation.js

      - name: Get Current Date for Release Tag
        id: date
        run: echo "tag=v$(date +'%Y.%m.%d.%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload Video
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.tag }}
          name: "Downloaded Shorts - ${{ steps.date.outputs.tag }}"
          body: "Hasil otomatisasi download YouTube Shorts menggunakan Playwright dan GitHub Actions."
          draft: false
          prerelease: false
          files: |
            video_shorts.mp4
            hasil_sukses.png
