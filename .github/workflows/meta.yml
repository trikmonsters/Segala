name: Generate Images with MetaAI

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Image generation prompt'
        required: true
        type: string
      image_count:
        description: 'Number of images to generate'
        required: false
        default: '1'
        type: string

jobs:
  generate-images:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install git+https://github.com/mir-ashiq/metaai-api.git -v
          pip list | grep -i metaai
      
      - name: Load cookies from secret
        run: |
          cat > cookies.json << 'EOF'
          ${{ secrets.Cookie }}
          EOF
          echo "✅ Cookies file created"
      
      - name: Generate images
        run: |
          python << 'PYTHON_EOF'
          import json
          from metaai import MetaAI
          
          # Load cookies from file
          with open('cookies.json', 'r') as f:
              cookies_array = json.load(f)
          
          # Convert array to dictionary
          cookies_dict = {}
          for cookie in cookies_array:
              cookies_dict[cookie['name']] = cookie['value']
          
          print("✅ Cookies loaded successfully")
          print(f"Available cookies: {list(cookies_dict.keys())}\n")
          
          try:
              # Initialize MetaAI
              ai = MetaAI(cookies=cookies_dict)
              
              # Get inputs from workflow
              prompt = "${{ github.event.inputs.prompt }}"
              image_count = int("${{ github.event.inputs.image_count }}")
              
              print(f"Generating {image_count} image(s)...")
              print(f"Prompt: {prompt}\n")
              
              # Generate image
              response = ai.generate_image(
                  prompt=prompt,
                  num_images=image_count
              )
              
              print("✅ Image generation successful!")
              print(json.dumps(response, indent=2))
              
              # Save response to file
              with open('image_response.json', 'w') as f:
                  json.dump(response, f, indent=2)
              
          except Exception as e:
              print(f"❌ Error: {str(e)}")
              import traceback
              traceback.print_exc()
              raise
          PYTHON_EOF
      
      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: generated-images
          path: |
            image_response.json
            cookies.json
          retention-days: 30
      
      - name: Print summary
        if: always()
        run: |
          echo "## 📊 Image Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Prompt**: ${{ github.event.inputs.prompt }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Count**: ${{ github.event.inputs.image_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: $([ -f image_response.json ] && echo '✅ Success' || echo '❌ Failed')" >> $GITHUB_STEP_SUMMARY
