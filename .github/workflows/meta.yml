name: Meta AI Image Generator (Using API & Secret)

on:
  workflow_dispatch:
    inputs:
      prompt_text:
        description: 'AI Image Prompt'
        required: true
        default: 'cat address'
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install metaai-api requests

    - name: Run Meta AI Script
      env:
        FB_COOKIE: ${{ secrets.Cookie }}
        PROMPT_TEXT: ${{ github.event.inputs.prompt_text }}
      run: |
        python - << 'EOF'
        import os
        import json
        import requests
        from metaai import MetaAI

        # Buat folder untuk menampung gambar laporan
        os.makedirs('output_images', exist_ok=True)

        prompt = os.environ.get('PROMPT_TEXT', 'cat address')
        fb_cookie = os.environ.get('FB_COOKIE', '')

        print(f"Menginisialisasi Meta AI API dengan prompt: {prompt}")

        try:
            # Jika cookie di Github Secret berbentuk JSON String hasil export, 
            # kita satukan kembali menjadi format cookie string biasa.
            try:
                cookie_json = json.loads(fb_cookie)
                cookie_string = "; ".join([f"{c['name']}={c['value']}" for c in cookie_json])
                print("Berhasil mendeteksi dan memproses format JSON Cookie.")
            except Exception:
                # Jika inputnya sudah teks mentah (name=value;), gunakan langsung
                cookie_string = fb_cookie
                print("Menggunakan cookie format teks mentah.")

            if not cookie_string.strip():
                raise ValueError("Cookie kosong! Pastikan Anda sudah mengisi GitHub Secret bernama 'Cookie'.")

            # Inisialisasi API menggunakan FB Cookie agar bisa generate Image
            ai = MetaAI(fb_cookie=cookie_string)
            
            print("Mengirim prompt ke Meta AI...")
            response = ai.prompt(message=prompt)
            
            print("Respon diterima dari API.")

            # Cari URL gambar di dalam respon API
            image_url = None
            if isinstance(response, dict):
                image_url = response.get('image') or response.get('image_url')
            
            if image_url:
                print(f"Gambar ditemukan! Mengunduh dari: {image_url}")
                img_data = requests.get(image_url).content
                
                # Simpan gambar fisik ke folder agar bisa dikirim ke release
                output_path = 'output_images/01_final_result.jpg'
                with open(output_path, 'wb') as handler:
                    handler.write(img_data)
                print(f"Gambar berhasil disimpan di {output_path}")
            else:
                print("Gagal mendeteksi URL gambar dari respon API. Menyimpan teks respon sebagai laporan.")
                with open('output_images/api_response.txt', 'w') as f:
                    f.write(str(response))

        except Exception as e:
            print(f"Terjadi error: {e}")
            with open('output_images/error_log.txt', 'w') as f:
                f.write(f"Error terjadi saat eksekusi: {str(e)}")
            exit(1)
        EOF

    - name: Upload Report Images to Github Release
      uses: softprops/action-gh-release@v2
      if: always()
      with:
        tag_name: run-${{ github.run_id }}
        name: "Meta AI API Report #${{ github.run_number }}"
        files: output_images/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
