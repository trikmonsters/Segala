name: Generate Image with Meta AI

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Image prompt'
        required: true
        type: string
      image_count:
        description: 'Number of images to generate'
        required: false
        default: '1'
        type: string

jobs:
  generate-image:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install git+https://github.com/mir-ashiq/metaai-api.git
      
      - name: Save Cookie to File
        run: |
          cat > cookies.json << 'COOKIE_EOF'
          ${{ secrets.Cookie }}
          COOKIE_EOF
      
      - name: Generate Image
        run: |
          python << 'EOF'
          import json
          from metaai import MetaAI
          
          # Load cookie dari file
          with open('cookies.json', 'r') as f:
              cookies_array = json.load(f)
          
          # Convert array format ke dictionary
          cookies_dict = {}
          for cookie in cookies_array:
              cookies_dict[cookie['name']] = cookie['value']
          
          print("✅ Cookies loaded successfully")
          print(f"Available cookies: {list(cookies_dict.keys())}\n")
          
          try:
              # Initialize MetaAI
              ai = MetaAI(cookies=cookies_dict)
              
              # Generate image
              prompt = "${{ github.event.inputs.prompt }}"
              image_count = int("${{ github.event.inputs.image_count }}")
              
              print(f"Generating {image_count} image(s)...")
              print(f"Prompt: {prompt}\n")
              
              response = ai.generate_image(
                  prompt=prompt,
                  num_images=image_count
              )
              
              print("✅ Image generation successful!")
              print(json.dumps(response, indent=2))
              
              # Save response to file
              with open('image_response.json', 'w') as f:
                  json.dump(response, f, indent=2)
              
          except Exception as e:
              print(f"❌ Error: {str(e)}")
              import traceback
              traceback.print_exc()
              raise
          EOF
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-images
          path: image_response.json
          retention-days: 30
      
      - name: Display results
        if: always()
        run: |
          if [ -f image_response.json ]; then
            echo "=== Generation Results ==="
            cat image_response.json
          else
            echo "⚠️  No results file generated"
          fi
