name: Generate Video Gratis
on:
  workflow_dispatch: # Jalankan manual dari tombol GitHub
    inputs:
      prompt:
        description: 'Teks deskripsi video'
        required: true
        default: 'A cute panda eating bamboo, cinematic'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: pip install gradio_client
      
    - name: Generate Video via HF API
      run: |
        python -c "
        from gradio_client import Client
        # Menggunakan API gratis dari salah satu space Hugging Face (Ganti sesuai nama space yang aktif)
        client = Client('ZhipuAI/CogVideoX-5b-Space')
        result = client.predict(
            prompt='${{ github.event.inputs.prompt }}',
            api_name='/generate_video'
        )
        print('Video berhasil dibuat di jalur:', result)
        "
