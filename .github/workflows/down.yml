name: YT Shorts Downloader

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Chromium
        run: |
          npx playwright install chromium --with-deps

      - name: Run Playwright
        run: |
          cat > script.mjs <<'EOF'
          import fs from "fs";
          import { chromium } from "playwright";

          const SHORT_URL =
            "https://youtube.com/shorts/CIbeRYMGfbk";

          fs.mkdirSync("downloads", {
            recursive: true
          });

          const browser = await chromium.launch({
            headless: true,
            args: [
              "--no-sandbox",
              "--disable-dev-shm-usage"
            ]
          });

          const context = await browser.newContext({
            acceptDownloads: true,
            viewport: {
              width: 1366,
              height: 768
            }
          });

          const page = await context.newPage();

          context.on("page", p => {
            console.log(
              "NEW PAGE:",
              p.url()
            );
          });

          page.on("console", msg => {
            console.log(
              "BROWSER:",
              msg.text()
            );
          });

          await page.goto(
            "https://ytshortsdl.io/",
            {
              waitUntil: "domcontentloaded",
              timeout: 60000
            }
          );

          const input =
            page.locator("input").first();

          await input.waitFor({
            timeout: 30000
          });

          await input.fill(
            SHORT_URL
          );

          await input.press(
            "Enter"
          );

          console.log(
            "Waiting download button..."
          );

          await page.waitForFunction(() => {
            const btn =
              document.querySelector(
                "button.download"
              );

            return (
              btn &&
              btn.offsetParent !==
                null
            );
          }, {
            timeout: 120000
          });

          console.log(
            "Download button found"
          );

          await page.screenshot({
            path:
              "download-button-visible.png",
            fullPage: true
          });

          const downloadButton =
            page.locator(
              "button.download"
            );

          console.log(
            "FIRST CLICK"
          );

          let popup = null;

          try {
            const popupPromise =
              page.waitForEvent(
                "popup",
                {
                  timeout: 10000
                }
              );

            await downloadButton.click({
              force: true
            });

            popup =
              await popupPromise;

            console.log(
              "Affiliate popup:",
              popup.url()
            );

            await popup.waitForLoadState(
              "domcontentloaded"
            ).catch(() => {});

            await popup.screenshot({
              path:
                "affiliate-popup.png",
              fullPage: true
            });

            await popup.close();

            console.log(
              "Popup closed"
            );
          } catch {
            console.log(
              "No popup detected"
            );
          }

          await page.waitForTimeout(
            3000
          );

          console.log(
            "SECOND CLICK"
          );

          let downloaded =
            false;

          try {
            const downloadPromise =
              page.waitForEvent(
                "download",
                {
                  timeout: 30000
                }
              );

            await downloadButton.click({
              force: true
            });

            const download =
              await downloadPromise;

            const file =
              `downloads/${download.suggestedFilename()}`;

            await download.saveAs(
              file
            );

            console.log(
              "DOWNLOADED:",
              file
            );

            downloaded =
              true;
          } catch (
            error
          ) {
            console.log(
              "No browser download event"
            );
          }

          await page.screenshot({
            path:
              "after-second-click.png",
            fullPage: true
          });

          fs.writeFileSync(
            "page.html",
            await page.content()
          );

          const links =
            await page
              .locator("a")
              .evaluateAll(
                els =>
                  els.map(el => ({
                    text:
                      el.innerText,
                    href:
                      el.href
                  }))
              );

          fs.writeFileSync(
            "links.json",
            JSON.stringify(
              links,
              null,
              2
            )
          );

          if (
            !downloaded
          ) {
            console.log(
              "Dumping links..."
            );

            console.log(
              JSON.stringify(
                links,
                null,
                2
              )
            );
          }

          await browser.close();
          EOF

          node script.mjs

      - name: Upload debug files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug
          path: |
            *.png
            *.html
            *.json

      - name: Upload downloaded files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: downloads
          path: downloads/
