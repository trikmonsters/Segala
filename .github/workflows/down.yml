name: YT Shorts Downloader

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Chromium
        run: |
          npx playwright install chromium --with-deps

      - name: Run Playwright
        run: |
          cat > script.mjs <<'EOF'
          import fs from "fs";
          import { chromium } from "playwright";

          const SHORT_URL =
            "https://youtube.com/shorts/CIbeRYMGfbk";

          fs.mkdirSync("downloads", {
            recursive: true
          });

          const browser = await chromium.launch({
            headless: true,
            args: [
              "--no-sandbox",
              "--disable-dev-shm-usage"
            ]
          });

          const context = await browser.newContext({
            acceptDownloads: true,
            viewport: {
              width: 1366,
              height: 768
            }
          });

          const page = await context.newPage();

          page.on("console", msg => {
            console.log("BROWSER:", msg.text());
          });

          page.on("request", req => {
            console.log("REQ:", req.url());
          });

          page.on("response", res => {
            console.log("RES:", res.status(), res.url());
          });

          console.log("Open website...");

          await page.goto(
            "https://ytshortsdl.io/",
            {
              waitUntil: "domcontentloaded",
              timeout: 60000
            }
          );

          await page.waitForLoadState();

          const input = page.locator("input").first();

          await input.waitFor({
            timeout: 30000
          });

          await input.fill(SHORT_URL);

          console.log("Press Enter...");

          await input.press("Enter");

          console.log(
            "Waiting for download button..."
          );

          await page.waitForFunction(() => {
            const btn =
              document.querySelector(
                "button.download"
              );

            return (
              btn &&
              btn.offsetParent !== null
            );
          }, {
            timeout: 120000
          });

          console.log(
            "Download button detected"
          );

          await page.screenshot({
            path: "download-button-visible.png",
            fullPage: true
          });

          fs.writeFileSync(
            "page.html",
            await page.content()
          );

          const downloadButton =
            page.locator(
              "button.download"
            );

          await downloadButton.click({
            force: true
          });

          console.log(
            "Download button clicked"
          );

          await page.waitForTimeout(10000);

          const links =
            await page.locator("a")
              .evaluateAll(els =>
                els.map(el => ({
                  text:
                    el.innerText,
                  href:
                    el.href
                }))
              );

          fs.writeFileSync(
            "links.json",
            JSON.stringify(
              links,
              null,
              2
            )
          );

          console.log(
            JSON.stringify(
              links,
              null,
              2
            )
          );

          await page.screenshot({
            path: "after-click.png",
            fullPage: true
          });

          const downloadPromise =
            page.waitForEvent(
              "download",
              {
                timeout: 15000
              }
            ).catch(() => null);

          const dl =
            await downloadPromise;

          if (dl) {
            const file =
              "downloads/" +
              dl.suggestedFilename();

            await dl.saveAs(file);

            console.log(
              "Downloaded:",
              file
            );
          } else {
            console.log(
              "No browser download event detected."
            );
          }

          await browser.close();
          EOF

          node script.mjs

      - name: Upload debug files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-files
          path: |
            *.png
            *.html
            *.json

      - name: Upload downloaded files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: downloaded-files
          path: downloads/
