name: Loop Video Audio for SoundOn

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan workflow ini secara manual dari tab Actions

jobs:
  process-audio:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Extract, Loop, and Master Audio
      run: |
        # Mendefinisikan nama file input sesuai request
        INPUT_FILE="Soft_Breath_of_Pines.mp4"

        # 1. Pastikan file input ada di repositori
        if [ ! -f "$INPUT_FILE" ]; then
          echo "Error: File $INPUT_FILE tidak ditemukan di root repositori!"
          exit 1
        fi

        echo "Mengekstrak audio asli ke WAV kualitas studio (24-bit PCM, 48kHz)..."
        ffmpeg -i "$INPUT_FILE" -vn -acodec pcm_s24le -ar 48000 single_track.wav

        echo "Membuat file konfigurasi untuk looping..."
        # Membuat daftar gabungan untuk mengulang track sebanyak 4 kali
        for i in {1..4}; do echo "file 'single_track.wav'" >> file_list.txt; done

        echo "Menggabungkan (looping) audio sebanyak 4 kali tanpa penurunan kualitas..."
        # Menggunakan opsi -c copy agar audio digabung langsung tanpa kompresi ulang (lossless)
        ffmpeg -f concat -safe 0 -i file_list.txt -c copy Soft_Breath_of_Pines_Master.wav

        echo "Proses selesai. File siap untuk di-upload ke SoundOn."

    - name: Upload Master Audio to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: soundon-master-audio
        path: Soft_Breath_of_Pines_Master.wav
        retention-days: 5
