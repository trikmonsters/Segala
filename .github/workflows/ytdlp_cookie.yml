name: Download Video (YouTube Shorts / IG Reels)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL YouTube Shorts atau Instagram Reels'
        required: true
        type: string

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Deno (~2 detik)
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Setup FFmpeg Resmi - Menggunakan 'github-token' yang valid
      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Download yt-dlp Binary Standar (~2 detik)
      - name: Install yt-dlp Binary
        run: |
          mkdir -p ~/.local/bin
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/.local/bin/yt-dlp
          chmod +x ~/.local/bin/yt-dlp
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download Video with yt-dlp
        run: |
          # Format -f fleksibel untuk YouTube (Video+Audio) maupun Instagram (Single Stream)
          yt-dlp --cookies ./cookie.txt \
                 --remote-components ejs:github \
                 -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/b/best" \
                 --merge-output-format mp4 \
                 -o "downloads/%(title)s.%(ext)s" \
                 "${{ inputs.url }}"

      - name: Upload Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: downloads/*.mp4
          retention-days: 7
