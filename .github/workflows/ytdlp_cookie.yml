name: Download YouTube Shorts

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL YouTube Shorts'
        required: true
        type: string

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Install Deno (JS Runtime resmi yang direkomendasikan yt-dlp)
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install FFmpeg & yt-dlp dengan EJS
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          # Menginstall yt-dlp beserta pustaka EJS challenge solver
          pip install --upgrade "yt-dlp[default]" yt-dlp-ejs

      - name: Download Shorts with yt-dlp
        run: |
          yt-dlp --cookies ./cookie.txt \
                 --remote-components ejs:github \
                 -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --merge-output-format mp4 \
                 -o "downloads/%(title)s.%(ext)s" \
                 "${{ inputs.url }}"

      - name: Upload Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-shorts
          path: downloads/*.mp4
          retention-days: 7
