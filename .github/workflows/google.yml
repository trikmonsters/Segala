name: Playwright Google AI Mode Chat

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: |
        npm init -y
        npm install playwright playwright-extra puppeteer-extra-plugin-stealth
        npx playwright install --with-deps chromium

    - name: Run Playwright Script
      run: |
        cat << 'EOF' > script.js
        const { chromium } = require('playwright-extra');
        const stealth = require('puppeteer-extra-plugin-stealth')();
        chromium.use(stealth);
        const fs = require('fs');

        (async () => {
          if (!fs.existsSync('screenshots')) {
            fs.mkdirSync('screenshots');
          }

          const browser = await chromium.launch({ 
            headless: true,
            args: [
              '--no-sandbox', 
              '--disable-setuid-sandbox',
              '--disable-blink-features=AutomationControlled'
            ]
          });
          
          const context = await browser.newContext({
            viewport: { width: 1280, height: 1000 },
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
            locale: 'en-US' // Menggunakan en-US agar sesuai dengan placeholder "Ask anything" di gambar
          });
          
          const page = await context.newPage();
          
          try {
            console.log("Membuka Google AI Mode...");
            await page.goto('https://www.google.com/aimode', { waitUntil: 'networkidle' });
            await page.screenshot({ path: 'screenshots/1_aimode_home.png', fullPage: true });

            console.log("Mencari kolom input chat...");
            // Menargetkan input berdasarkan placeholder "Ask anything" yang terlihat di gambar ERROR_SEARCH.png
            const chatInput = page.locator('textarea[placeholder*="Ask anything"], [contenteditable="true"], input[placeholder*="Ask anything"]').first();
            
            console.log("Memasukkan prompt analisis...");
            const promptText = `berikut url youtube yang harus anda analisis, berikan ringkasan dan intro. Beserta image prompt untuk video tersebut. Tulis respons dalam json only. Url: https://youtube.com/shorts/VxY4OOYCpIw`;
            
            await chatInput.fill(promptText);
            await page.screenshot({ path: 'screenshots/2_prompt_diisi.png', fullPage: false });

            console.log("Mengirim prompt (Enter)...");
            await chatInput.press('Enter');
            
            console.log("Menunggu respon dari Google AI selama 10 detik...");
            await page.waitForTimeout(10000); 
            
            console.log("Mengambil screenshot hasil akhir...");
            await page.screenshot({ path: 'screenshots/3_hasil_respon.png', fullPage: true });
            console.log("Selesai!");

          } catch (error) {
            console.error("Terjadi error:", error.message);
            await page.screenshot({ path: 'screenshots/ERROR_AIMODE.png', fullPage: true });
            process.exit(1);
          } finally {
            await browser.close();
            console.log("Browser ditutup.");
          }
        })();
        EOF

        node script.js

    - name: Create GitHub Release and Upload Screenshots
      if: always()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ai-mode-chat-${{ github.run_id }}-${{ github.run_number }}
        name: Hasil Chat Google AI Mode - Run #${{ github.run_number }}
        body: |
          Hasil eksekusi chat langsung ke Google AI Mode:
          - **1_aimode_home.png**: Tampilan awal halaman `/aimode`.
          - **2_prompt_diisi.png**: Kondisi saat prompt berhasil diketik ke dalam kolom input.
          - **3_hasil_respon.png**: Tampilan hasil jawaban AI setelah menunggu 10 detik.
        files: |
          screenshots/1_aimode_home.png
          screenshots/2_prompt_diisi.png
          screenshots/3_hasil_respon.png
          screenshots/ERROR_AIMODE.png
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
