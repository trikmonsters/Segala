name: Playwright Google AI News Analyzer

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'Masukkan URL YouTube yang akan dianalisis'
        required: true
        default: 'https://youtube.com/shorts/VxY4OOYCpIw'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: |
        npm init -y
        npm install playwright playwright-extra puppeteer-extra-plugin-stealth
        npx playwright install --with-deps chromium

    - name: Run Playwright Script
      env:
        YOUTUBE_URL: ${{ github.event.inputs.youtube_url }}
      run: |
        cat << 'EOF' > script.js
        const { chromium } = require('playwright-extra');
        const stealth = require('puppeteer-extra-plugin-stealth')();
        chromium.use(stealth);

        (async () => {
        const targetUrl = process.env.YOUTUBE_URL || 'https://youtube.com/shorts/VxY4OOYCpIw';
        const browser = await chromium.launch({ 
        headless: true,
        args: [
        '--no-sandbox', 
        '--disable-setuid-sandbox',
        '--disable-blink-features=AutomationControlled'
        ]
        });
        const context = await browser.newContext({
        viewport: { width: 1280, height: 1000 },
        userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
        locale: 'id-ID'
        });
        const page = await context.newPage();
        try {
        await page.goto('https://www.google.com/aimode', { waitUntil: 'networkidle' });
        const chatInput = page.locator('textarea.ITIRGe, textarea[placeholder="Tanyakan apa saja"]').first();
        await chatInput.waitFor({ state: 'visible', timeout: 5000 });
        const promptText = `Saya memiliki video berita dengan link: ${targetUrl}. Buatkan naskah intro berita (maksimal 15 detik) dengan gaya bahasa formal, profesional, hard news journalism, objektif, authoritative, dan credible. Struktur: Hook kuat -> Konteks utama -> Call to action menonton. Berikan juga Voice Over Script (naskah narasi siap dibacakan) dan Social Media Metadata. Untuk kebutuhan visual pendukung, buatkan satu AI Image Prompt with Text yang sangat detail, spesifik, dan komprehensif untuk generator gambar AI modern seperti Midjourney/DALL-E 3. Prompt ini wajib menggabungkan deskripsi komposisi visual latar belakang berita yang dramatis (style, lighting, camera angle, resolution) sekaligus instruksi tipografi teks overlay (maksimal 1-3 baris kalimat berita yang impactful, kontras, menggunakan tanda kutip, jenis font bold sans-serif, warna teks, posisi layout) agar menghasilkan satu kesatuan desain thumbnail yang utuh, optimal, tajam, mudah dibaca, dan sempurna. Format respons wajib menggunakan skema JSON berikut tanpa modifikasi struktur:
        {
        "intro_segment": {
          "voice_over_script": "[naskah intro]",
          "ai_image_prompt_with_text": "[Tulis di sini prompt gambar AI super detail, panjang, dan komprehensif yang menginstruksikan pembuatan visual latar belakang berita dan pencetakan teks overlay secara langsung di atas gambar untuk hasil akhir thumbnail berita yang sempurna]"
          },
        "social_media_metadata": {
          "title": "[judul menarik dan profesional]",
          "description": "[deskripsi lengkap dengan konteks dan call-to-action]",
          "tags": ["tag1", "tag2", "tag3"],
          "seo_keywords": ["keyword1", "keyword2"]
          }
        }`;
        await chatInput.fill(promptText);
        await chatInput.press('Enter');
        const codeBlock = page.locator('pre, code, .json').first();
        await codeBlock.waitFor({ state: 'visible', timeout: 60000 });
        console.log("\n=================== HASIL RESPONS GOOGLE AI ===================");
        const aiResponseText = await codeBlock.innerText();
        console.log(aiResponseText);
        console.log("===============================================================\n");
        } catch (error) {
        console.error("Terjadi error atau timeout saat menunggu respons:", error.message);
        try {
        const fallbackBlock = page.locator('pre, code, .json').first();
        if (await fallbackBlock.isVisible()) {
        console.log("\n=================== HASIL RESPONS (FALLBACK) ===================");
        console.log(await fallbackBlock.innerText());
        console.log("================================================================\n");
        } else {
        const bodyText = await page.evaluate(() => document.body.innerText);
        const jsonStartIndex = bodyText.indexOf("{\n\"intro_segment\"");
        if (jsonStartIndex !== -1) {
        console.log("\n=================== HASIL RESPONS (TEXT EXTRACT) ===================");
        console.log(bodyText.substring(jsonStartIndex));
        console.log("====================================================================\n");
        }
        }
        } catch (fallbackError) {
        console.error("Gagal melakukan fallback extraction:", fallbackError.message);
        }
        process.exit(1);
        } finally {
        await browser.close();
        }
        })();
        EOF
        node script.js
