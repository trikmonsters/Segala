name: Playwright Google Test

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: |
        npm init -y
        npm install playwright playwright-extra puppeteer-extra-plugin-stealth
        npx playwright install --with-deps chromium

    - name: Run Playwright Script
      run: |
        cat << 'EOF' > script.js
        const { chromium } = require('playwright-extra');
        const stealth = require('puppeteer-extra-plugin-stealth')();
        chromium.use(stealth);
        const fs = require('fs');

        (async () => {
          if (!fs.existsSync('screenshots')) {
            fs.mkdirSync('screenshots');
          }

          const browser = await chromium.launch({ 
            headless: true,
            args: [
              '--no-sandbox', 
              '--disable-setuid-sandbox',
              '--disable-blink-features=AutomationControlled'
            ]
          });
          
          const context = await browser.newContext({
            viewport: { width: 1280, height: 800 },
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
            locale: 'id-ID'
          });
          
          const page = await context.newPage();
          
          try {
            console.log("Membuka Google...");
            await page.goto('https://www.google.com', { waitUntil: 'networkidle' });
            
            console.log("Mengambil screenshot halaman utama...");
            await page.screenshot({ path: 'screenshots/1_google_home.png', fullPage: true });
            console.log("Screenshot sukses disimpan.");

          } catch (error) {
            console.error("Terjadi error:", error.message);
            process.exit(1);
          } finally {
            await browser.close();
            console.log("Browser ditutup.");
          }
        })();
        EOF

        node script.js

    - name: Compress Screenshots
      if: always()
      run: |
        zip -r screenshots.zip screenshots/

    - name: Create GitHub Release and Upload Screenshots
      if: always()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: test-google-${{ github.run_id }}-${{ github.run_number }}
        name: Test Buka Google - Run #${{ github.run_number }}
        body: |
          Silakan unduh `screenshots.zip` di bawah untuk melihat tampilan awal Google dari IP GitHub Actions.
        files: screenshots.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
