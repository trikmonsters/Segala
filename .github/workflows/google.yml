name: Playwright Google AI Search Test

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: |
        npm init -y
        npm install playwright playwright-extra puppeteer-extra-plugin-stealth
        npx playwright install --with-deps chromium

    - name: Run Playwright Script
      run: |
        cat << 'EOF' > script.js
        const { chromium } = require('playwright-extra');
        const stealth = require('puppeteer-extra-plugin-stealth')();
        chromium.use(stealth);
        const fs = require('fs');

        (async () => {
          if (!fs.existsSync('screenshots')) {
            fs.mkdirSync('screenshots');
          }

          const browser = await chromium.launch({ 
            headless: true,
            args: [
              '--no-sandbox', 
              '--disable-setuid-sandbox',
              '--disable-blink-features=AutomationControlled'
            ]
          });
          
          const context = await browser.newContext({
            viewport: { width: 1280, height: 1000 },
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
            locale: 'id-ID'
          });
          
          const page = await context.newPage();
          
          try {
            console.log("Membuka Google...");
            await page.goto('https://www.google.com/aimode', { waitUntil: 'networkidle' });
            
            console.log("Mencari kolom input pencarian...");
            const searchInput = page.locator('textarea[name="q"], input[name="q"]').first();
            
            console.log("Mengetik kata kunci...");
            await searchInput.fill('apa itu ikan moli');
            await page.screenshot({ path: 'screenshots/2_search_typed.png', fullPage: false });

            console.log("Menekan Enter untuk mencari...");
            await searchInput.press('Enter');
            
            await page.waitForNavigation({ waitUntil: 'networkidle' });
            await page.waitForTimeout(5000); 
            
            console.log("Mengambil screenshot hasil pencarian...");
            await page.screenshot({ path: 'screenshots/3_search_results.png', fullPage: true });
            console.log("Selesai!");

          } catch (error) {
            console.error("Terjadi error:", error.message);
            await page.screenshot({ path: 'screenshots/ERROR_SEARCH.png', fullPage: true });
            process.exit(1);
          } finally {
            await browser.close();
            console.log("Browser ditutup.");
          }
        })();
        EOF

        node script.js

    - name: Create GitHub Release and Upload Screenshots
      if: always()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: test-search-${{ github.run_id }}-${{ github.run_number }}
        name: Test Search Google - Run #${{ github.run_number }}
        body: |
          Hasil screenshot langsung tanpa ZIP:
          - Silakan klik `3_search_results.png` di bawah untuk melihat hasil pencarian Google.
        files: |
          screenshots/2_search_typed.png
          screenshots/3_search_results.png
          screenshots/ERROR_SEARCH.png
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
