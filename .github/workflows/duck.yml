name: duck.ai Playwright image flow (single pipeline)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      PROMPT: "sunset ocean landscape illustration style"
      TARGET_URL: "https://duck.ai/"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps + Playwright
        run: |
          set -e
          sudo apt-get update
          npm init -y
          npm i -D @playwright/test
          npx playwright install --with-deps

      - name: Write Playwright project files
        run: |
          set -e
          mkdir -p tests playwright-report artifacts

          cat > playwright.config.ts <<'EOF'
          import { defineConfig } from '@playwright/test';
          export default defineConfig({
            testDir: './tests',
            timeout: 180000,
            use: {
              headless: true,
              screenshot: 'off',
              trace: 'off',
              viewport: { width: 1400, height: 900 }
            },
            reporter: [['list']]
          });
          EOF

          cat > tests/duckai-image-flow.spec.ts <<'EOF'
          import { test, Page } from '@playwright/test';
          import fs from 'fs';
          import path from 'path';

          const TARGET_URL = process.env.TARGET_URL || 'https://duck.ai/';
          const PROMPT = process.env.PROMPT || 'sunset ocean landscape illustration style';

          const SELECTORS = {
            toolsBtn: '[data-testid="duckai-tools-button"]',
            // After tools opens, look for "Generate Image" option (English)
            generateImageOption: 'button:has-text("Generate Image"), [role="menuitem"]:has-text("Generate Image"), text=/Generate Image/i'
          };

          function ensureDir(p: string) {
            fs.mkdirSync(p, { recursive: true });
          }

          async function stepScreenshot(page: Page, artifactsDir: string, name: string) {
            ensureDir(artifactsDir);
            const file = path.join(artifactsDir, `${name}.png`);
            await page.screenshot({ path: file, fullPage: true });
          }

          test('duck.ai generate image flow', async ({ page }) => {
            const artifactsDir = path.join(process.cwd(), 'artifacts', `run-${Date.now()}`);
            ensureDir(artifactsDir);
            let pageContent = '';

            try {
              test.step('01 open page', async () => {
                await page.goto(TARGET_URL, { waitUntil: 'networkidle', timeout: 60000 }).catch(() => {});
                await page.waitForTimeout(2000);
                await stepScreenshot(page, artifactsDir, '01-open-page');
              });

              test.step('02 open tools + select Generate Image', async () => {
                const toolsBtn = page.locator(SELECTORS.toolsBtn).first();
                await toolsBtn.waitFor({ state: 'visible', timeout: 30000 }).catch(() => {});
                await toolsBtn.click().catch(() => {});
                await page.waitForTimeout(800);

                const opt = page.locator(SELECTORS.generateImageOption).first();
                await opt.waitFor({ state: 'visible', timeout: 30000 }).catch(() => {});
                await opt.click({ timeout: 30000 }).catch(() => {});

                await page.waitForTimeout(1000);
                await stepScreenshot(page, artifactsDir, '02-activate-feature');
              });

              test.step('03 type prompt + press Enter', async () => {
                const input = page.locator('textarea, input[type="text"], [contenteditable="true"]').first();
                await input.waitFor({ state: 'visible', timeout: 30000 }).catch(() => {});
                await input.click().catch(() => {});

                // clear existing text
                await page.keyboard.press('Control+A').catch(() => {});
                await input.fill('').catch(() => {});

                await input.type(PROMPT, { delay: 10 }).catch(() => {});
                await page.keyboard.press('Enter').catch(() => {});

                await page.waitForTimeout(1000);
                await stepScreenshot(page, artifactsDir, '03-prompt-enter');
              });

              test.step('04 wait result appears', async () => {
                const result = page.locator('img, canvas, [data-testid*="image"]').first();
                await result.waitFor({ state: 'visible', timeout: 180000 }).catch(() => {});
                await stepScreenshot(page, artifactsDir, '04-result');
              });

              // Capture page content safely after all steps complete
              test.step('05 capture page content', async () => {
                await page.waitForTimeout(500);
                pageContent = await page.content().catch(() => '<html><!-- Content unavailable --></html>');
              });
            } catch (error) {
              console.error('Test error:', error);
            }

            // Write page content outside of test steps to avoid navigation conflicts
            try {
              fs.writeFileSync(
                path.join(artifactsDir, 'page-content.html'),
                pageContent,
                'utf8'
              );
            } catch (error) {
              console.error('Failed to write page content:', error);
            }
          });
          EOF

      - name: Run Playwright
        if: always()
        run: |
          set -e
          mkdir -p artifacts playwright-report
          npx playwright test --reporter=list || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: duckai-e2e-artifacts
          path: |
            artifacts
            playwright-report
            test-results

      - name: Create Release (screenshots + report)
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: duckai-image-${{ github.run_id }}
          name: duckai-image ${{ github.run_id }}
          generate_release_notes: true
          files: |
            artifacts/**/*.png
            artifacts/**/*.html
            playwright-report/**/*
