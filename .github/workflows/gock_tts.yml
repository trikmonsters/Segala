name: Generate Psychology Audio to Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Date Tag
        id: vars
        run: |
          echo "tag=audio-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      # Langkah 1: Menyimpan teks mentah sesuai format baru Anda secara presisi
      - name: Create Raw Prompt Text File
        run: |
          cat << 'EOF' > prompt.txt
          Read the following transcript based on the audio profile and director's note. Maintain a 100% stable, robust, and well-mastered output volume from the very first word to the absolute last word. Prevent any automatic volume fade-outs at the end of sentences by sustaining vocal presence during pauses.

          # Audio Profile
          An elite, cold, and deeply analytical narrator for a premium YouTube Dark Psychology channel. The voice is deep, commanding, highly intellectual, and speaks directly into the listener's mind with absolute authority.
          
          # Director's note
          - Style: Academic yet chilling, authoritative, crystal-clear articulation with a professional broadcast cadence.
          - Pace: Calculated and deliberate. Uses strategic, brief pauses after punctuation to let the weight of the words sink in.
          - Accent: Neutral, flawless English.
          - Volume: Fixed, full-bodied amplitude. No whispering that drops below baseline decibels, no robotic flatness.
          
          ## Transcript:
          
          [hook tone, direct eye-contact delivery, commanding volume] Picture This. You are standing in the middle of a room packed with people you know. They are laughing, sharing stories, and suddenly fall dead silent the exact moment you walk toward them. Their eyes shift, and the conversation resumes as if you were nothing but thin air.
          
          [cold analytical tone, piercing delivery] The pain you feel in that exact moment is visceral, sharp, and physically crushing. Yet, here is the most controversial truth modern psychology refuses to sugarcoat: the agony of being ostracized is not actually created by the cruelty of others, but by your own fragile ego and an evolutionary brain refusing to grow up.
          
          [assertive tone, exposing the truth] Modern humans love to view themselves as fiercely independent. We proudly echo the cliché phrase, "I don't care what people think." However, that is the single biggest lie we tell ourselves. When social exclusion hits, our immediate knee-jerk reaction is to blame the environment. We label the group as toxic, malicious, or completely devoid of empathy.
          
          [rhetorical tone, philosophical pause, sharp articulation] But let us dissect this with cold, clinical logic: why should the opinion of an external group dictate the destruction of your day?
          
          [educational tone, scientific authority] The answer lies in an evolutionary glitch. Your brain is still operating on a primitive system designed hundreds of thousands of years ago. During the Stone Age, being exiled from the tribe meant starving to death or being eaten by predators. Your prehistoric brain fundamentally equates "not being invited to lunch" with "literal physical death."
          
          [intense logic tone, debunking illusion, steady volume] Here is the controversy: the people excluding you are not trying to kill you. They are simply living their own lives, driven by their own narcissistic self-interests. The pain you experience is the result of your brain failing to separate an actual survival threat from a minor social rejection. You suffer not because they are evil, but because you allow a caveman's survival instinct to dictate your self-worth in the modern world.
          
          [chilling tone, psychological exposure, cynical edge] There is a bizarre, destructive satisfaction that comes with feeling cast out. Psychology identifies this as a full-blown victim mentality. As you sit alone in the corner of the room staring blankly at your phone, a quiet, sinister voice in your head whispers: "Look at how cruel they are, and look at how pure and innocent I am for enduring this."
          
          [sharp diagnostic tone, confronting the listener] Playing the victim is comfortable. Why? Because being a victim absolves you of all personal responsibility.
          
          [final authoritative tone, heavy cadence, powerful conclusion] If you have no friends, it is because they are too exclusive and cliquey. If your career stalls, it is because office politics are actively sabotaging you. If you are lonely, it is because the world is too harsh for your deeply sensitive soul.
          EOF

      # Langkah 2: Mengompilasi payload JSON secara aman lewat Python
      - name: Safe Compile Request JSON
        run: |
          python3 -c '
          import json
          with open("prompt.txt", "r") as f:
              text_content = f.read()
          
          payload = {
              "contents": [{
                  "role": "user",
                  "parts": [{"text": text_content}]
              }],
              "generationConfig": {
                  "responseModalities": ["audio"],
                  "temperature": 0.9,
                  "speechConfig": {
                      "voiceConfig": {
                          "prebuiltVoiceConfig": {
                              "voiceName": "Aoede"
                          }
                      }
                  }
              }
          }
          with open("request.json", "w") as f:
              json.dump(payload, f)
          '

      # Langkah 3: Eksekusi Request Tunggal (Aman RPM/RPD)
      - name: Fetch Audio Data from Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Request ke Gemini API menggunakan format generateContent biasa agar respons utuh terkumpul
          curl -s -X POST \
            -H "Content-Type: application/json" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${GEMINI_API_KEY}" \
            -d @request.json > response.json

          if grep -q '"error"' response.json || ! grep -q '"inlineData"' response.json; then
            echo "❌ ERROR: Respons tidak valid!"
            cat response.json
            exit 1
          fi

          jq -r '.candidates[0].content.parts[0].inlineData.data' response.json | base64 --decode > raw_audio.pcm

      # Instalasi Dependensi FFmpeg
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # Langkah 4: Finalisasi Kontainer Wadah Audio menjadi MP3 Normal
      - name: Convert Raw PCM to Playable MP3 via FFmpeg
        run: |
          ffmpeg -f s16le -ar 24000 -ac 1 -i raw_audio.pcm -b:a 128k yt_psychology_narration.mp3
          echo "✅ Sukses mengonversi audio mentah menjadi MP3 yang valid."

      # Langkah 5: Publikasi ke GitHub Release
      - name: Create GitHub Release and Upload Audio
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Psychology Audio Narration (${{ steps.vars.outputs.date }})
          body: |
            Automated Voice Generation using Gemini 2.5 Pro Preview TTS.
            **Prompt Optimization:** High Stability Amplitude Custom.
            **Voice Character:** Aoede
          draft: false
          prerelease: false
          files: yt_psychology_narration.mp3
