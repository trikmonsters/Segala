name: Generate Psychology Audio to Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Date Tag
        id: vars
        run: |
          echo "tag=audio-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      # Langkah 1: Menyimpan teks mentah sesuai format baru Anda secara presisi
      - name: Create Raw Prompt Text File
        run: |
          cat << 'EOF' > prompt.txt
          Read the following transcript based on the audio profile and director's note. Maintain a 100% stable, robust, and well-mastered output volume from the very first word to the absolute last word. Prevent any automatic volume fade-outs at the end of sentences by sustaining vocal presence during pauses.

          # Audio Profile
          An elite, cold, and deeply analytical narrator for a premium YouTube Dark Psychology channel. The voice is deep, commanding, highly intellectual, and speaks directly into the listener's mind with absolute authority.
          
          # Director's note
          - Style: Academic yet chilling, authoritative, crystal-clear articulation with a professional broadcast cadence.
          - Pace: Calculated and deliberate. Uses strategic, brief pauses after punctuation to let the weight of the words sink in.
          - Accent: Neutral, flawless English.
          - Volume: Fixed, full-bodied amplitude. No whispering that drops below baseline decibels, no robotic flatness.
          
          ## Transcript:
          [hook tone, direct eye-contact delivery, commanding volume]Free will is an illusion of comfort built upon the foundation of a decaying memory. Human consciousness functions like an obsolete projector in an empty theater, constantly replaying past traumas while convincing itself that it is writing a new script. When you step into the digital space today, you are not searching for information; you are surrendering your neural architecture to be mapped by predictive algorithms. Every click, every scroll pause lasting mere milliseconds, is a surrender of cognitive sovereignty that triggers a mechanical release of dopamine. The geometry of our minds has been hacked, transformed into a linear labyrinth where the exit is deliberately designed as a mirror reflecting our own desperationcold analytical tone, piercing delivery]Human emotions are not abstract spiritual vibrations, but a biochemical calculus subject to the laws of thermodynamic neural degradation. Sorrow acts like a heavy sediment buildup in the cerebral ventricles, slowing synaptic transmission until time feels frozen in the density of mercury. We assume we miss someone, when we are merely experiencing a violent neurochemical withdrawal from a broken homeostasis. The prefrontal cortex drafts grand romantic narratives simply to mask the biological panic of an organism terrified of isolation in empty space. Under the existential microscope, love is nothing more than a mathematical function attempting to solve the fear of death by dividing the burden of loneliness with another mortal entity.
          [assertive tone, exposing the truth]Regret erodes the structural integrity of the ego through a process of slow yet absolute quantum decay. Every flawed decision acts as a gravitational anomaly within the personal timeline, pulling the entire perception of the present into a dense black hole of remorse. The human mind is a flawed architecture from the very beginning, designed to store pain in ultra-high resolution while letting happiness fade in a blurred memory compression. Our nerves remember the vibration of humiliation with mechanical precision, multiplying the echoes of guilt until its frequency breaches the most solid walls of psychological defense. You cannot escape the past because your nervous system is the past itself, hardened into flesh and trauma.
          [chilling tone, psychological exposure, cynical edge]The need for social validation is a biological binding chain that mutilates individual uniqueness for the survival of the primitive herd. When public opinion shifts, the brain structure undergoes micro-shrinkage due to the massive surge of cortisol released through the adrenal glands. We willingly excise the most honest parts of our consciousness, discarding them into the trash bin of personal history, simply to fit the mass-approved cognitive mold. Modern identity is now merely a collage of forced compliance, a fragile hologram that cracks when placed under the pressure of absolute isolation. Those who feel the most liberated are actually those whose chains fit most perfectly with the anatomy of their obedience.
          [rhetorical tone, philosophical pause]Silence is a vacuum where human internal lies are forced to friction against the mechanical reality of the universe. When external stimulation is stripped away, the mind immediately generates anxiety hallucinations to fill the void, proving that the ego cannot bear to see its true face without the mask of distraction. We construct noisy concrete cities and create technology that never sleeps just to silence the existential heartbeat that constantly reminds us of nothingness. In absolute quietude, the physics of consciousness begins to collapse, revealing that behind all ambition, achievement, and big names, there is only a terrified biological engine waiting to run out of organic battery power.
          EOF

      # Langkah 2: Mengompilasi payload JSON secara aman lewat Python
      - name: Safe Compile Request JSON
        run: |
          python3 -c '
          import json
          with open("prompt.txt", "r") as f:
              text_content = f.read()
          
          payload = {
              "contents": [{
                  "role": "user",
                  "parts": [{"text": text_content}]
              }],
              "generationConfig": {
                  "responseModalities": ["audio"],
                  "temperature": 0.9,
                  "speechConfig": {
                      "voiceConfig": {
                          "prebuiltVoiceConfig": {
                              "voiceName": "Aoede"
                          }
                      }
                  }
              }
          }
          with open("request.json", "w") as f:
              json.dump(payload, f)
          '

      # Langkah 3: Eksekusi Request Tunggal (Aman RPM/RPD)
      - name: Fetch Audio Data from Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${GEMINI_API_KEY}" \
            -d @request.json > response.json

          if grep -q '"error"' response.json || ! grep -q '"inlineData"' response.json; then
            echo "❌ ERROR: Respons tidak valid!"
            cat response.json
            exit 1
          fi

          jq -r '.candidates[0].content.parts[0].inlineData.data' response.json | base64 --decode > raw_audio.pcm

      # Instalasi Dependensi FFmpeg
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # Langkah 4: Finalisasi Kontainer Wadah Audio menjadi MP3 Normal
      - name: Convert Raw PCM to Playable MP3 via FFmpeg
        run: |
          ffmpeg -f s16le -ar 24000 -ac 1 -i raw_audio.pcm -b:a 128k yt_psychology_narration.mp3
          echo "✅ Sukses mengonversi audio mentah menjadi MP3 yang valid."

      # Langkah 5: Publikasi ke GitHub Release
      - name: Create GitHub Release and Upload Audio
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Psychology Audio Narration (${{ steps.vars.outputs.date }})
          body: |
            Automated Voice Generation using Gemini 2.5 Pro Preview TTS.
            **Prompt Optimization:** High Stability Amplitude Custom.
            **Voice Character:** Aoede
          draft: false
          prerelease: false
          files: yt_psychology_narration.mp3
