name: Generate Psychology Audio to Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Date Tag
        id: vars
        run: |
          echo "tag=audio-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      # Langkah 1: Menyimpan teks mentah ke file terpisah agar aman
      - name: Create Raw Prompt Text File
        run: |
          cat << 'EOF' > prompt.txt
          Read the following transcript based on the audio profile and director's note.

          # Audio Profile
          A deep, resonant narrator of mysteries.

          # Director's note
          Style: Professional, authoritative, clear articulation with standard broadcast cadence. Pace: Natural conversational pace. Accent: Neutral.

          ## Scene:
          # ROLE & VOICE CHARACTER
          Act as an elite, cold, and deeply intellectual narrator for a YouTube Dark Psychology channel. Your voice must sound authoritative, analytical, and gripping—like a clinical psychologist revealing an uncomfortable truth. Speak directly to a single listener, cutting through their illusions.

          # AUDIO CONTEXT & ATMOSPHERE
          - Scene: A quiet, minimalist study room at midnight. The mood is serious, reflective, and raw.
          - Tone: Cold logic, unsympathetic truth, deeply immersive, and psychologically piercing.

          # DELIVERY DIRECTIVES (YOUTUBE RETENTION OPTIMIZED)
          - Cadence: Deliver with a professional broadcast cadence. Use strategic, lingering pauses immediately after punctuation (. , :) to let the controversial facts "sink in" and build tension.
          - Pace & Volume: Relaxed, unhurried, and perfectly steady volume. Do not rush the heavy words.
          - Articulation: Crystal clear, neutral accent. Every syllable must be sharp and distinct.
          - RESTRICTIONS (STRICT): No theatrical acting, no dramatic whispering, and no robotic flatness. Avoid sudden spikes in energy or artificial warmth. Maintain a hauntingly consistent, calm, and steady vocal tone from the first word to the last
    
          ## Transcript:
          Picture This. You are standing in the middle of a room packed with people you know. They are laughing, sharing stories, and suddenly fall dead silent the exact moment you walk toward them. Their eyes shift, and the conversation resumes as if you were nothing but thin air.
          The pain you feel in that exact moment is visceral, sharp, and physically crushing. Yet, here is the most controversial truth modern psychology refuses to sugarcoat: the agony of being ostracized is not actually created by the cruelty of others, but by your own fragile ego and an evolutionary brain refusing to grow up.

          Modern humans love to view themselves as fiercely independent. We proudly echo the cliché phrase, "I don't care what people think." However, that is the single biggest lie we tell ourselves. When social exclusion hits, our immediate knee-jerk reaction is to blame the environment. We label the group as toxic, malicious, or completely devoid of empathy.
          But let us dissect this with cold, clinical logic: why should the opinion of an external group dictate the destruction of your day?
          The answer lies in an evolutionary glitch. Your brain is still operating on a primitive system designed hundreds of thousands of years ago. During the Stone Age, being exiled from the tribe meant starving to death or being eaten by predators. Your prehistoric brain fundamentally equates "not being invited to lunch" with "literal physical death."
          Here is the controversy: the people excluding you are not trying to kill you. They are simply living their own lives, driven by their own narcissistic self-interests. The pain you experience is the result of your brain failing to separate an actual survival threat from a minor social rejection. You suffer not because they are evil, but because you allow a caveman's survival instinct to dictate your self-worth in the modern world.

          There is a bizarre, destructive satisfaction that comes with feeling cast out. Psychology identifies this as a full-blown victim mentality. As you sit alone in the corner of the room staring blankly at your phone, a quiet, sinister voice in your head whispers: "Look at how cruel they are, and look at how pure and innocent I am for enduring this."
          Playing the victim is comfortable. Why? Because being a victim absolves you of all personal responsibility.

          * If you have no friends, it is because they are too exclusive and cliquey.
          * If your career stalls, it is because office politics are actively sabotaging you.
          * If you are lonely, it is because the world is too harsh for your deeply sensitive soul.
          EOF

      # Langkah 2: Mengompilasi payload JSON secara aman lewat Python
      - name: Safe Compile Request JSON
        run: |
          python3 -c '
          import json
          with open("prompt.txt", "r") as f:
              text_content = f.read()
          
          payload = {
              "contents": [{
                  "role": "user",
                  "parts": [{"text": text_content}]
              }],
              "generationConfig": {
                  "responseModalities": ["audio"],
                  "temperature": 0.85,
                  "speechConfig": {
                      "voiceConfig": {
                          "prebuiltVoiceConfig": {
                              "voiceName": "Aoede"
                          }
                      }
                  }
              }
          }
          with open("request.json", "w") as f:
              json.dump(payload, f)
          '

      # Langkah 3: Ambil data Base64 PCM dari Gemini API
      - name: Fetch Audio Data from Gemini API
        run: |
          # SILAHKAN GANTI "MASUKKAN_API_KEY_DI_SINI" di bawah ini dengan API key Anda
          curl -X POST \
            -H "Content-Type: application/json" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-tts-preview:generateContent?key=AQ.Ab8RN6IDkr9QYvXlzwGEOz9YzXQ3zOzmMXYUCs0GbOyfNFR2Mw" \
            -d @request.json > response.json

          if grep -q '"error"' response.json || ! grep -q '"inlineData"' response.json; then
            echo "❌ ERROR: Respons tidak valid!"
            cat response.json
            exit 1
          fi

          # Menarik Base64 dan men-decodenya menjadi file biner mentah (.raw / pcm)
          jq -r '.candidates[0].content.parts[0].inlineData.data' response.json | base64 --decode > raw_audio.pcm

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Convert Raw PCM to Playable MP3 via FFmpeg
        run: |
          # Konfigurasi audio keluaran Gemini TTS: s16le (16-bit Little Endian), 24000 Hz, 1 Channel (Mono)
          ffmpeg -f s16le -ar 24000 -ac 1 -i raw_audio.pcm -b:a 128k yt_psychology_narration.mp3
          echo "✅ Sukses mengonversi audio mentah menjadi MP3 yang valid."

      # Langkah 5: Publikasi ke GitHub Release
      - name: Create GitHub Release and Upload Audio
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Psychology Audio Narration (${{ steps.vars.outputs.date }})
          body: |
            Automated Voice Generation using Gemini 2.5 Pro Preview TTS.
            **Format:** MP3 (Stereo Compatible 128kbps) via FFmpeg container fix.
          draft: false
          prerelease: false
          files: yt_psychology_narration.mp3
