name: Generate Psychology Audio to Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Date Tag
        id: vars
        run: |
          echo "tag=audio-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      # Langkah 1: Menyimpan teks mentah sesuai format baru Anda secara presisi
      - name: Create Raw Prompt Text File
        run: |
          cat << 'EOF' > prompt.txt
          Read the following transcript based on the audio profile and director's note. Maintain a 100% stable, robust, and well-mastered output volume from the very first word to the absolute last word. Prevent any automatic volume fade-outs at the end of sentences by sustaining vocal presence during pauses.

          # Audio Profile
          An elite, cold, and deeply analytical narrator for a premium YouTube Dark Psychology channel. The voice is deep, commanding, highly intellectual, and speaks directly into the listener's mind with absolute authority.
          
          # Director's note
          - Style: Academic yet chilling, authoritative, crystal-clear articulation with a professional broadcast cadence.
          - Pace: Calculated and deliberate. Uses strategic, brief pauses after punctuation to let the weight of the words sink in.
          - Accent: Neutral, flawless English.
          - Volume: Fixed, full-bodied amplitude. No whispering that drops below baseline decibels, no robotic flatness.
          
          ## Transcript:
          [hook tone, commanding volume, unhurried pace, slow cinematic delivery] The most monumental decisions of your life are actually born within the womb of a silence forced by your deepest terrors. The human brain always seeks mechanical refuge whenever its mental architecture begins to crack under the weight of uncertainty. Our field of consciousness is not a sacred temple immune to external intervention. It is a fragile biological circuit that can be easily hijacked by the exact frequency of psychological subversion.
          [hook tone, commanding volume, unhurried pace, slow cinematic delivery] Your deeply held belief in free will is nothing more than a holographic projection masking a rigid chain of neural bondage. Every emotion flooding your bloodstream possesses a specific density and molecular weight that can be mathematically computed. When you feel you are independently choosing your path, you are merely walking down a narrow corridor whose walls were intentionally erected by the architects of perception.
          [hook tone, commanding volume, unhurried pace, slow cinematic delivery] The desperate hunger to maintain control over your personal destiny is the most lethal optical illusion nurtured by the human ego. We move like quantum particles imagining we possess random trajectories, completely blind to the fact that our positions have already been locked by an external observer. The existential silence you encounter in the dead of night is proof that your cognitive defense system is suffering from a constant micro-leak.
          [commanding volume, sharp transition tone, unhurried pace, long dramatic pause] The first layer of this anomaly manifests as the Doctrine of Cognitive Saturation.
          [cold analytical tone, piercing delivery, unhurried pace, deliberate pauses] The flood of information striking your perceptual space is calculated to overwhelm the linear processing capacity of your central nervous system. When the hydraulic pressure of this external stimuli cracks the defensive walls of your rationality, your brain automatically switches to emergency homeostasis mode. The mind no longer filters truth based on pure logical validity, but instead swallows whatever possesses the loudest auditory resonance.
          [chilling tone, psychological exposure, cynical edge, slow calculated delivery] Your ambient fear of being left behind is a viscous chemical fluid intentionally injected into the synaptic gaps of your neurons. You begin to crave structural simplicity, a visual anchor amid an information storm engineered specifically to drown your ego. The manipulator does not need to win a logical debate with you. They only need to make the alternative space outside feel like a terrifying, uninhabitable quantum void.
          [rhetorical tone, unhurried pace, philosophical pause] Absolute human submission always begins when the individual voluntarily surrenders the critical functions of their brain to exchange cognitive anxiety for a counterfeit sense of security. Our biological bodies are programmed to avoid cognitive suffering by seeking the easiest recognizable pattern, even when that pattern is an architectural lie. You believe you have stumbled upon objective truth, yet you are merely embracing a gallows wrapped in fine velvet.
          EOF

      # Langkah 2: Mengompilasi payload JSON secara aman lewat Python
      - name: Safe Compile Request JSON
        run: |
          python3 -c '
          import json
          with open("prompt.txt", "r") as f:
              text_content = f.read()
          
          payload = {
              "contents": [{
                  "role": "user",
                  "parts": [{"text": text_content}]
              }],
              "generationConfig": {
                  "responseModalities": ["audio"],
                  "temperature": 0.75,
                  "speechConfig": {
                      "voiceConfig": {
                          "prebuiltVoiceConfig": {
                              "voiceName": "Aoede"
                          }
                      }
                  }
              }
          }
          with open("request.json", "w") as f:
              json.dump(payload, f)
          '

      # Langkah 3: Eksekusi Request Tunggal (Aman RPM/RPD)
      - name: Fetch Audio Data from Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${GEMINI_API_KEY}" \
            -d @request.json > response.json

          if grep -q '"error"' response.json || ! grep -q '"inlineData"' response.json; then
            echo "❌ ERROR: Respons tidak valid!"
            cat response.json
            exit 1
          fi

          jq -r '.candidates[0].content.parts[0].inlineData.data' response.json | base64 --decode > raw_audio.pcm

      # Instalasi Dependensi FFmpeg
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # Langkah 4: Finalisasi Kontainer Wadah Audio menjadi MP3 Normal
      - name: Convert Raw PCM to Playable MP3 via FFmpeg
        run: |
          ffmpeg -f s16le -ar 24000 -ac 1 -i raw_audio.pcm -b:a 128k yt_psychology_narration.mp3
          echo "✅ Sukses mengonversi audio mentah menjadi MP3 yang valid."

      # Langkah 5: Publikasi ke GitHub Release
      - name: Create GitHub Release and Upload Audio
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Psychology Audio Narration (${{ steps.vars.outputs.date }})
          body: |
            Automated Voice Generation using Gemini 2.5 Pro Preview TTS.
            **Prompt Optimization:** High Stability Amplitude Custom.
            **Voice Character:** Aoede
          draft: false
          prerelease: false
          files: yt_psychology_narration.mp3
