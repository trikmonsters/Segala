name: Generate Psychology Audio to Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Date Tag
        id: vars
        run: |
          echo "tag=audio-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      # Langkah 1: Menyimpan teks mentah sesuai format presisi Anda
      - name: Create Raw Prompt Text File
        run: |
          cat << 'EOF' > prompt.txt
          Read the following transcript based on the audio profile and director's note. Maintain full, robust, and 100% stable output volume from the first word to the very last word. Do not let the volume fade out.

          # Audio Profile
          A deep, resonant narrator of mysteries. Fixed consistent volume amplitude.

          # Director's note
          Style: Professional, authoritative, clear articulation with standard broadcast cadence. Pace: Natural conversational pace. Accent: Neutral. Volume: Fixed loud and stable.

          ## Scene:
          # ROLE & VOICE CHARACTER
          Act as an elite, cold, and deeply intellectual narrator for a YouTube Dark Psychology channel. Your voice must sound authoritative, analytical, and gripping. Speak directly to a single listener.

          # AUDIO CONTEXT & ATMOSPHERE
          - Tone: Cold logic, unsympathetic truth, perfectly steady audio amplitude.

          # DELIVERY DIRECTIVES (AUDIO GLITCH PREVENTION OPTIMIZED)
          - [IMPORTANT] Volume Stability: Keep a 100% steady, unyielding vocal volume. Do not allow the energy or decibel level to drop at the end of paragraphs.
          - Cadence & Pauses: Use clear, brief pauses after punctuation, but maintain the vocal presence so the system doesn't trigger an automatic fade-out.
          - RESTRICTIONS (STRICT): No whispering, no fading out, and no robotic flatness. Keep the tone hauntingly consistent and full-bodied from start to finish.

          ## Transcript:
          [strong tone, fixed volume] Picture This. You are standing in the middle of a room packed with people you know. They are laughing, sharing stories, and suddenly fall dead silent the exact moment you walk toward them. Their eyes shift, and the conversation resumes as if you were nothing but thin air.

          [strong tone, fixed volume] The pain you feel in that exact moment is visceral, sharp, and physically crushing. Yet, here is the most controversial truth modern psychology refuses to sugarcoat: the agony of being ostracized is not actually created by the cruelty of others, but by your own fragile ego and an evolutionary brain refusing to grow up.

          [strong tone, fixed volume] Modern humans love to view themselves as fiercely independent. We proudly echo the cliché phrase, "I don't care what people think." However, that is the single biggest lie we tell ourselves. When social exclusion hits, our immediate knee-jerk reaction is to blame the environment. We label the group as toxic, malicious, or completely devoid of empathy.

          [strong tone, fixed volume] But let us dissect this with cold, clinical logic: why should the opinion of an external group dictate the destruction of your day?

          [strong tone, fixed volume] The answer lies in an evolutionary glitch. Your brain is still operating on a primitive system designed hundreds of thousands of years ago. During the Stone Age, being exiled from the tribe meant starving to death or being eaten by predators. Your prehistoric brain fundamentally equates "not being invited to lunch" with "literal physical death."

          [strong tone, fixed volume] Here is the controversy: the people excluding you are not trying to kill you. They are simply living their own lives, driven by their own narcissistic self-interests. The pain you experience is the result of your brain failing to separate an actual survival threat from a minor social rejection. You suffer not because they are evil, but because you allow a caveman's survival instinct to dictate your self-worth in the modern world.

          [strong tone, fixed volume] There is a bizarre, destructive satisfaction that comes with feeling cast out. Psychology identifies this as a full-blown victim mentality. As you sit alone in the corner of the room staring blankly at your phone, a quiet, sinister voice in your head whispers: "Look at how cruel they are, and look at how pure and innocent I am for enduring this."

          [strong tone, fixed volume] Playing the victim is comfortable. Why? Because being a victim absolves you of all personal responsibility.

          [strong tone, fixed volume] If you have no friends, it is because they are too exclusive and cliquey. If your career stalls, it is because office politics are actively sabotaging you. If you are lonely, it is because the world is too harsh for your deeply sensitive soul.
          EOF

      # Langkah 2: Instalasi SDK Resmi Google GenAI untuk Python
      - name: Install Google GenAI SDK
        run: |
          pip install google-genai

      # Langkah 3: Ambil Data Audio Menggunakan SDK Resmi (Solusi bypass error 401 token AQ.)
      - name: Fetch Audio Data via Official SDK
        env:
          # SILAHKAN GANTI "MASUKKAN_API_KEY_DI_SINI" di bawah ini dengan API key Anda yang berawalan AQ.
          GEMINI_API_KEY: "AIzaSyDtlS2TE2B7cXnL-jG7z8frKBwPbNfFjkM"
        run: |
          python3 -c '
          import os
          from google import genai
          from google.genai import types

          # Membaca file transkrip yang telah dibuat
          with open("prompt.txt", "r") as f:
              text_content = f.read()

          # Inisialisasi client resmi dengan deteksi token otomatis
          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          print("Mengirim data aman ke model gemini-2.5-pro-preview-tts...")
          response = client.models.generate_content(
              model="gemini-2.5-flash-preview-tts",
              contents=text_content,
              config=types.GenerateContentConfig(
                  response_modalities=["audio"],
                  temperature=0.1,
                  speech_config=types.SpeechConfig(
                      voice_config=types.VoiceConfig(
                          prebuilt_voice_config=types.PrebuiltVoiceConfig(
                              voice_name="Aoede"
                          )
                      )
                  )
              )
          )

          # Mendapatkan data biner audio langsung melalui objek bagian part SDK
          try:
              audio_bytes = response.candidates[0].content.parts[0].inline_data.data
              with open("raw_audio.pcm", "wb") as output_file:
                  output_file.write(audio_bytes)
              print("✅ Sukses mengambil data audio via SDK.")
          except Exception as e:
              print("❌ ERROR: Format data respons tidak sesuai harapan.")
              print(e)
              exit(1)
          '

      # Langkah 4: Instalasi Dependensi FFmpeg
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # Langkah 5: Mengonversi PCM mentah menjadi file MP3 siap saji
      - name: Convert Raw PCM to Playable MP3 via FFmpeg
        run: |
          ffmpeg -f s16le -ar 24000 -ac 1 -i raw_audio.pcm -b:a 128k yt_psychology_narration.mp3
          echo "✅ Sukses mengonversi audio mentah menjadi MP3 yang valid."

      # Langkah 6: Publikasi Otomatis ke GitHub Release
      - name: Create GitHub Release and Upload Audio
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Psychology Audio Narration (${{ steps.vars.outputs.date }})
          body: |
            Automated Voice Generation using Gemini 2.5 Pro Preview TTS.
            **Othentication Method:** Google GenAI SDK (AQ Key Safe Mode).
            **Voice Character:** Aoede
          draft: false
          prerelease: false
          files: yt_psychology_narration.mp3
