name: Generate Psychology Audio to Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Date Tag
        id: vars
        run: |
          echo "tag=audio-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      # Langkah 1: Menyimpan teks mentah sesuai format baru Anda secara presisi
      - name: Create Raw Prompt Text File
        run: |
          cat << 'EOF' > prompt.txt
          Read the following transcript based on the audio profile and director's note. Maintain a 100% stable, robust, and well-mastered output volume from the very first word to the absolute last word. Prevent any automatic volume fade-outs at the end of sentences by sustaining vocal presence during pauses.

          # Audio Profile
          An elite, cold, and deeply analytical narrator for a premium YouTube Dark Psychology channel. The voice is deep, commanding, highly intellectual, and speaks directly into the listener's mind with absolute authority.
          
          # Director's note
          - Style: Academic yet chilling, authoritative, crystal-clear articulation with a professional broadcast cadence.
          - Pace: Calculated and deliberate. Uses strategic, brief pauses after punctuation to let the weight of the words sink in.
          - Accent: Neutral, flawless English.
          - Volume: Fixed, full-bodied amplitude. No whispering that drops below baseline decibels, no robotic flatness.
          
          ## Transcript:
          [hook tone, commanding volume, STRICTLY SLOW pace, slow cinematic delivery] Despair is never a mere emotion. It is a catastrophic structural failure within the human cognitive architecture. When the existential fortresses built by the ego collapse, the conscious space is instantly flooded by a cold, mechanical void. The human mind operates akin to the laws of thermodynamics. Fading hopeful energy never truly vanishes. It condenses into a heavy material mass that presses violently against the chest wall. You assume you are actively contemplating the future. In reality, you are merely witnessing the terminal breakdown of the internal algorithms that predict safety. Every inhalation feels heavy, like breathing in microscopic lead particles. This emptiness is not abstract. It possesses a specific gravity capable of warping the perception of time completely. Deep sorrow triggers a biological contraction on a cellular level. The magnetic field around the body weakens. You find yourself isolated in a vacuum. A space where no external signals can penetrate. Consciousness suddenly transforms into a freezing subterranean prison.

          [cold analytical tone, piercing delivery, STRICTLY SLOW pace, deliberate pauses] The human brain is a prediction engine highly fragile to emotional anomalies. It continuously weaves narratives of continuity to conceal the abyss of nothingness beneath it. When the illusion of control cracks, neural oscillations completely lose their synchronization. You begin observing yourself from the ceiling corner of the room. Your body below looks like a wrecked biological machine devoid of fuel. Cognitive functions drop drastically to the most primitive survival levels. Words lose their semantic value and dissolve into low-frequency static noise. The protective layers of the ego are eaten away by the acid of self-isolation. You look at your own hands but no longer recognize them as part of your identity. It is just a piece of meat holding small brittle bones. The subjective experience of selfhood fragments into thousands of dead pixels. Each pixel represents a single failed adaptation to harsh reality.
          
          [assertive tone, exposing the truth, STRICTLY SLOW pace, heavy cadence] Emotional attachment acts like quantum networks binding humans to the illusion of material stability. When that bond is violently severed, a burst of psychological radiation damages short-term memory circuits. You remember trivial details with a terrifying degree of clarity. The texture of the wooden table. The pattern of dust dancing in the air. The ticking of the clock suddenly sounding like heavy sledgehammer blows. Hydrostatic pressure inside the cranium increases as negative thoughts loop endlessly. This is the precise formation of a psychic black hole. Its internal gravitational pull is so immense that even the light of hope cannot escape. You are trapped inside the singularity of melancholia. In this place, all laws of logic and rationality cease to exist. You become a helpless victim of your own cognitive gravity.
          EOF

      # Langkah 2: Mengompilasi payload JSON secara aman lewat Python
      - name: Safe Compile Request JSON
        run: |
          python3 -c '
          import json
          with open("prompt.txt", "r") as f:
              text_content = f.read()
          
          payload = {
              "contents": [{
                  "role": "user",
                  "parts": [{"text": text_content}]
              }],
              "generationConfig": {
                  "responseModalities": ["audio"],
                  "temperature": 0.75,
                  "speechConfig": {
                      "voiceConfig": {
                          "prebuiltVoiceConfig": {
                              "voiceName": "Aoede"
                          }
                      }
                  }
              }
          }
          with open("request.json", "w") as f:
              json.dump(payload, f)
          '

      # Langkah 3: Eksekusi Request Tunggal (Aman RPM/RPD)
      - name: Fetch Audio Data from Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${GEMINI_API_KEY}" \
            -d @request.json > response.json

          if grep -q '"error"' response.json || ! grep -q '"inlineData"' response.json; then
            echo "❌ ERROR: Respons tidak valid!"
            cat response.json
            exit 1
          fi

          jq -r '.candidates[0].content.parts[0].inlineData.data' response.json | base64 --decode > raw_audio.pcm

      # Instalasi Dependensi FFmpeg
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      # Langkah 4: Finalisasi Kontainer Wadah Audio menjadi MP3 Normal
      - name: Convert Raw PCM to Playable MP3 via FFmpeg
        run: |
          ffmpeg -f s16le -ar 24000 -ac 1 -i raw_audio.pcm -b:a 128k yt_psychology_narration.mp3
          echo "✅ Sukses mengonversi audio mentah menjadi MP3 yang valid."

      # Langkah 5: Publikasi ke GitHub Release
      - name: Create GitHub Release and Upload Audio
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Psychology Audio Narration (${{ steps.vars.outputs.date }})
          body: |
            Automated Voice Generation using Gemini 2.5 Pro Preview TTS.
            **Prompt Optimization:** High Stability Amplitude Custom.
            **Voice Character:** Aoede
          draft: false
          prerelease: false
          files: yt_psychology_narration.mp3
