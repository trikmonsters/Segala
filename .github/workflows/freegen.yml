name: Generate and Release FreeGen Image

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'AI Prompt'
        required: true
        default: 'A futuristic city in cyberpunk style'
      ratio:
        description: 'Aspect Ratio'
        required: true
        default: '16:9'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Generator Script
        id: freegen
        shell: bash
        run: |
          PROMPT="${{ github.event.inputs.prompt }}"
          RATIO="${{ github.event.inputs.ratio }}"

          SIGNER_RES=$(jq -n --arg p "$PROMPT" '{prompt: $p}' | curl -s -X POST "https://prompt-signer.freegen.app" -H "Content-Type: application/json" -d @-)

          TS=$(echo "$SIGNER_RES" | jq -r '.ts')
          SIG=$(echo "$SIGNER_RES" | jq -r '.sig')

          GENERATOR_RES=$(jq -n --arg p "$PROMPT" --argjson t "$TS" --arg s "$SIG" --arg r "$RATIO" '{prompt: $p, ts: $t, sig: $s, ratio_id: $r}' | curl -s -X POST "https://image-generator.freegen.app" -H "Content-Type: application/json" -d @-)

          JOB_ID=$(echo "$GENERATOR_RES" | jq -r '.job_id // empty')
          IMAGE_URL=$(echo "$GENERATOR_RES" | jq -r '.image_data_url // empty')

          if [ -n "$JOB_ID" ]; then
            npm install ws

            cat << 'EOF' > ws_client.js
            const WebSocket = require('ws');
            const crypto = require('crypto');
            const fs = require('fs');

            const jobId = process.env.JOB_ID;
            const ts = process.env.TS;

            const message = jobId + ts;
            const hashHex = crypto.createHash('sha256').update(message).digest('hex');
            const auth = Buffer.from(hashHex).toString('base64').substring(0, 20) + ':' + ts;

            const ws = new WebSocket('wss://websocket-bridge.freegen.app/ws');
            
            const timer = setTimeout(() => {
              ws.close();
              process.exit(1);
            }, 300000);

            ws.on('open', () => {
              ws.send(JSON.stringify({ type: 'subscribe', job_id: jobId, auth: auth }));
            });

            ws.on('message', (data) => {
              const msg = JSON.parse(data.toString());
              if (msg.type === 'result') {
                clearTimeout(timer);
                // Simpan base64 data URL ke file
                fs.writeFileSync('image_data.txt', msg.image_data);
                ws.close();
                process.exit(0);
              } else if (msg.type === 'error') {
                clearTimeout(timer);
                ws.close();
                process.exit(1);
              }
            });
            EOF

            JOB_ID="$JOB_ID" TS="$TS" node ws_client.js
          fi

          # Decode base64 image dari file dan save ke output.jpg
          cat << 'EOF' > decode_image.js
          const fs = require('fs');
          
          const imageData = fs.readFileSync('image_data.txt', 'utf-8').trim();
          
          // Extract base64 dari data URL: data:image/jpeg;base64,xxxxx
          const base64Match = imageData.match(/^data:[^;]+;base64,(.+)$/);
          
          if (!base64Match) {
            console.error('Invalid base64 data URL format');
            process.exit(1);
          }
          
          const base64Data = base64Match[1];
          const buffer = Buffer.from(base64Data, 'base64');
          
          fs.writeFileSync('output.jpg', buffer);
          console.log('Image saved to output.jpg');
          EOF

          node decode_image.js

          if [ ! -f output.jpg ] || [ ! -s output.jpg ]; then
            echo "Error: Failed to decode image"
            exit 1
          fi

          echo "TAG_NAME=v$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: AI Image Release - ${{ env.TAG_NAME }}
          body: |
            Prompt: ${{ github.event.inputs.prompt }}
            Ratio: ${{ github.event.inputs.ratio }}
          files: output.jpg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
