name: Generate YouTube Script with AI

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topik untuk script YouTube'
        required: true
        default: 'Rahasia Psikologi Manusia'
      language:
        description: 'Bahasa untuk script'
        required: true
        default: 'Indonesian'

jobs:
  generate-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth axios

      - name: Install Playwright browsers
        run: |
          npx playwright install
          npx playwright install-deps

      - name: Run Playwright Scraper with Rotating Proxy
        env:
          TOPIC_INPUT: ${{ github.event.inputs.topic }}
          LANGUAGE: ${{ github.event.inputs.language }}
        run: |
          cat > generate-script.js << 'JSEOF'
          const { chromium } = require('playwright-extra');
          const stealth = require('puppeteer-extra-plugin-stealth')();
          chromium.use(stealth);
          const axios = require('axios');
          const fs = require('fs');

          const TOPIC = process.env.TOPIC_INPUT || 'Rahasia Psikologi Manusia';
          const LANGUAGE = process.env.LANGUAGE || 'Indonesian';
          const MAX_ATTEMPTS = 5;
          const MAX_PROXY_RETRIES = 3;

          const prompt = `Hallo apa kabar?`;

          const FULL_PROMPT = `You are a combination of an elite YouTube Growth Strategist, a rigorous behavioral scientist, and a master of psychological narrative design. Write a highly immersive, continuous psychological narrative in fluent, native-level ${LANGUAGE} based on this raw topic data: "${TOPIC}"
          STRICT FACTUAL & SEO GUARDRAILS (ALGORITHM AUTHORITY LOCK):
          1. ANCHOR ON FACTS: The narrative must be strictly rooted in real, proven psychological phenomena, cognitive biases, or evolutionary biology data. Do not invent fake science or wild fictions.
          2. SEO KEYWORD RETENTION: Intelligently weave core semantic keywords related to "${TOPIC}" naturally throughout the text. This ensures search engines index the video correctly.
          3. ANTI-TOPIC CHAOS: Maintain strict thematic consistency. Every paragraph must tightly serve the core premise of "${TOPIC}" without drifting into unrelated psychological sub-topics, ensuring the YouTube algorithm establishes clear niche authority for this channel.
          STRICT NARRATIVE & RETENTION RULES:
          1. HOOK TECHNIQUE (START IN THE MIDDLE): Do not start with a greeting, preamble, or introduction. Start immediately in the middle of an intense, ongoing psychological simulation or crisis to hook the viewer from second one.
          2. VALUE RETENTION: To maximize audience retention, the narrative must open by delivering the second-best insight/point of the topic right in the first paragraph.
          3. Every subsequent paragraph must begin with a cold, piercing psychological insight — NOT a generic question.
          4. Treat human emotions as physical phenomena. Use architectural, biological, and quantum metaphors. Avoid cliché filler phrases.
          STRICT TTS-PIPELINE FORMAT RULES (MICRO-CHUNKING & ANTI-SPEED BUG):
          1. Every single paragraph MUST begin with an aggressive insight AND be preceded by a specific TTS audio directive bracket.
          2. CRITICAL VISUAL & SPEED CONTROL: Each paragraph MUST be ultra-short, consisting of ONLY 2 to 3 sentences maximum. Never let sentences pile up into many lines. Immediately hit Enter to start a new paragraph with a new tag.
          3. Every single tag MUST explicitly include the instruction "STRICTLY SLOW pace" to lock the AI engine's reading speed and prevent it from speeding up over time.
          4. Output ONLY the narrative text. Target length: 2000+ words.

          CYCLE THROUGH THESE EXACT TAGS FOR THE SCRIPTS:
          - Paragraph 1 (The Hook): [hook tone, commanding volume, STRICTLY SLOW pace, start in the middle delivery]
          - Next body paragraphs (alternate dynamically between these short 2-3 sentence blocks):
            * [cold analytical tone, piercing delivery, STRICTLY SLOW pace, deliberate pauses]
            * [assertive tone, exposing the truth, STRICTLY SLOW pace, heavy cadence]
            * [chilling tone, psychological exposure, cynical edge, STRICTLY SLOW calculated delivery]
            * [rhetorical tone, STRICTLY SLOW pace, long philosophical pause]
          - Final Paragraph: [final authoritative tone, heavy cadence, EXTREMELY SLOW powerful conclusion]

          ---
          CRITICAL SAFETY VALVE (CONVERSATIONAL KILL-SWITCH):
          - Do not, under any circumstances, act like a helpful chat assistant at the end.
          - PROHIBITED: Do not include any out-of-character text, follow-up questions, closing offers, conversational pleasantries, menus, or invitations for discussion.
          - The final word of the actual story under the [final authoritative tone] tag MUST be the absolute final character of your entire output. Stop generating immediately after that word. 2000+ words.`;

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // Fetch proxy list from ProxyScrape API
          async function getProxyList() {
            try {
              console.log('[Proxy] Fetching proxy list from ProxyScrape API...');
              const response = await axios.get(
                'https://api.proxyscrape.com/v4/free-proxy-list/get?' +
                'request=display_proxies&' +
                'protocol=http&' +
                'format=textplain&' +
                'anonymity=elite&' +
                'timeout=5000',
                { timeout: 15000 }
              );

              const proxies = response.data
                .split('\n')
                .filter(p => p.trim().length > 0)
                .slice(0, 20); // Ambil 20 proxy terbaik

              console.log('[Proxy] Successfully fetched ' + proxies.length + ' working proxies');
              return proxies;
            } catch (error) {
              console.error('[Proxy] Failed to fetch proxy list:', error.message);
              return [];
            }
          }

          // Parse proxy string to object
          function parseProxy(proxyStr) {
            const [ip, port] = proxyStr.trim().split(':');
            return { ip: ip.trim(), port: port.trim() };
          }

          async function tryGenerate(attempt, proxyList, proxyIndex) {
            const currentProxy = proxyList[proxyIndex % proxyList.length];
            const { ip, port } = parseProxy(currentProxy);

            console.log('[Attempt ' + attempt + '] Launching browser with proxy: ' + ip + ':' + port);
            
            const browser = await chromium.launch({
              headless: true,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-blink-features=AutomationControlled',
                '--incognito',
                '--proxy-server=http://' + ip + ':' + port
              ]
            });

            const context = await browser.newContext({
              viewport: { width: 1280, height: 1000 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              locale: 'id-ID',
              permissions: ['clipboard-read', 'clipboard-write'],
              ignoreHTTPSErrors: true
            });

            const page = await context.newPage();

            try {
              console.log('[Attempt ' + attempt + '] Navigating to Google AI Mode...');
              
              // Set extra headers untuk bypass detection
              await page.setExtraHTTPHeaders({
                'Accept-Language': 'id-ID,id;q=0.9',
                'Accept-Encoding': 'gzip, deflate',
                'Cache-Control': 'max-age=0',
              });

              await page.goto('https://www.google.com/aimode', { 
                waitUntil: 'domcontentloaded', 
                timeout: 45000 
              });

              console.log('[Attempt ' + attempt + '] Page loaded. Waiting for input element...');

              // Lebih aggressive waiting
              try {
                await page.waitForSelector('textarea', { timeout: 30000 });
              } catch (e) {
                console.warn('[Attempt ' + attempt + '] Textarea not found with waitForSelector');
              }

              // Tunggu hingga element visible dan clickable
              await page.waitForFunction(() => {
                const textarea = document.querySelector('textarea');
                return textarea && textarea.offsetParent !== null && !textarea.disabled;
              }, { timeout: 30000 });

              const chatInput = page.locator('textarea').first();
              
              console.log('[Attempt ' + attempt + '] Input ready. Clicking and filling...');
              await chatInput.click();
              await sleep(800);
              await chatInput.fill('');
              
              // Type dengan delay untuk mimic human behavior
              await chatInput.type(prompt, { delay: 30 });
              await sleep(1000);

              // Press Enter
              console.log('[Attempt ' + attempt + '] Sending prompt...');
              await chatInput.press('Enter');
              
              console.log('[Attempt ' + attempt + '] Waiting for response stream...');
              
              // Tunggu response dengan smart detection
              let responseDetected = false;
              let startWait = Date.now();
              const maxWait = 120000; // 2 menit max

              while (!responseDetected && (Date.now() - startWait) < maxWait) {
                const hasResponse = await page.evaluate(() => {
                  const responses = document.querySelectorAll('[role="article"], .response-message, div[data-message]');
                  return responses.length > 0;
                });

                if (hasResponse) {
                  responseDetected = true;
                  console.log('[Attempt ' + attempt + '] ✓ Response detected!');
                  break;
                }
                await sleep(2000);
              }

              if (!responseDetected) {
                console.warn('[Attempt ' + attempt + '] No response detected after 2 minutes, but continuing...');
              }

              // Tunggu loading selesai
              console.log('[Attempt ' + attempt + '] Waiting for response to complete...');
              await page.waitForFunction(() => {
                const loaders = document.querySelectorAll('[role="status"], .loading');
                return loaders.length === 0;
              }, { timeout: 120000 }).catch(() => {
                console.warn('[Attempt ' + attempt + '] Still loading, proceeding anyway...');
              });

              // Buffer time
              await sleep(3000);

              // Scroll to bottom
              await page.evaluate(() => window.scrollTo(0, document.body.scrollHeight));
              await sleep(1000);

              console.log('[Attempt ' + attempt + '] Looking for copy button...');

              // Cari dan click copy button
              const copySuccess = await page.evaluate(() => {
                const buttons = Array.from(document.querySelectorAll('button'));
                const copyBtn = buttons.find(b => {
                  const label = (b.getAttribute('aria-label') || b.textContent || '').toLowerCase();
                  return label.includes('copy') || label.includes('salin');
                });

                if (copyBtn) {
                  copyBtn.click();
                  return true;
                }
                return false;
              });

              if (!copySuccess) {
                console.warn('[Attempt ' + attempt + '] Copy button not found, trying alternative method...');
              }

              await sleep(2000);

              // Read from clipboard
              console.log('[Attempt ' + attempt + '] Reading clipboard...');
              let finalResponseText = '';
              try {
                finalResponseText = await page.evaluate(async () => {
                  return await navigator.clipboard.readText();
                });
              } catch (e) {
                console.warn('[Attempt ' + attempt + '] Clipboard read failed');
                finalResponseText = await page.evaluate(() => {
                  const responses = document.querySelectorAll('[role="article"], .message-content');
                  if (responses.length > 0) {
                    return Array.from(responses).map(r => r.textContent).join('\n\n');
                  }
                  return '';
                });
              }

              if (!finalResponseText || finalResponseText.trim().length < 200) {
                const charCount = finalResponseText ? finalResponseText.length : 0;
                throw new Error('Response terlalu pendek: ' + charCount + ' chars');
              }

              fs.writeFileSync('youtube-script.txt', finalResponseText.trim(), 'utf-8');
              console.log('✅ [Attempt ' + attempt + '] Script generated successfully!');
              console.log('   Length: ' + finalResponseText.length + ' characters');
              
              await browser.close();
              return true;

            } catch (error) {
              console.error('[Attempt ' + attempt + '] Error:', error.message);
              try {
                await page.screenshot({ 
                  path: 'error-attempt-' + attempt + '-proxy-' + ip.replace(/\./g, '-') + '.png', 
                  fullPage: true 
                });
              } catch (e) {}
              await browser.close();
              return false;
            }
          }

          async function main() {
            const proxyList = await getProxyList();
            
            if (proxyList.length === 0) {
              console.error('❌ Failed to fetch proxy list');
              process.exit(1);
            }

            let proxyIndex = 0;

            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              // Try multiple proxies per attempt
              for (let proxyRetry = 0; proxyRetry < MAX_PROXY_RETRIES; proxyRetry++) {
                const success = await tryGenerate(attempt, proxyList, proxyIndex);
                proxyIndex++;

                if (success) {
                  console.log('✅ Success! Exiting...');
                  process.exit(0);
                }

                if (proxyRetry < MAX_PROXY_RETRIES - 1) {
                  console.log('Trying next proxy...');
                  await sleep(3000);
                }
              }

              if (attempt < MAX_ATTEMPTS) {
                console.log('Waiting 15 seconds before next attempt...');
                await sleep(15000);
              }
            }

            console.error('❌ Failed to generate script after maximum attempts');
            process.exit(1);
          }

          main();
          JSEOF
          
          node generate-script.js

      - name: Display Generated Script
        if: always()
        run: |
          echo "================================================================="
          echo "                    GENERATED SCRIPT OUTPUT                      "
          echo "================================================================="
          if [ -f youtube-script.txt ]; then
            CHAR_COUNT=$(wc -c < youtube-script.txt)
            WORD_COUNT=$(wc -w < youtube-script.txt)
            echo "✅ Script generated successfully"
            echo "   Words: $WORD_COUNT"
            echo "   Characters: $CHAR_COUNT"
            echo ""
            echo "--- PREVIEW (First 100 lines) ---"
            head -100 youtube-script.txt
            echo ""
            echo "... [Script lengkap tersimpan di artifacts] ..."
          else
            echo "❌ Script gagal digenerate"
            echo ""
            echo "Error screenshots:"
            ls -lah error-attempt-*.png 2>/dev/null || echo "  Tidak ada error screenshots"
          fi
          echo "================================================================="

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-files
          path: |
            youtube-script.txt
            error-attempt-*.png
          retention-days: 7
          if-no-files-found: warn

      - name: Generate Summary
        if: always()
        run: |
          echo "## 📊 Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Topic:** \`${{ github.event.inputs.topic }}\`" >> $GITHUB_STEP_SUMMARY
          echo
