name: Generate YouTube Script with Google AI

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic for YouTube script'
        required: true
        default: 'How to Make Delicious Coffee'
      language:
        description: 'Script language'
        required: true
        default: 'English'
        type: choice
        options:
          - English
          - Indonesian

jobs:
  generate-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: npm install -D @playwright/test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Generate YouTube Script
        run: |
          node - <<'EOF'
          const { chromium } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              locale: 'en-US',
              timezoneId: 'UTC'
            });
            
            const page = await context.newPage();
            
            try {
              console.log('🚀 Opening Google AI mode...');
              await page.goto('https://www.google.com/aimode', { 
                waitUntil: 'networkidle',
                timeout: 30000 
              });

              await page.waitForTimeout(3000);

              console.log('📝 Filling in the prompt...');
              const promptText = `Create a YouTube script about: "${{ github.event.inputs.topic }}"
              
              Requirements:
              - Minimum 2000 words
              - Language: ${{ github.event.inputs.language }}
              - Use TTS tags like [hook tone, commanding volume, STRICTLY SLOW pace, start in the middle delivery]
              - No conversational filler
              - Structure: Hook → Body → Call to Action`;

              const textArea = page.locator('textarea, [contenteditable="true"]').first();
              await textArea.fill(promptText);
              await page.waitForTimeout(1000);

              console.log('🎬 Submitting prompt...');
              const submitBtn = page.locator('button:has-text("Generate"), button[aria-label*="Send"], button[aria-label*="Kirim"]').first();
              await submitBtn.click();

              console.log('⏳ Waiting for response...');
              await page.waitForTimeout(8000);

              console.log('Locating the copy button...');

              const selectors = [
                'button[aria-label="Salin teks"]',      // Indonesian
                'button[aria-label="Copy text"]',        // English
                'button[aria-label*="Salin"]',
                'button[aria-label*="Copy"]',
                'button.bKxaof'                          // Class dari elemen Anda
              ];

              let copyButton = null;
              let foundSelector = '';

              for (const selector of selectors) {
                const btn = page.locator(selector);
                const count = await btn.count();
                if (count > 0) {
                  copyButton = btn;
                  foundSelector = selector;
                  console.log('✓ Found copy button with selector: ' + selector);
                  break;
                }
              }

              if (!copyButton || await copyButton.count() === 0) {
                throw new Error('Tombol salin tidak ditemukan dengan selector apapun.');
              }

              console.log('Clicking the copy button...');
              await copyButton.first().click();

              await page.waitForTimeout(1500);

              console.log('📋 Reading text from clipboard...');
              const scriptText = await page.evaluate(async () => {
                try {
                  return await navigator.clipboard.readText();
                } catch (err) {
                  console.error('Clipboard read failed:', err);
                  return '';
                }
              });

              if (!scriptText || scriptText.trim().length === 0) {
                throw new Error('Clipboard is empty atau gagal membaca teks.');
              }

              console.log('✅ Script retrieved successfully!');
              console.log('📊 Script length: ' + scriptText.length + ' characters');

              // Simpan ke file
              const outputDir = 'scripts';
              if (!fs.existsSync(outputDir)) {
                fs.mkdirSync(outputDir, { recursive: true });
              }

              const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
              const filename = path.join(outputDir, `youtube-script-${timestamp}.txt`);
              fs.writeFileSync(filename, scriptText, 'utf-8');

              console.log('💾 Script saved to: ' + filename);

              // Upload ke artifact
              console.log('📤 Script preview (first 500 chars):');
              console.log(scriptText.substring(0, 500) + '...');

            } catch (error) {
              console.error('❌ Error:', error.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 'false'

      - name: Upload Script Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-scripts
          path: scripts/
          retention-days: 30

      - name: Create Summary
        if: success()
        run: |
          echo "## ✅ YouTube Script Generated Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Topic:** ${{ github.event.inputs.topic }}" >> $GITHUB_STEP_SUMMARY
          echo "**Language:** ${{ github.event.inputs.language }}" >> $GITHUB_STEP_SUMMARY
          echo "**Generated At:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📂 Scripts saved in artifacts" >> $GITHUB_STEP_SUMMARY

      - name: Failure Summary
        if: failure()
        run: |
          echo "## ❌ Script Generation Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the logs above for details." >> $GITHUB_STEP_SUMMARY
