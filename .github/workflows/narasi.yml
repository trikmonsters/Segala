name: Generate YouTube Script with AI

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topik untuk script YouTube'
        required: true
        default: 'Rahasia Psikologi Manusia'
      language:
        description: 'Bahasa untuk script'
        required: true
        default: 'Indonesian'

jobs:
  generate-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth

      - name: Create generate-script.js
        env:
          TOPIC_INPUT: ${{ github.event.inputs.topic }}
          LANGUAGE: ${{ github.event.inputs.language }}
        run: |
          cat > generate-script.js << 'JSEOF'
          const { chromium } = require('playwright-extra');
          const stealth = require('puppeteer-extra-plugin-stealth')();
          chromium.use(stealth);
          const fs = require('fs');

          const TOPIC = process.env.TOPIC_INPUT || 'Rahasia Psikologi Manusia';
          const LANGUAGE = process.env.LANGUAGE || 'Indonesian';
          const MAX_ATTEMPTS = 3;

          const FULL_PROMPT = `You are a combination of an elite YouTube Growth Strategist, a rigorous behavioral scientist, and a master of psychological narrative design. Write a highly immersive, continuous psychological narrative in fluent, native-level ${LANGUAGE} based on this raw topic data: "${TOPIC}"
          STRICT FACTUAL & SEO GUARDRAILS (ALGORITHM AUTHORITY LOCK):
          1. ANCHOR ON FACTS: The narrative must be strictly rooted in real, proven psychological phenomena, cognitive biases, or evolutionary biology data. Do not invent fake science or wild fictions.
          2. SEO KEYWORD RETENTION: Intelligently weave core semantic keywords related to "${TOPIC}" naturally throughout the text. This ensures search engines index the video correctly.
          3. ANTI-TOPIC CHAOS: Maintain strict thematic consistency. Every paragraph must tightly serve the core premise of "${TOPIC}" without drifting into unrelated psychological sub-topics, ensuring the YouTube algorithm establishes clear niche authority for this channel.
          STRICT NARRATIVE & RETENTION RULES:
          1. HOOK TECHNIQUE (START IN THE MIDDLE): Do not start with a greeting, preamble, or introduction. Start immediately in the middle of an intense, ongoing psychological simulation or crisis to hook the viewer from second one.
          2. VALUE RETENTION: To maximize audience retention, the narrative must open by delivering the second-best insight/point of the topic right in the first paragraph.
          3. Every subsequent paragraph must begin with a cold, piercing psychological insight — NOT a generic question.
          4. Treat human emotions as physical phenomena. Use architectural, biological, and quantum metaphors. Avoid cliché filler phrases.
          STRICT TTS-PIPELINE FORMAT RULES (MICRO-CHUNKING & ANTI-SPEED BUG):
          1. Every single paragraph MUST begin with an aggressive insight AND be preceded by a specific TTS audio directive bracket.
          2. CRITICAL VISUAL & SPEED CONTROL: Each paragraph MUST be ultra-short, consisting of ONLY 2 to 3 sentences maximum. Never let sentences pile up into many lines. Immediately hit Enter to start a new paragraph with a new tag.
          3. Every single tag MUST explicitly include the instruction "STRICTLY SLOW pace" to lock the AI engine's reading speed and prevent it from speeding up over time.
          4. Output ONLY the narrative text. Target length: 2000+ words.

          CYCLE THROUGH THESE EXACT TAGS FOR THE SCRIPTS:
          - Paragraph 1 (The Hook): [hook tone, commanding volume, STRICTLY SLOW pace, start in the middle delivery]
          - Next body paragraphs (alternate dynamically between these short 2-3 sentence blocks):
            * [cold analytical tone, piercing delivery, STRICTLY SLOW pace, deliberate pauses]
            * [assertive tone, exposing the truth, STRICTLY SLOW pace, heavy cadence]
            * [chilling tone, psychological exposure, cynical edge, STRICTLY SLOW calculated delivery]
            * [rhetorical tone, STRICTLY SLOW pace, long philosophical pause]
          - Final Paragraph: [final authoritative tone, heavy cadence, EXTREMELY SLOW powerful conclusion]

          ---
          CRITICAL SAFETY VALVE (CONVERSATIONAL KILL-SWITCH):
          - Do not, under any circumstances, act like a helpful chat assistant at the end.
          - PROHIBITED: Do not include any out-of-character text, follow-up questions, closing offers, conversational pleasantries, menus, or invitations for discussion.
          - The final word of the actual story under the [final authoritative tone] tag MUST be the absolute final character of your entire output. Stop generating immediately after that word. 2000+ words.`;

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          async function tryGenerate(attempt) {
            console.log(\`\n[Attempt \${attempt}/\${MAX_ATTEMPTS}] Launching browser...\`);
            
            const browser = await chromium.launch({
              headless: true,
              args: [
                '--no-sandbox', 
                '--disable-setuid-sandbox', 
                '--disable-blink-features=AutomationControlled',
                '--incognito'
              ]
            });

            const context = await browser.newContext({
              viewport: { width: 1280, height: 1000 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              locale: 'id-ID',
              permissions: ['clipboard-read', 'clipboard-write']
            });

            const page = await context.newPage();

            try {
              console.log('Navigating to AI interface...');
              await page.goto('https://www.google.com/aimode', { waitUntil: 'networkidle', timeout: 60000 });

              const chatInput = page.locator('textarea.ITIRGe, textarea[placeholder*="Tanyakan"], textarea[placeholder*="Ask"], textarea[aria-label*="Search"]').first();
              await chatInput.waitFor({ state: 'visible', timeout: 30000 });

              console.log('Input ready. Filling prompt...');
              await chatInput.fill(FULL_PROMPT);
              
              await chatInput.press('Enter');
              console.log('Prompt sent. Waiting 95 seconds for response to fully stream...');
              
              await sleep(95000);

              console.log('Delay finished. Taking screenshot...');
              await page.screenshot({ path: 'screenshot.png', fullPage: true });

              console.log('Locating the copy button...');
              const copyButtons = page.locator('div.Pc83ge button.W4bPNd');
              const buttonCount = await copyButtons.count();

              if (buttonCount === 0) {
                throw new Error('Tombol salin tidak ditemukan di halaman. Memeriksa fallback selector...');
              }

              console.log(\`Found \${buttonCount} copy buttons. Clicking the latest one...\`);
              await copyButtons.nth(buttonCount - 1).click();
              
              await sleep(1500); 

              console.log('Reading text from clipboard...');
              const finalResponseText = await page.evaluate(async () => {
                return await navigator.clipboard.readText();
              });

              if (!finalResponseText || finalResponseText.trim().length < 200) {
                throw new Error('Teks clipboard kosong atau terlalu pendek.');
              }

              fs.writeFileSync('youtube-script.txt', finalResponseText.trim(), 'utf-8');
              console.log('✓ Script successfully captured via clipboard and saved.');
              
              await browser.close();
              return true;

            } catch (error) {
              console.error(\`Error on attempt \${attempt}:\`, error.message);
              try {
                await page.screenshot({ path: \`error-screenshot-attempt-\${attempt}.png\`, fullPage: true });
              } catch (e) {}
              await browser.close();
              return false;
            }
          }

          async function main() {
            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              const success = await tryGenerate(attempt);
              if (success) process.exit(0);
              if (attempt < MAX_ATTEMPTS) {
                console.log('Waiting 10 seconds before retrying...');
                await sleep(10000);
              }
            }
            console.error('❌ Failed to generate script after maximum attempts.');
            process.exit(1);
          }

          main();
          JSEOF

      - name: Run Playwright Scraper
        env:
          TOPIC_INPUT: ${{ github.event.inputs.topic }}
          LANGUAGE: ${{ github.event.inputs.language }}
        run: node generate-script.js

      - name: Display Screenshot in Logs
        if: always()
        run: |
          echo "================================================================="
          echo "                    SCREENSHOT PREVIEW (ASCII)                  "
          echo "================================================================="
          if [ -f screenshot.png ]; then
            echo "Screenshot tersedia di artifacts"
          elif [ -f error-screenshot-attempt-3.png ]; then
            echo "Script gagal, screenshot error tersedia di artifacts"
          else
            echo "Screenshot file tidak ditemukan."
          fi
          echo "================================================================="

      - name: Display Generated Script in Logs
        if: always()
        run: |
          echo "================================================================="
          echo "                    GENERATED SCRIPT OUTPUT                      "
          echo "================================================================="
          if [ -f youtube-script.txt ]; then
            wc -l youtube-script.txt
            echo "---"
            head -50 youtube-script.txt
            echo "..."
            echo "[Script lengkap tersimpan di artifacts]"
          else
            echo "Script tidak berhasil digenerate."
          fi
          echo "================================================================="

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-files
          path: |
            youtube-script.txt
            screenshot.png
            error-screenshot-*.png
          retention-days: 7
          if-no-files-found: warn
