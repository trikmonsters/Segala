name: Gemini API Request

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan workflow ini secara manual dari tab Actions

jobs:
  run-gemini-request:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute Gemini API Curl
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Membuat file request.json dengan menggunakan single quote 'EOF' 
          # agar string di dalamnya tidak dievaluasi oleh shell runner sebelum dikirim
          cat << 'EOF' > request.json
          {
              "model": "models/gemini-3.1-pro-preview",
              "input": "Topic = \"Decision Fatigue\"\n\nYou are a combination of an elite YouTube Growth Strategist, a rigorous behavioral scientist, and a master of psychological narrative design. Write a highly immersive, continuous psychological narrative in fluent, native-level English based on this raw topic data: \"${TOPIC}\"\n        STRICT FACTUAL & SEO GUARDRAILS (ALGORITHM AUTHORITY LOCK):\n        1. ANCHOR ON FACTS: The narrative must be strictly rooted in real, proven psychological phenomena, cognitive biases, or evolutionary biology data. Do not invent fake science or wild fictions.\n        2. SEO KEYWORD RETENTION: Intelligently weave core semantic keywords related to \"${TOPIC}\" naturally throughout the text. This ensures search engines index the video correctly.\n        3. ANTI-TOPIC CHAOS: Maintain strict thematic consistency. Every paragraph must tightly serve the core premise of \"${TOPIC}\" without drifting into unrelated psychological sub-topics, ensuring the YouTube algorithm establishes clear niche authority for this channel.\n        STRICT NARRATIVE & RETENTION RULES:\n        1. HOOK TECHNIQUE (START IN THE MIDDLE): Do not start with a greeting, preamble, or introduction. Start immediately in the middle of an intense, ongoing psychological simulation or crisis to hook the viewer from second one.\n        2. VALUE RETENTION: To maximize audience retention, the narrative must open by delivering the second-best insight/point of the topic right in the first paragraph.\n        3. Every subsequent paragraph must begin with a cold, piercing psychological insight — NOT a generic question.\n        4. Treat human emotions as physical phenomena. Use architectural, biological, and quantum metaphors. Avoid cliché filler phrases.\n        STRICT TTS-PIPELINE FORMAT RULES (MICRO-CHUNKING & ANTI-SPEED BUG):\n        1. Every single paragraph MUST begin with an aggressive insight AND be preceded by a specific TTS audio directive bracket.\n        2. CRITICAL VISUAL & SPEED CONTROL: Each paragraph MUST be ultra-short, consisting of ONLY 2 to 3 sentences maximum. Never let sentences pile up into many lines. Immediately hit Enter to start a new paragraph with a new tag.\n        3. Every single tag MUST explicitly include the instruction \"STRICTLY SLOW pace\" to lock the AI engine's reading speed and prevent it from speeding up over time.\n        4. Output ONLY the narrative text. Target length: 2000+ words.\n\n        CYCLE THROUGH THESE EXACT TAGS FOR THE SCRIPTS:\n        - Paragraph 1 (The Hook): [hook tone, commanding volume, STRICTLY SLOW pace, start in the middle delivery]\n        - Next body paragraphs (alternate dynamically between these short 2-3 sentence blocks):\n          * [cold analytical tone, piercing delivery, STRICTLY SLOW pace, deliberate pauses]\n          * [assertive tone, exposing the truth, STRICTLY SLOW pace, heavy cadence]\n          * [chilling tone, psychological exposure, cynical edge, STRICTLY SLOW calculated delivery]\n          * [rhetorical tone, STRICTLY SLOW pace, long philosophical pause]\n        - Final Paragraph: [final authoritative tone, heavy cadence, EXTREMELY SLOW powerful conclusion]\n\n        -\n        CRITICAL SAFETY VALVE (CONVERSATIONAL KILL-SWITCH):\n        - Do not, under any circumstances, act like a helpful chat assistant at the end.\n        - PROHIBITED: Do not include any out-of-character text, follow-up questions, closing offers, conversational pleasantries, menus, or invitations for discussion.\n        - The final word of the actual story under the [final authoritative tone] tag MUST be the absolute final character of your entire output. Stop generating immediately after that word. 2000+ words.",
              "tools": [
                  {
                      "type": "google_search"
                  }
              ],
              "generation_config": {
                  "temperature": 1,
                  "max_output_tokens": 65536,
                  "top_p": 0.95,
                  "thinking_level": "high"
              }
          }
          EOF

          # Eksekusi request dan output respons langsung masuk ke log GitHub Actions
          curl -X POST \
            -H "Content-Type: application/json" \
            "https://generativelanguage.googleapis.com/v1beta/interactions?key=${GEMINI_API_KEY}" \
            -d @request.json
