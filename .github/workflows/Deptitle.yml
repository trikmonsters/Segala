name: Auto Subtitle Professional dengan Animasi per Kata

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'URL video yang akan diproses'
        required: true
        default: 'https://v1.pinimg.com/videos/mc/720p/2f/42/16/2f42160e604fb128db5712d46e2a7a21.mp4'
      whisper_model:
        description: 'Model Whisper (tiny/base/small/medium/large)'
        required: false
        default: 'small'
      language:
        description: 'Bahasa (auto/Indonesian/English/dll)'
        required: false
        default: 'Indonesian'

jobs:
  generate-professional-subtitle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip imagemagick
          sudo apt-get install -y fonts-noto fonts-noto-cjk fonts-dejavu

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OpenAI Whisper & dependencies
        run: |
          pip install git+https://github.com/openai/whisper.git
          pip install pysrt

      - name: Download video from URL
        run: |
          curl -L "${{ github.event.inputs.video_url }}" -o input_video.mp4
          echo "Video downloaded successfully"

      - name: Generate subtitle (SRT) with Whisper
        run: |
          whisper input_video.mp4 \
            --model ${{ github.event.inputs.whisper_model }} \
            --language ${{ github.event.inputs.language }} \
            --output_format srt \
            --output_dir .

      - name: Convert SRT to per-word timing with animation
        run: |
          python3 << 'EOF'
          import pysrt
          import json
          import re
          
          # Baca file SRT
          subs = pysrt.open('input_video.srt')
          
          # Generate per-word subtitles dengan timing
          word_subtitles = []
          
          for sub in subs:
              # Split teks menjadi kata-kata
              words = sub.text.split()
              if not words:
                  continue
              
              # Durasi per kata (rata-rata)
              total_duration = (sub.duration).ordinal / 1000  # dalam detik
              duration_per_word = total_duration / len(words)
              
              start_time = sub.start.ordinal / 1000  # dalam detik
              
              # Buat subtitle per kata dengan animasi
              for i, word in enumerate(words):
                  # Bersihkan kata dari tanda baca
                  clean_word = re.sub(r'[^\w\s]', '', word)
                  if not clean_word:
                      continue
                  
                  # Buat grup 1-2 kata
                  if i % 2 == 0 and i + 1 < len(words):
                      # 2 kata
                      next_word = re.sub(r'[^\w\s]', '', words[i+1])
                      if next_word:
                          display_text = f"{clean_word} {next_word}"
                          end_time = start_time + (duration_per_word * 2)
                  else:
                      # 1 kata
                      display_text = clean_word
                      end_time = start_time + duration_per_word
                  
                  word_subtitles.append({
                      'text': display_text,
                      'start': start_time,
                      'end': min(end_time, (sub.end.ordinal / 1000))
                  })
                  
                  start_time = end_time
          
          # Simpan sebagai JSON untuk processing
          with open('word_subtitles.json', 'w') as f:
              json.dump(word_subtitles, f)
          
          print(f"Generated {len(word_subtitles)} word subtitles")
          EOF

      - name: Create professional subtitle with animation (ASS format)
        run: |
          python3 << 'EOF'
          import json
          import math
          
          # Load word subtitles
          with open('word_subtitles.json', 'r') as f:
              word_subs = json.load(f)
          
          # Buat file ASS dengan styling profesional
          ass_content = """[Script Info]
          ; Script generated by AI
          Title: Professional Subtitles
          ScriptType: v4.00+
          Collisions: Normal
          PlayDepth: 0
          Timer: 100.0000
          
          [V4+ Styles]
          Format: Name, Fontname, Fontsize, PrimaryColour, SecondaryColour, OutlineColour, BackColour, Bold, Italic, Underline, StrikeOut, ScaleX, ScaleY, Spacing, Angle, BorderStyle, Outline, Shadow, Alignment, MarginL, MarginR, MarginV, Encoding
          Style: Default,Noto Sans CJK SC,48,&H00FFFFFF,&H000000FF,&H00000000,&H80000000,-1,0,0,0,100,100,2,0,3,3,2,7,10,10,20,1
          Style: Animated,Noto Sans CJK SC,55,&H00FFFFFF,&H0000FFFF,&H00000000,&H80000000,-1,0,0,0,100,100,3,0,3,4,2,7,10,10,30,1
          Style: Shadow,Noto Sans CJK SC,50,&H00FFFFFF,&H0000FFFF,&H00000000,&HA0000000,-1,0,0,0,100,100,0,0,3,0,3,7,10,10,25,1
          
          [Events]
          Format: Layer, Start, End, Style, Name, MarginL, MarginR, MarginV, Effect, Text
          """
          
          # Animasi: fade in/out, scale, dan move
          for i, sub in enumerate(word_subs):
              start = sub['start']
              end = sub['end']
              duration = end - start
              text = sub['text']
              
              # Format waktu untuk ASS: H:MM:SS.cc
              def format_time(seconds):
                  hours = int(seconds // 3600)
                  minutes = int((seconds % 3600) // 60)
                  secs = int(seconds % 60)
                  centis = int((seconds % 1) * 100)
                  return f"{hours}:{minutes:02d}:{secs:02d}.{centis:02d}"
              
              start_time = format_time(start)
              end_time = format_time(end)
              
              # Efek animasi bergantian
              # 1. Efek fade in/out
              # 2. Efek scale (zoom in/out)
              # 3. Efek rotate (sedikit)
              
              # Animasi per kata dengan efek berbeda
              effect_type = i % 3
              
              if effect_type == 0:
                  # Efek: muncul dari bawah dengan fade
                  animation = f"\\fad(150,150)\\move(0,50,0,0,{start*1000},{(start+0.1)*1000})"
              elif effect_type == 1:
                  # Efek: zoom in dengan shadow
                  animation = f"\\fad(200,100)\\fscy{120}\\fscx{120}"
              else:
                  # Efek: slide dari kiri
                  animation = f"\\fad(150,150)\\move(-50,0,0,0,{start*1000},{(start+0.15)*1000})"
              
              # Buat teks dengan styling
              ass_content += f"Dialogue: 0,{start_time},{end_time},Animated,,0,0,0,,{{\\an5{animation}}}{text}\n"
          
          # Simpan file ASS
          with open('subtitle.ass', 'w', encoding='utf-8') as f:
              f.write(ass_content)
          
          print("ASS subtitle file created with professional animation!")
          EOF

      - name: Burn professional subtitle with animation using FFmpeg
        run: |
          # Burn subtitle ASS ke video dengan kualitas tinggi
          ffmpeg -i input_video.mp4 \
            -vf "ass=subtitle.ass" \
            -c:a copy \
            -preset medium \
            -crf 18 \
            output_video_professional.mp4
          
          echo "Professional video with animated subtitles created!"

      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: professional-subtitle-${{ steps.date.outputs.date }}
          name: "🎬 Video Professional dengan Subtitle Animasi - ${{ steps.date.outputs.date }}"
          body: |
            ## ✨ Video Professional dengan Subtitle Animasi per Kata
            
            ### 🎯 Fitur:
            - ✅ **Font profesional** (Noto Sans CJK)
            - ✅ **Animasi per 1-2 kata** (fade, slide, zoom)
            - ✅ **Posisi tengah** seperti video short profesional
            - ✅ **Efek transisi** halus antar kata
            - ✅ **Shadow & outline** untuk readability
            
            ### 📋 Detail:
            - **Video URL**: ${{ github.event.inputs.video_url }}
            - **Model Whisper**: ${{ github.event.inputs.whisper_model }}
            - **Bahasa**: ${{ github.event.inputs.language }}
            
            ### 📦 File yang tersedia:
            - 🎥 `output_video_professional.mp4` - Video dengan subtitle animasi
            - 📝 `input_video.srt` - Subtitle standard (opsional)
            
            ### 🎨 Style Subtitle:
            - Font: Noto Sans CJK SC
            - Ukuran: 48-55pt (disesuaikan)
            - Warna: Putih dengan outline hitam
            - Background: Transparan dengan shadow
            - Animasi: Fade in/out, slide, zoom
            
            ### 💡 Tips:
            Hasil video ini cocok untuk:
            - Shorts / Reels / TikTok
            - Video motivasi
            - Kutipan inspiratif
            - Konten edukasi cepat
            
            ---
            *Generated by GitHub Actions with OpenAI Whisper*
          draft: false
          prerelease: false
          files: |
            output_video_professional.mp4
            input_video.srt
            subtitle.ass
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
