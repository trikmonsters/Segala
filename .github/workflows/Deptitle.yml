name: Auto Subtitle Professional CapCut Style

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'URL video yang akan diproses'
        required: true
        default: 'https://v1.pinimg.com/videos/mc/720p/2f/42/16/2f42160e604fb128db5712d46e2a7a21.mp4'
      whisper_model:
        description: 'Model Whisper (tiny/base/small/medium/large)'
        required: false
        default: 'small'
      language:
        description: 'Bahasa (auto/Indonesian/English/dll)'
        required: false
        default: 'Indonesian'

jobs:
  generate-capcut-style-subtitle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip imagemagick
          sudo apt-get install -y fonts-noto fonts-noto-cjk fonts-dejavu fonts-roboto

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OpenAI Whisper & dependencies
        run: |
          pip install git+https://github.com/openai/whisper.git
          pip install pysrt

      - name: Download video from URL
        run: |
          curl -L "${{ github.event.inputs.video_url }}" -o input_video.mp4
          echo "Video downloaded successfully"

      - name: Get video resolution
        id: video_info
        run: |
          # Dapatkan resolusi video untuk positioning yang tepat
          RESOLUTION=$(ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=s=x:p=0 input_video.mp4)
          echo "resolution=$RESOLUTION" >> $GITHUB_OUTPUT
          echo "Video resolution: $RESOLUTION"

      - name: Generate subtitle (SRT) with Whisper
        run: |
          whisper input_video.mp4 \
            --model ${{ github.event.inputs.whisper_model }} \
            --language ${{ github.event.inputs.language }} \
            --output_format srt \
            --output_dir .

      - name: Convert SRT to per-word timing with animation
        run: |
          python3 << 'EOF'
          import pysrt
          import json
          import re
          
          # Baca file SRT
          subs = pysrt.open('input_video.srt')
          
          import textwrap
          import re
          
          MAX_WORDS = 5
          WRAP_WIDTH = 18
          
          word_subtitles = []
          
          for sub in subs:
          
              words = []
          
              for w in sub.text.split():
                  clean = re.sub(r"[^\wÀ-ÿ'-]", "", w)
                  if clean:
                      words.append(clean)
          
              if not words:
                  continue
          
              total_duration = (sub.duration).ordinal / 1000
              duration_per_word = total_duration / len(words)
          
              start_time = sub.start.ordinal / 1000
          
              i = 0
          
              while i < len(words):
          
                  chunk = words[i:i+MAX_WORDS]
          
                  display_text = " ".join(chunk)
          
                  display_text = "\n".join(
                      textwrap.wrap(
                          display_text,
                          width=WRAP_WIDTH
                      )
                  )
          
                  end_time = start_time + duration_per_word * len(chunk)
          
                  word_subtitles.append({
                      "text": display_text,
                      "start": start_time,
                      "end": min(
                          end_time,
                          sub.end.ordinal / 1000
                      )
                  })
          
                  start_time = end_time
                  i += MAX_WORDS
          
          # Simpan sebagai JSON
          with open('word_subtitles.json', 'w') as f:
              json.dump(word_subtitles, f)
          
          print(f"Generated {len(word_subtitles)} word subtitles")
          EOF

      - name: Create CapCut-style subtitle with ASS format
        run: |
          python3 << 'EOF'
          import json
          import math
          
          # Load word subtitles
          with open('word_subtitles.json', 'r') as f:
              word_subs = json.load(f)
          
          # Buat file ASS dengan styling CapCut profesional
          # Buat file ASS dengan styling CapCut profesional
          ass_content = """[Script Info]
          Title: CapCut Professional Subtitle
          ScriptType: v4.00+
          WrapStyle: 2
          ScaledBorderAndShadow: yes
          YCbCr Matrix: TV.709
          PlayResX: 1080
          PlayResY: 1920
          
          [V4+ Styles]
          Format: Name,Fontname,Fontsize,PrimaryColour,SecondaryColour,OutlineColour,BackColour,Bold,Italic,Underline,StrikeOut,ScaleX,ScaleY,Spacing,Angle,BorderStyle,Outline,Shadow,Alignment,MarginL,MarginR,MarginV,Encoding
          
          Style: CapCut,Roboto,28,&H00FFFFFF,&H000000FF,&H00000000,&H64000000,-1,0,0,0,100,100,0,0,1,3,0,2,80,80,110,1
          Style: Highlight,Roboto,28,&H0000FFFF,&H000000FF,&H00000000,&H64000000,-1,0,0,0,100,100,0,0,1,3,0,2,80,80,110,1
          
          [Events]
          Format: Layer,Start,End,Style,Name,MarginL,MarginR,MarginV,Effect,Text
          """
          
          def format_time(seconds):
              hours = int(seconds // 3600)
              minutes = int((seconds % 3600) // 60)
              secs = int(seconds % 60)
              centis = int((seconds % 1) * 100)
              return f"{hours}:{minutes:02d}:{secs:02d}.{centis:02d}"
          
          # Posisi di tengah bawah dengan margin bottom 35 (sedikit ke atas)
          # Alignment 8 = bottom center
          for i, sub in enumerate(word_subs):
              start = sub['start']
              end = sub['end']
              duration = end - start
              text = sub['text']
              
              start_time = format_time(start)
              end_time = format_time(end)
              
              # Animasi halus seperti CapCut
              # Fade in/out yang smooth
              fade_in = min(150, int(duration * 500))  # 0.15 detik atau sesuai durasi
              fade_out = min(100, int(duration * 300))
              
              # Efek scale kecil (zoom in/out halus)
              if i % 2 == 0:
                  # Zoom in halus
                  animation = f"\\fad({fade_in},{fade_out})\\fscy{105}\\fscx{105}\\t(0,{int(duration*500)},\\fscy{100}\\fscx{100})"
              else:
                  # Slide up halus (seperti CapCut)
                  animation = f"\\fad({fade_in},{fade_out})\\move(0,5,0,0,{int(start*1000)},{int((start+0.1)*1000)})"
              
              # Style bergantian untuk variasi
              style = "CapCutBold" if i % 3 == 0 else "CapCut"
              
              # Text dengan outline halus
              ass_content += f"Dialogue: 0,{start_time},{end_time},{style},,0,0,0,,{{\\an8{animation}}}{text}\n"
          
          # Simpan file ASS
          with open('subtitle.ass', 'w', encoding='utf-8') as f:
              f.write(ass_content)
          
          print("ASS subtitle file created with CapCut style!")
          EOF

      - name: Burn subtitle dengan posisi tengah bawah (CapCut style)
        run: |
          # Burn subtitle dengan posisi presisi
          # Margin bottom 35px membuat posisi di tengah bawah agak ke atas
          ffmpeg -i input_video.mp4 \
            -vf "ass=subtitle.ass" \
            -c:a copy \
            -preset medium \
            -crf 18 \
            output_video_capcut_style.mp4
          
          echo "Video with CapCut-style subtitles created!"

      - name: Generate thumbnail preview
        run: |
          ffmpeg -i output_video_capcut_style.mp4 -ss 00:00:02 -vframes 1 -vf "scale=320:-1" thumbnail.jpg

      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: capcut-style-${{ steps.date.outputs.date }}
          name: "🎬 Video Subtitle CapCut Style - ${{ steps.date.outputs.date }}"
          body: |
            ## 🎬 Video dengan Subtitle Profesional Gaya CapCut
            
            ### ✨ Fitur Utama:
            - ✅ **Ukuran font pas** (40-42pt) - tidak terlalu besar/kecil
            - ✅ **Posisi tengah bawah** agak ke atas (seperti CapCut)
            - ✅ **Animasi halus** per 1-2 kata (fade + slide/zoom)
            - ✅ **Font Roboto** profesional
            - ✅ **Outline tipis + shadow** untuk readability
            - ✅ **Warna putih** dengan background transparan
            
            ### 📋 Detail:
            - **Video URL**: ${{ github.event.inputs.video_url }}
            - **Model Whisper**: ${{ github.event.inputs.whisper_model }}
            - **Bahasa**: ${{ github.event.inputs.language }}
            
            ### 📦 File:
            - 🎥 `output_video_capcut_style.mp4` - Video final
            - 📝 `input_video.srt` - Subtitle standard
            - 🖼️ `thumbnail.jpg` - Preview thumbnail
            
            ### 🎨 Spesifikasi Subtitle:
            | Aspek | Setting |
            |:---|:---|
            | Font | Roboto |
            | Ukuran | 40-42pt |
            | Posisi | Bottom center (agak ke atas) |
            | Warna | Putih |
            | Outline | Hitam, ketebalan 2 |
            | Shadow | Transparan, jarak 2 |
            | Animasi | Fade + slide/zoom |
            | Per Kata | 1-2 kata per frame |
            
            ### 📱 Cocok Untuk:
            - YouTube Shorts
            - Instagram Reels
            - TikTok
            - Video motivasi
            - Konten edukasi
            
            ---
            *Generated by GitHub Actions | Style: CapCut Professional*
          draft: false
          prerelease: false
          files: |
            output_video_capcut_style.mp4
            input_video.srt
            thumbnail.jpg
            subtitle.ass
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
