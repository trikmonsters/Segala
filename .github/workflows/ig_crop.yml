name: Auto Crop, OCR, and Playwright ChatGPT JSON

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Masukkan URL Video Media / Instagram'
        required: true
        default: 'https://media.sssinstagram.com/get?__sig=pZS5-UegitrS35XLPhv0Tg&__expires=1783004335&uri=https%3A%2F%2Fscontent-iad6-1.cdninstagram.com%2Fo1%2Fv%2Ft2%2Ff2%2Fm86%2FAQP1758ku0l62_NnbkszMcwrmPvmI5KdG9GlSDOWq4tGUToaxArF5vtNTQMOZVrUnpKhHj2KrxdH_tQjhcBGG6fXZ0fyEBYYQDsZoWI.mp4%3F_nc_cat%3D102%26_nc_sid%3D5e9851%26_nc_ht%3Dscontent-iad6-1.cdninstagram.com%26_nc_ohc%3DOUirmCT5IFkQ7kNvwHVaJSe%26efg%3DeyJ2ZW5jb2RlX3RhZyI6Inhwdl9wcm9ncmVzc2l2ZS5JTlNUQUdSQU0uQ0xJUFMuQzMuNzIwLmRhc2hfYmFzZWxpbmVfMV92MSIsInhwdl9hc3NldF9pZCI6MTc4OTQ5MzY2NjE0NDYxMjMsImFzc2V0%252F'

jobs:
  process-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgomp1
          pip install opencv-python-headless numpy torch torchvision easyocr

      - name: Install Playwright Dependencies
        run: |
          npm init -y
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps

      - name: Download Video
        run: |
          curl -L -o "video.mp4" "${{ github.event.inputs.video_url }}"

      - name: Run OpenCV Detection & EasyOCR
        run: |
          cat << 'EOF' > process.py
          import cv2
          import numpy as np
          import easyocr

          video_path = "video.mp4"
          cap = cv2.VideoCapture(video_path)
          fps = cap.get(cv2.CAP_PROP_FPS)
          cap.set(cv2.CAP_PROP_POS_FRAMES, int(fps * 2))
          ret, frame = cap.read()
          cap.release()

          if not ret:
              exit(1)

          gray = cv2.cvtColor(frame, cv2.COLOR_BGR2GRAY)
          _, thresh = cv2.threshold(gray, 240, 255, cv2.THRESH_BINARY_INV)
          contours, _ = cv2.findContours(thresh, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)

          full_h, full_w = frame.shape[0], frame.shape[1]

          if contours:
              largest_contour = max(contours, key=cv2.contourArea)
              x, y, w, h = cv2.boundingRect(largest_contour)
              
              with open('crop_params.txt', 'w') as f:
                  f.write(f"CROP_W={w}\n")
                  f.write(f"CROP_H={h}\n")
                  f.write(f"CROP_X={x}\n")
                  f.write(f"CROP_Y={y}\n")
              
              if y > 10:
                  text_area = frame[0:y, 0:full_w]
              else:
                  text_area = frame[0:int(full_h*0.2), 0:full_w]
          else:
              with open('crop_params.txt', 'w') as f:
                  f.write(f"CROP_W={full_w}\n")
                  f.write(f"CROP_H={full_h}\n")
                  f.write(f"CROP_X=0\n")
                  f.write(f"CROP_Y=0\n")
              text_area = frame[0:int(full_h*0.2), 0:full_w]

          try:
              reader = easyocr.Reader(['en'])
              ocr_results = reader.readtext(text_area, detail=0)
              detected_text = " ".join(ocr_results).replace("\n", " ").strip()
          except Exception:
              detected_text = "This man is the literal living definition of vibing"

          if not detected_text:
              detected_text = "This man is the literal living definition of vibing"
              
          with open('detected_text.txt', 'w', encoding='utf-8') as f:
              f.write(detected_text)
          EOF
          python process.py
          cat crop_params.txt >> $GITHUB_ENV

      - name: Run Playwright ChatGPT Script
        run: |
          cat << 'EOF' > script.js
          const { chromium } = require('playwright-extra');
          const stealth = require('puppeteer-extra-plugin-stealth')();
          const fs = require('fs');

          chromium.use(stealth);

          (async () => {
            let detectedText = "This man is the literal living definition of vibing";
            if (fs.existsSync('detected_text.txt')) {
                detectedText = fs.readFileSync('detected_text.txt', 'utf8').trim();
            }

            const prompt = `Convert the following text into a short video hook that is controversial or funny: ${detectedText}

            give 2 versions only without any addition json response like ["version 1", "version 2"]`;

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 720 }
            });
            const page = await context.newPage();

            try {
              await page.goto('https://chatgpt.com/', { waitUntil: 'networkidle' });

              const inputSelector = 'div#prompt-textarea, textarea[placeholder*="Message ChatGPT"]';
              await page.waitForSelector(inputSelector, { timeout: 30000 });
              
              await page.fill(inputSelector, prompt);
              await page.press(inputSelector, 'Enter');
              
              await page.waitForTimeout(12000);

              const responseSelector = 'main div.markdown, div[data-message-author-role="assistant"]';
              await page.waitForSelector(responseSelector, { timeout: 20000 });
              
              const responses = await page.locator(responseSelector).all();
              if (responses.length > 0) {
                let lastResponseText = await responses[responses.length - 1].innerText();
                
                if (lastResponseText.includes('```')) {
                    lastResponseText = lastResponseText.split('```')[1];
                    if (lastResponseText.startsWith('json')) {
                        lastResponseText = lastResponseText.substring(4);
                    }
                }
                lastResponseText = lastResponseText.trim();

                try {
                    const parsedJson = JSON.parse(lastResponseText);
                    fs.writeFileSync('hasil_ai.json', JSON.stringify(parsedJson, null, 2), 'utf8');
                    
                    let textOverlay = "Default Hook";
                    if (Array.isArray(parsedJson)) {
                        textOverlay = parsedJson[0] || "Default Hook";
                    } else if (typeof parsedJson === 'object') {
                        textOverlay = Object.values(parsedJson)[0] || "Default Hook";
                    }
                    
                    fs.writeFileSync('text_overlay.txt', textOverlay, 'utf8');
                } catch (e) {
                    fs.writeFileSync('hasil_ai.json', JSON.stringify([detectedText, detectedText]));
                    fs.writeFileSync('text_overlay.txt', detectedText, 'utf8');
                }

              } else {
                exit(1);
              }

            } catch (error) {
              exit(1);
            } finally {
              await browser.close();
            }
          })();
          EOF
          node script.js
          echo "FINAL_TEXT=$(cat text_overlay.txt)" >> $GITHUB_ENV

      - name: Process Video with FFmpeg
        run: |
          curl -L -o Arial.ttf "https://github.com/matthieua/WOW-Fonts/raw/master/Arial.ttf"

          ffmpeg -i "video.mp4" \
            -filter_complex "[0:v]crop=${{ env.CROP_W }}:${{ env.CROP_H }}:${{ env.CROP_X }}:${{ env.CROP_Y }}, \
                             scale=1080:-1, \
                             pad=1080:1920:(ow-iw)/2:(oh-ih)/2:white, \
                             drawtext=fontfile=Arial.ttf:text='${{ env.FINAL_TEXT }}':x=(w-text_w)/2:y=150:wrap_text=1:text_w=920:fontsize=45:fontcolor=black" \
            -c:a copy output.mp4

          mv output.mp4 video.mp4

      - name: Upload Video & ChatGPT JSON Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-edited-video
          path: |
            video.mp4
            hasil_ai.json
