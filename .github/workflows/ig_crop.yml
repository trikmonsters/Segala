name: Auto Crop, OCR, and Playwright ChatGPT JSON

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Masukkan URL Video Media / Instagram'
        required: true
        default: 'https://media.sssinstagram.com/get?__sig=pZS5-UegitrS35XLPhv0Tg&__expires=1783004335&uri=https%3A%2F%2Fscontent-iad6-1.cdninstagram.com%2Fo1%2Fv%2Ft2%2Ff2%2Fm86%2FAQP1758ku0l62_NnbkszMcwrmPvmI5KdG9GlSDOWq4tGUToaxArF5vtNTQMOZVrUnpKhHj2KrxdH_tQjhcBGG6fXZ0fyEBYYQDsZoWI.mp4%3F_nc_cat%3D102%26_nc_sid%3D5e9851%26_nc_ht%3Dscontent-iad6-1.cdninstagram.com%26_nc_ohc%3DOUirmCT5IFkQ7kNvwHVaJSe%26efg%3DeyJ2ZW5jb2RlX3RhZyI6Inhwdl9wcm9ncmVzc2l2ZS5JTlNUQUdSQU0uQ0xJUFMuQzMuNzIwLmRhc2hfYmFzZWxpbmVfMV92MSIsInhwdl9hc3NldF9pZCI6MTc4OTQ5MzY2NjE0NDYxMjMsImFzc2V0%252F'

jobs:
  process-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgomp1
          pip install opencv-python-headless numpy torch torchvision easyocr

      - name: Install Playwright Dependencies
        run: |
          npm init -y
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps

      - name: Download Video
        run: |
          curl -L -o "video.mp4" "${{ github.event.inputs.video_url }}"

      - name: Run OpenCV Multi-Frame Analysis & EasyOCR
        run: |
          cat << 'EOF' > process.py
          import cv2
          import numpy as np
          import easyocr

          video_path = "video.mp4"
          cap = cv2.VideoCapture(video_path)
          fps = cap.get(cv2.CAP_PROP_FPS)
          total_frames = int(cap.get(cv2.CAP_PROP_FRAME_COUNT))
          
          if total_frames <= 0 or fps <= 0:
              print("Gagal membaca metadata video.")
              exit(1)

          sample_seconds = [2, 4, 6, 8]
          frames_to_analyze = []

          for sec in sample_seconds:
              frame_pos = int(fps * sec)
              if frame_pos < total_frames:
                  cap.set(cv2.CAP_PROP_POS_FRAMES, frame_pos)
                  ret, frame = cap.read()
                  if ret:
                      frames_to_analyze.append(frame)
          
          if not frames_to_analyze:
              cap.set(cv2.CAP_PROP_POS_FRAMES, 0)
              ret, frame = cap.read()
              if ret:
                  frames_to_analyze.append(frame)

          cap.release()

          if not frames_to_analyze:
              print("Tidak ada frame yang bisa dianalisis.")
              exit(1)

          full_h, full_w = frames_to_analyze[0].shape[0], frames_to_analyze[0].shape[1]

          combined_gray = np.zeros((full_h, full_w), dtype=np.uint8)
          for f in frames_to_analyze:
              gray_f = cv2.cvtColor(f, cv2.COLOR_BGR2GRAY)
              combined_gray = cv2.max(combined_gray, gray_f)

          row_sums = np.sum(combined_gray > 15, axis=1)
          col_sums = np.sum(combined_gray > 15, axis=0)
          
          nonzero_rows = np.where(row_sums > 0)[0]
          nonzero_cols = np.where(col_sums > 0)[0]

          if len(nonzero_rows) > 0 and len(nonzero_cols) > 0:
              y_start, y_end = nonzero_rows[0], nonzero_rows[-1]
              x_start, x_end = nonzero_cols[0], nonzero_cols[-1]
              
              crop_w = x_end - x_start
              crop_h = y_end - y_start
              crop_x = x_start
              crop_y = y_start
          else:
              crop_w, crop_h, crop_x, crop_y = full_w, full_h, 0, 0

          with open('crop_params.txt', 'w') as f:
              f.write(f"CROP_W={crop_w}\n")
              f.write(f"CROP_H={crop_h}\n")
              f.write(f"CROP_X={crop_x}\n")
              f.write(f"CROP_Y={crop_y}\n")

          ocr_y_limit = crop_y if crop_y > 40 else int(full_h * 0.25)
          text_area = combined_gray[0:ocr_y_limit, 0:full_w]

          try:
              reader = easyocr.Reader(['en'])
              ocr_results = reader.readtext(text_area, detail=0)
              detected_text = " ".join(ocr_results).replace("\n", " ").strip()
          except Exception:
              detected_text = ""

          if not detected_text or len(detected_text) < 3:
              detected_text = "Life was good when this song came out"
              
          with open('detected_text.txt', 'w', encoding='utf-8') as f:
              f.write(detected_text)
          EOF
          python process.py
          cat crop_params.txt >> $GITHUB_ENV

      - name: Run Playwright ChatGPT Script
        run: |
          cat << 'EOF' > script.js
          const { chromium } = require('playwright-extra');
          const stealth = require('puppeteer-extra-plugin-stealth')();
          const fs = require('fs');

          chromium.use(stealth);

          function wrapText(text, maxChars = 32) {
            const words = text.split(' ');
            let lines = [];
            let currentLine = '';

            for (let word of words) {
              if ((currentLine + word).length > maxChars) {
                lines.push(currentLine.trim());
                currentLine = word + ' ';
              } else {
                currentLine += word + ' ';
              }
            }
            if (currentLine.trim()) {
              lines.push(currentLine.trim());
            }
            return lines.join('\n');
          }

          (async () => {
            let detectedText = "Life was good when this song came out";
            if (fs.existsSync('detected_text.txt')) {
                detectedText = fs.readFileSync('detected_text.txt', 'utf8').trim();
            }

            const prompt = `Convert the following text into a short video hook that is controversial or funny: "${detectedText}"
            Respond ONLY with a raw JSON array containing exactly 2 strings, example: ["Hook 1", "Hook 2"]. Do not include markdown blocks, do not include "json" formatting text, just the raw array.`;

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 720 }
            });
            const page = await context.newPage();

            try {
              await page.goto('https://chatgpt.com/', { waitUntil: 'networkidle' });

              const inputSelector = 'div#prompt-textarea, textarea[placeholder*="Message ChatGPT"], [contenteditable="true"]';
              await page.waitForSelector(inputSelector, { timeout: 30000 });
              
              await page.fill(inputSelector, prompt);
              await page.press(inputSelector, 'Enter');
              
              await page.waitForTimeout(15000);

              const responseSelector = 'article [data-message-author-role="assistant"], main div.markdown, .agent-turn';
              await page.waitForSelector(responseSelector, { timeout: 25000 });
              
              const responses = await page.locator(responseSelector).all();
              if (responses.length > 0) {
                let lastResponseText = await responses[responses.length - 1].innerText();
                
                if (lastResponseText.includes('```')) {
                    const parts = lastResponseText.split('```');
                    lastResponseText = parts[1];
                    if (lastResponseText.startsWith('json')) {
                        lastResponseText = lastResponseText.substring(4);
                    }
                }
                lastResponseText = lastResponseText.trim();

                try {
                    const parsedJson = JSON.parse(lastResponseText);
                    fs.writeFileSync('hasil_ai.json', JSON.stringify(parsedJson, null, 2), 'utf8');
                    
                    let textOverlay = detectedText;
                    if (Array.isArray(parsedJson)) {
                        textOverlay = parsedJson[0] || detectedText;
                    } else if (typeof parsedJson === 'object') {
                        textOverlay = Object.values(parsedJson)[0] || detectedText;
                    }
                    
                    fs.writeFileSync('text_overlay.txt', wrapText(textOverlay), 'utf8');
                } catch (e) {
                    const cleanText = lastResponseText.replace(/[\[\]"]/g, '').split('\n')[0] || detectedText;
                    fs.writeFileSync('hasil_ai.json', JSON.stringify([cleanText, cleanText], null, 2));
                    fs.writeFileSync('text_overlay.txt', wrapText(cleanText), 'utf8');
                }

              } else {
                throw new Error("Response element not found");
              }

            } catch (error) {
              fs.writeFileSync('hasil_ai.json', JSON.stringify([detectedText, detectedText], null, 2));
              fs.writeFileSync('text_overlay.txt', wrapText(detectedText), 'utf8');
            } finally {
              await browser.close();
            }
          })();
          EOF
          node script.js

      - name: Process Video with FFmpeg
        run: |
          curl -L -o Arial.ttf "https://github.com/matthieua/WOW-Fonts/raw/master/Arial.ttf"

          # Memperbaiki logika scale dan pad menggunakan force_original_aspect_ratio=decrease
          # Hal ini menjamin dimensi video setelah di-scale TIDAK AKAN PERNAH melebihi kanvas 1080x1920
          ffmpeg -i "video.mp4" \
            -filter_complex "[0:v]crop=${{ env.CROP_W }}:${{ env.CROP_H }}:${{ env.CROP_X }}:${{ env.CROP_Y }}, \
                             scale=1080:1920:force_original_aspect_ratio=decrease, \
                             pad=1080:1920:(ow-iw)/2:(oh-ih)/2:white, \
                             drawtext=fontfile=Arial.ttf:textfile=text_overlay.txt:x=(w-text_w)/2:y=180:fontsize=45:fontcolor=black" \
            -c:a copy output.mp4

          mv output.mp4 video.mp4

      - name: Upload Video & ChatGPT JSON Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-edited-video
          path: |
            video.mp4
            hasil_ai.txt
