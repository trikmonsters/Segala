name: Auto Crop, Scale, and OCR Video

on:
  workflow_dispatch:

jobs:
  process-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgomp1
          # Menginstal EasyOCR dan dependensinya
          pip install opencv-python-headless numpy torch torchvision easyocr

      - name: Download Video
        run: |
          curl -L -o "video.mp4" "https://media.sssinstagram.com/get?__sig=rR3PPZq04LoaeIe8ickD4w&__expires=1783007696&uri=https%3A%2F%2Fscontent-iad6-1.cdninstagram.com%2Fo1%2Fv%2Ft2%2Ff2%2Fm86%2FAQP1758ku0l62_NnbkszMcwrmPvmI5KdG9GlSDOWq4tGUToaxArF5vtNTQMOZVrUnpKhHj2KrxdH_tQjhcBGG6fXZ0fyEBYYQDsZoWI.mp4%3F_nc_cat%3D102%26_nc_sid%3D5e9851%26_nc_ht%3Dscontent-iad6-1.cdninstagram.com%26_nc_ohc%3DOUirmCT5IFkQ7kNvwHVaJSe%26efg%3DeyJ2ZW5jb2RlX3RhZyI6Inhwdl9wcm9ncmVzc2l2ZS5JTlNUQUdSQU0uQ0xJUFMuQzMuNzIwLmRhc2hfYmFzZWxpbmVfMV92MSIsInhwdl9hc3NldF9pZCI6MTc4OTQ5MzY2NjE0NDYxMjMsImFzc2V0X2FnZV9kYXlzIjo2NywidmlfdXNlY2FzZV9pZCI6MTAwOTksImR1cmF0aW9uX3MiOjQ3LCJ1cmxnZW5fc291cmNlIjoid3d3In0%253D%26ccb%3D17-1%26vs%3Da7f734514ef8ada4%26_nc_vs%%26_nc_gid%3DXcanDN3GcCkTy9f-AaPwuA%26_nc_ss%3D7839b%26_nc_zt%3D28%26oh%3D00_AQCD4h0FIvbqRSrveo1YWjLYMGN_CFO2YJDBFNMRcXdxlA%26oe%3D6A484803%26dl%3D1&filename=The%20legendary%20energy%20of%20Jack%20Black%20captures%20the%20raw%20essence%20of%20a%20high-energy%20journey%20through%20mus.mp4&ua=-&referer=https%3A%2F%2Fwww.instagram.com%2F"
          
      - name: Run OpenCV Detection & EasyOCR
        id: process_media
        run: |
          cat << 'EOF' > process.py
          import cv2
          import numpy as np
          import easyocr
          import os

          video_path = "video.mp4"
          cap = cv2.VideoCapture(video_path)

          fps = cap.get(cv2.CAP_PROP_FPS)
          cap.set(cv2.CAP_PROP_POS_FRAMES, int(fps * 2))
          ret, frame = cap.read()
          cap.release()

          if not ret:
              print("Gagal membaca video")
              exit(1)

          # 1. Deteksi Batas Crop Menggunakan OpenCV
          gray = cv2.cvtColor(frame, cv2.COLOR_BGR2GRAY)
          _, thresh = cv2.threshold(gray, 240, 255, cv2.THRESH_BINARY_INV)
          contours, _ = cv2.findContours(thresh, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)

          if contours:
              largest_contour = max(contours, key=cv2.contourArea)
              x, y, w, h = cv2.boundingRect(largest_contour)
              full_w = frame.shape[1]
              
              # Simpan parameter crop untuk FFmpeg
              with open('crop_params.txt', 'w') as f:
                  f.write(f"CROP_W={full_w}\n")
                  f.write(f"CROP_H={h}\n")
                  f.write(f"CROP_X=0\n")
                  f.write(f"CROP_Y={y}\n")
              
              # 2. Ambil Bagian Teks Atas (dari koordinat 0 sampai titik Y video dimulai)
              # Diberi sedikit padding agar teks tidak terpotong
              text_area = frame[0:y, 0:full_w]
              
              # 3. Jalankan EasyOCR untuk Membaca Teks
              reader = easyocr.Reader(['en']) # Atur ke ['id','en'] jika ada teks bahasa Indonesia
              ocr_results = reader.readtext(text_area, detail=0)
              
              # Gabungkan hasil teks menjadi satu baris kalimat tunggal
              detected_text = " ".join(ocr_results).replace("\n", " ").strip()
              print(f"Detected Text: {detected_text}")
              
              # Simpan teks ke file penampung agar bisa dioper ke GitHub Actions Env
              with open('detected_text.txt', 'w') as f:
                  f.write(f"DETECTED_TEXT={detected_text}\n")
          else:
              print("Kontur tidak ditemukan")
              exit(1)
          EOF
          python process.py
          
          # Masukkan semua variabel ke GitHub Environment
          cat crop_params.txt >> $GITHUB_ENV
          cat detected_text.txt >> $GITHUB_ENV

      - name: Process Video with FFmpeg
        run: |
          curl -L -o Arial.ttf "https://github.com/matthieua/WOW-Fonts/raw/master/Arial.ttf"

          # Di sini teks 'this is textarea text title' bisa Anda ganti secara dinamis 
          # menggunakan output teks baru dari AI Anda nanti.
          ffmpeg -i "video.mp4" \
            -filter_complex "[0:v]crop=${{ env.CROP_W }}:${{ env.CROP_H }}:${{ env.CROP_X }}:${{ env.CROP_Y }}, \
                             scale=1080:-1, \
                             pad=1080:1920:(ow-iw)/2:(oh-ih)/2:white, \
                             drawtext=fontfile=Arial.ttf:text='this is textarea text title':x=(w-text_w)/2:y=200:fontsize=45:fontcolor=black" \
            -c:a copy output.mp4

          mv output.mp4 video.mp4

      - name: Upload Output Video
        uses: actions/upload-artifact@v4
        with:
          name: final-edited-video
          path: video.mp4
