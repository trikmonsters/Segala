name: Stickman Battle

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pillow ffmpeg

      - name: Generate frames
        run: |
          python generate.py

      - name: Encode video
        run: |
          ffmpeg \
          -framerate 60 \
          -i frames/frame_%05d.png \
          -c:v libx264 \
          -pix_fmt yuv420p \
          -preset medium \
          -crf 20 \
          battle.mp4

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: stickman-battle
          path: battle.mp4
