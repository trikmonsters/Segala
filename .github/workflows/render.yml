name: Render Stickman

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install -r requirements.txt

      - name: Render
        run: |
          python genre.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: stickman-battle
          path: battle.mp4
